<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-FAYROUZ | الفيروز للعقارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #050505; --card: #111; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; margin: 0; }

        /* Header */
        nav { background: #000; padding: 20px 5%; border-bottom: 1px solid #222; text-align: center; }
        .logo { font-weight: 900; font-size: 1.8rem; letter-spacing: 2px; }
        .logo span { color: var(--gold); }

        /* Container */
        .container { padding: 30px 5%; max-width: 1200px; margin: auto; }
        .hero-text { text-align: center; margin-bottom: 40px; }
        .hero-text h1 { font-size: 2rem; margin-bottom: 10px; }
        .hero-text p { color: #888; }

        /* Property Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #222; transition: 0.3s; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .card-img { width: 100%; height: 230px; object-fit: cover; background: #1a1a1a; }
        
        .card-body { padding: 20px; }
        .price { font-size: 1.6rem; font-weight: 900; color: var(--gold); margin-bottom: 5px; }
        .title { font-size: 1.2rem; font-weight: 700; margin-bottom: 15px; }
        
        .specs { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .spec-item { background: #1a1a1a; padding: 5px 12px; border-radius: 5px; font-size: 0.85rem; color: #ccc; border: 1px solid #333; }

        .btn-contact { 
            display: block; width: 100%; padding: 12px; background: var(--gold); color: #000; 
            text-align: center; text-decoration: none; border-radius: 8px; font-weight: 900; transition: 0.3s;
        }
        .btn-contact:hover { background: #fff; }

        #loader { text-align: center; padding: 100px; color: var(--gold); }
    </style>
</head>
<body>

<nav>
    <div class="logo">AL-FAYROUZ <span>ESTATE</span></div>
</nav>

<div class="container">
    <div class="hero-text">
        <h1>وحداتنا المختارة</h1>
        <p>عقارات حصرية في المنصورة ودمياط الجديدة بإدارة علي الحمايدان</p>
    </div>

    <div id="loader">جارٍ فحص الوحدات المتاحة...</div>
    <div id="dataGrid" class="grid"></div>
</div>

<script>
    // الرابط بتاع الـ Web App اللي عملناه في App Script
    const API_URL = "https://script.google.com/macros/s/AKfycbxlYBmqK7r_zZwsVC-SrdvPBexAPL25ha9qDiJ6lJdkVKwzDlKRZdPL-8vR88AP1nZakw/exec";

    async function loadProperties() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            // تصفية العناوين (أول صف) والصفوف الفاضية
            const properties = data.filter(row => row[1] && row[1] !== "المشروع");
            render(properties);
        } catch (error) {
            document.getElementById('loader').innerText = "تأكد من تفعيل Web App في الشيت بصلاحية Anyone.";
        }
    }

    function render(list) {
        document.getElementById('loader').style.display = 'none';
        let html = "";
        list.forEach(row => {
            // ترتيب العواميد في الشيت: 0:المدينة، 1:المشروع، 5:المساحة، 6:الاتجاه، 7:السعر، 8:رابط الصورة
            const image = row[8] || 'https://via.placeholder.com/400x250/111/c5a059?text=AL-FAYROUZ';
            html += `
            <div class="card">
                <img src="${image}" class="card-img" alt="Property">
                <div class="card-body">
                    <div class="price">${Number(row[7]).toLocaleString()} ج.م</div>
                    <div class="title">${row[1]} - عمارة ${row[2]}</div>
                    <div class="specs">
                        <div class="spec-item">📍 ${row[0]}</div>
                        <div class="spec-item">📏 ${row[5]} م²</div>
                        <div class="spec-item">🧭 ${row[6] || 'بحري'}</div>
                        <div class="spec-item">🏢 الدور ${row[4]}</div>
                    </div>
                    <a href="https://wa.me/201212229797?text=أريد استفسار عن: ${row[1]}" class="btn-contact">تواصل مع الإدارة</a>
                </div>
            </div>`;
        });
        document.getElementById('dataGrid').innerHTML = html;
    }

    loadProperties();
</script>
</body>
</html>

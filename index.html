<!DOCTYPE html>
<html dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2KF82HSX13"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-2KF82HSX13');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Al-Fayrouz Real Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Montserrat:wght@900&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00838f; --secondary: #c5a012; --bg-dark: #0f1214; --card-bg: #1c2226; --sold: #ff1100; --available: #39FF14; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { overflow-x: hidden; width: 100%; margin: 0; padding: 0; background: var(--bg-dark); color: #f0f0f0; font-family: 'Cairo', sans-serif; }

        #loadingScreen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-logo { font-family: 'Montserrat'; font-size: 35px; font-weight: 900; color: var(--secondary); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        .header-bar { padding: 50px 10px 30px; text-align: center; }
        .company-name { font-family: 'Montserrat'; font-size: 42px; font-weight: 900; color: #fff; margin: 0; }
        .company-subtitle { font-family: 'Reem Kufi'; font-size: 22px; color: var(--secondary); display: block; margin-top: 10px; }

        .container { width: 100%; max-width: 450px; margin: auto; padding: 15px; }
        .section-title { font-size: 22px; color: #fff; font-weight: 900; text-align: center; margin-bottom: 25px; }

        .card-city { background: var(--card-bg); border-radius: 20px; padding: 30px; text-align: center; border: 2px solid rgba(197, 160, 18, 0.3); cursor: pointer; margin-bottom: 15px; }
        .card-city h3 { font-size: 28px; color: var(--secondary); margin: 0; }

        .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card-project { background: var(--card-bg); border-radius: 15px; padding: 25px 10px; text-align: center; border: 1px solid #333; cursor: pointer; font-weight: 900; }

        .apt-card { background: #1c2226; border-radius: 22px; margin-bottom: 25px; overflow: hidden; border-right: 8px solid var(--available); }
        .is-sold { border-right-color: var(--sold); opacity: 0.7; }
        
        .img-container { width: 100%; height: 220px; background: #000; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .apt-content { padding: 20px; }
        
        .apt-specs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; }
        .spec-item { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 10px; text-align: center; }
        .spec-label { font-size: 10px; color: #777; display: block; }
        .spec-value { font-size: 12px; font-weight: 800; }

        .price-box { background: rgba(57,255,20,0.1); padding: 15px; border-radius: 12px; border: 2px solid var(--available); text-align: center; margin-top: 10px; }
        .btn-preview-neon { background: var(--available); color: #000; text-align: center; padding: 16px; border-radius: 15px; display: block; font-weight: 900; text-decoration: none; margin-top: 15px; }

        .hidden { display: none !important; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 50000; align-items: center; justify-content: center; padding: 15px; }
        .modal-box { background: var(--card-bg); border-radius: 25px; padding: 20px; width: 100%; max-width: 400px; border: 1px solid var(--secondary); }
        .m-input, .m-select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; font-family: 'Cairo'; }

        .social-menu { position: fixed; bottom: 25px; left: 25px; z-index: 10000; }
        .social-btn { width: 55px; height: 55px; background: var(--secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #fff; }
    </style>
</head>
<body>

    <div id="loadingScreen"><div class="loader-logo">AL-FAYROUZ</div></div>

    <div id="addUnitModal" class="modal-overlay">
        <div class="modal-box">
            <h3 style="color:var(--secondary); text-align:center;">أضف وحدتك العقارية</h3>
            <select id="mCity" class="m-select" onchange="updateMProjects()">
                <option value="" disabled selected>اختر المدينة</option>
                <option value="المنصورة الجديدة">المنصورة الجديدة</option>
                <option value="دمياط الجديدة">دمياط الجديدة</option>
            </select>
            <select id="mProject" class="m-select"><option>اختر المشروع</option></select>
            <input type="text" id="mBld" class="m-input" placeholder="رقم العمارة">
            <input type="text" id="mApt" class="m-input" placeholder="رقم الشقة">
            <input type="tel" id="mPhone" class="m-input" placeholder="رقم الهاتف">
            <button onclick="submitMUnit()" style="width:100%; padding:15px; background:var(--secondary); border:none; border-radius:12px; font-weight:900;">إرسال البيانات</button>
            <p onclick="closeM()" style="text-align:center; margin-top:15px; cursor:pointer; color:#666;">إلغاء</p>
        </div>
    </div>

    <div class="header-bar">
        <h1 class="company-name">Al-Fayrouz</h1>
        <span class="company-subtitle">الفيروز للتسويق العقاري</span>
    </div>

    <div class="container">
        <div id="step1">
            <div onclick="openM()" style="background:rgba(197,160,18,0.1); border:2px solid var(--secondary); border-radius:15px; padding:15px; text-align:center; margin-bottom:20px; color:var(--secondary); font-weight:900; cursor:pointer;">🏡 أضف وحدتك العقارية مجاناً</div>
            <h2 class="section-title">اختر المدينة</h2>
            <div class="card-city" onclick="goToStep2('المنصورة الجديدة')"><h3>المنصورة الجديدة</h3></div>
            <div class="card-city" onclick="goToStep2('دمياط الجديدة')"><h3>دمياط الجديدة</h3></div>
        </div>

        <div id="step2" class="hidden">
            <button onclick="goBack(1)" style="background:#333; color:#fff; border:none; padding:10px 20px; border-radius:10px; margin-bottom:20px;">رجوع</button>
            <div id="projectButtons" class="project-grid"></div>
        </div>

        <div id="step3" class="hidden">
            <button onclick="goBack(2)" style="background:#333; color:#fff; border:none; padding:10px 20px; border-radius:10px; margin-bottom:20px;">رجوع</button>
            <div id="apartmentList"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxQsS6y6NgU_HdYXZOKsiV7xyzh7EBvYWLUeOacsqf7ERu93gnVyiOnNDUxqG6UUzcA/exec";
        let allData = [];

        window.onload = () => {
            fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                allData = data.slice(1);
                document.getElementById('loadingScreen').style.display = 'none';
            });
        };

        function goToStep2(c) {
            window.curCity = c;
            switchStep('step2');
            let projs = c === 'المنصورة الجديدة' ? ['جنة', 'سكن مصر', 'زاهية', 'إسكان ساحلي'] : ['جنة', 'سكن مصر', 'دار مصر', 'أهالي'];
            let html = '';
            projs.forEach(p => html += `<div class="card-project" onclick="showU('${p}')">${p}</div>`);
            document.getElementById('projectButtons').innerHTML = html;
        }

        function showU(kw) {
            switchStep('step3');
            const list = document.getElementById('apartmentList');
            let filtered = allData.filter(r => (r[0]||"").toString().trim() === window.curCity && (r[1]||"").toString().includes(kw));
            
            let h = '';
            filtered.forEach(r => {
                let sold = (r[11]||"").toString().includes("تم البيع");
                let img = (r[12] && r[12].includes('drive')) ? `https://drive.google.com/thumbnail?sz=1000&id=${r[12].split('id=')[1]}` : r[12];
                let cash = (parseFloat(r[6])||0) + (parseFloat(r[7])||0);

                h += `<div class="apt-card ${sold ? 'is-sold' : ''}">
                    ${img ? `<div class="img-container"><img src="${img}"></div>` : ''}
                    <div class="apt-content">
                        <div class="apt-title">عمارة ${r[2]} • شقة ${r[3]}</div>
                        <div class="apt-specs">
                            <div class="spec-item"><span class="spec-label">المساحة</span><span class="spec-value">${r[13]}م</span></div>
                            <div class="spec-item"><span class="spec-label">الدور</span><span class="spec-value">${r[4]}</span></div>
                        </div>
                        <div class="price-box">
                            <div style="font-size:12px; color:var(--available)">المطلوب كاش</div>
                            <div style="font-size:20px; font-weight:900;">${cash.toLocaleString()} ج.م</div>
                        </div>
                        ${sold ? '<div style="text-align:center; color:red; font-weight:900; margin-top:10px;">تم البيع</div>' : 
                        `<a href="https://wa.me/201212229797" class="btn-preview-neon">طلب معاينة</a>`}
                    </div>
                </div>`;
            });
            list.innerHTML = h || '<p style="text-align:center;">لا توجد وحدات حالياً</p>';
        }

        function switchStep(id) {
            ['step1','step2','step3'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function goBack(s) { switchStep('step' + s); }
        function openM() { document.getElementById('addUnitModal').style.display = 'flex'; }
        function closeM() { document.getElementById('addUnitModal').style.display = 'none'; }
        function updateMProjects() {
            const city = document.getElementById('mCity').value;
            const proj = document.getElementById('mProject');
            let list = city === 'المنصورة الجديدة' ? ['جنة', 'سكن مصر', 'زاهية', 'إسكان ساحلي'] : ['جنة', 'سكن مصر', 'دار مصر', 'أهالي'];
            proj.innerHTML = '';
            list.forEach(p => proj.innerHTML += `<option value="${p}">${p}</option>`);
        }
        function submitMUnit() {
            alert('جاري إرسال البيانات...');
            closeM();
        }
    </script>
</body>
</html>

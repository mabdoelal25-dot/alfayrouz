<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-FAYROUZ | لوحة تحكم العقارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #0a0b0d; --card: #141619; --border: rgba(255,255,255,0.1); }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: #fff; margin: 0; }
        
        nav { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 900; font-size: 1.5rem; color: var(--gold); }
        .add-btn { background: var(--gold); color: #000; border: none; padding: 10px 20px; border-radius: 4px; font-weight: 700; cursor: pointer; }

        .container { padding: 30px 5%; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; padding: 20px; }
        .modal-content { background: var(--card); max-width: 550px; margin: 20px auto; border-radius: 12px; padding: 30px; border: 1px solid var(--gold); position: relative; }
        
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 4px; font-family: 'Cairo'; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        /* زرار رفع الصور */
        .file-label { display: block; padding: 20px; border: 2px dashed var(--border); text-align: center; cursor: pointer; margin-bottom: 15px; color: var(--gold); transition: 0.3s; }
        .file-label:hover { border-color: var(--gold); background: rgba(197, 160, 89, 0.05); }
        
        #previewContainer { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 15px; }
        .preview-img { width: 80px; height: 80px; object-fit: cover; border-radius: 4px; border: 1px solid var(--gold); }
        
        .loading-overlay { display: none; text-align: center; color: var(--gold); margin-bottom: 15px; font-weight: 700; }
    </style>
</head>
<body>

<nav>
    <div class="logo">AL-FAYROUZ</div>
    <button class="add-btn" onclick="openForm()">+ اعرض شقتك (للملاك)</button>
</nav>

<div class="container">
    <div id="data" class="grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
        </div>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <h2 style="color: var(--gold); text-align: center;">إضافة وحدة جديدة</h2>
        <p style="text-align: center; font-size: 0.8rem; color: #888;">بياناتك الشخصية تصل للإدارة فقط ولن تظهر للعلن</p>
        
        <form id="propertyForm" onsubmit="handleSubmit(event)">
            <label>صور الوحدة (يمكنك اختيار أكثر من صورة)</label>
            <input type="file" id="uFiles" accept="image/*" multiple hidden onchange="handleFiles(this)">
            <label for="uFiles" class="file-label" id="fileLabel">📸 اضغط هنا لاختيار الصور</label>
            <div id="previewContainer"></div>
            
            <div class="loading-overlay" id="uploadStatus">⏳ جاري معالجة الصور...</div>

            <div class="row">
                <input type="text" id="uName" placeholder="اسمك" required>
                <input type="tel" id="uPhone" placeholder="رقم موبايلك (سري)" required>
            </div>

            <div class="row">
                <select id="uCity"><option>المنصورة الجديدة</option><option>دمياط الجديدة</option></select>
                <input type="text" id="uProj" placeholder="المشروع" required>
            </div>

            <div class="row">
                <select id="uDir"><option>بحري</option><option>قبلي</option><option>شرقي</option><option>غربي</option></select>
                <input type="number" id="uSpace" placeholder="المساحة" required>
            </div>

            <select id="uType" onchange="toggleFields()">
                <option value="قسط">نظام الأقساط</option>
                <option value="كاش">كاش</option>
            </select>

            <div id="instDiv">
                <div class="row">
                    <input type="number" id="uPaid" placeholder="المدفوع">
                    <input type="number" id="uOver" placeholder="الأوفر">
                </div>
            </div>
            
            <input type="number" id="uTotal" class="hidden" placeholder="إجمالي السعر الكاش" style="display:none">

            <button type="submit" class="add-btn" style="width: 100%; padding: 15px;" id="submitBtn">إرسال الوحدة للمراجعة</button>
            <button type="button" onclick="closeModal()" style="width: 100%; background:none; border:none; color:#888; margin-top:10px; cursor:pointer;">إلغاء</button>
        </form>
    </div>
</div>

<script>
    const IMGBB_KEY = "YOUR_IMGBB_API_KEY"; // احصل عليه من https://api.imgbb.com/
    let uploadedImages = [];

    function handleFiles(input) {
        const container = document.getElementById('previewContainer');
        container.innerHTML = "";
        uploadedImages = [];
        const files = input.files;
        
        for(let file of files) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.createElement('img');
                img.src = e.target.result;
                img.className = 'preview-img';
                container.appendChild(img);
            }
            reader.readAsDataURL(file);
        }
    }

    async function uploadToImgBB(file) {
        const formData = new FormData();
        formData.append("image", file);
        const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
            method: "POST",
            body: formData
        });
        const data = await response.json();
        return data.data.url;
    }

    async function handleSubmit(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('uploadStatus');
        const fileInput = document.getElementById('uFiles');

        if(fileInput.files.length === 0) {
            alert("يرجى إضافة صورة واحدة على الأقل للوحدة");
            return;
        }

        btn.disabled = true;
        status.style.display = "block";

        try {
            // رفع كل الصور المختار واحدة بواحدة
            const imageUrls = [];
            for(let file of fileInput.files) {
                const url = await uploadToImgBB(file);
                imageUrls.push(url);
            }

            let msg = `🏠 *طلب عرض وحدة جديد (للمراجعة)*\n\n`;
            msg += `👤 المالك: ${document.getElementById('uName').value}\n`;
            msg += `📞 موبايل المالك: ${document.getElementById('uPhone').value}\n`;
            msg += `📍 الموقع: ${document.getElementById('uCity').value} - ${document.getElementById('uProj').value}\n`;
            msg += `📐 المساحة: ${document.getElementById('uSpace').value} م\n`;
            msg += `🧭 الاتجاه: ${document.getElementById('uDir').value}\n`;
            
            if(document.getElementById('uType').value === 'كاش') {
                msg += `💰 النظام: كاش\n💵 السعر: ${document.getElementById('uTotal').value}\n`;
            } else {
                msg += `💰 النظام: قسط\n💵 مدفوع: ${document.getElementById('uPaid').value}\n📈 أوفر: ${document.getElementById('uOver').value}\n`;
            }

            msg += `\n🖼️ *روابط الصور:*\n${imageUrls.join('\n')}`;

            window.open("https://wa.me/201212229797?text=" + encodeURIComponent(msg));
            closeModal();
        } catch (error) {
            alert("حدث خطأ أثناء رفع الصور، تأكد من اتصال الإنترنت أو مفتاح API");
        } finally {
            btn.disabled = false;
            status.style.display = "none";
        }
    }

    function toggleFields() {
        const isCash = document.getElementById('uType').value === 'كاش';
        document.getElementById('instDiv').style.display = isCash ? 'none' : 'block';
        document.getElementById('uTotal').style.display = isCash ? 'block' : 'none';
    }

    function openForm() { document.getElementById('addModal').style.display = 'block'; }
    function closeModal() { document.getElementById('addModal').style.display = 'none'; }
</script>
</body>
</html>

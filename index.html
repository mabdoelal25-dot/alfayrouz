<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-FAYROUZ | Real Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-text: #111;
            --sub-text: #666;
            --bg: #ffffff;
            --border: #e5e5e5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--main-text);
            padding: 0 40px;
        }

        /* Nav */
        nav {
            height: 120px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        .nav-link {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-bottom: 1px solid var(--main-text);
            padding-bottom: 5px;
        }

        /* Filters */
        .filter-section {
            padding: 60px 0;
            display: flex;
            gap: 50px;
            align-items: center;
        }

        .filter-btn {
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--sub-text);
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .filter-btn.active {
            color: var(--main-text);
            font-weight: 600;
        }

        .filter-btn.active::after {
            content: '';
            position: absolute;
            bottom: -5px; right: 0; width: 20px; height: 1px;
            background: var(--main-text);
        }

        .sub-filter-row {
            padding-bottom: 40px;
            display: none;
            gap: 20px;
            animation: fadeIn 0.5s ease;
        }

        .chip {
            font-size: 0.75rem;
            padding: 5px 15px;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .chip.active { background: var(--main-text); color: #fff; border-color: var(--main-text); }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            border-top: 1px solid var(--border);
        }

        .card {
            border-bottom: 1px solid var(--border);
            border-left: 1px solid var(--border);
            padding: 40px;
            transition: 0.3s;
        }

        .card:nth-child(3n) { border-left: none; } /* إزالة الحدود الجانبية لكل ثالث عنصر */

        .card:hover { background-color: #f9f9f9; }

        .card-loc { font-size: 0.7rem; letter-spacing: 2px; color: var(--sub-text); text-transform: uppercase; margin-bottom: 10px; }
        .card-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 30px; line-height: 1.2; }
        
        .card-meta { margin-bottom: 40px; }
        .meta-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.85rem; }
        .meta-item span { color: var(--sub-text); }

        .card-footer { display: flex; justify-content: space-between; align-items: flex-end; }
        .price { font-size: 1.2rem; font-weight: 800; }
        .inquiry { font-size: 0.75rem; font-weight: 600; text-decoration: underline; cursor: pointer; }

        /* Modal */
        .modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: #fff; z-index: 2000; flex-direction: column; justify-content: center; align-items: center;
        }
        .modal input { width: 300px; padding: 15px; border: none; border-bottom: 1px solid #000; margin-bottom: 30px; font-family: 'Cairo'; font-size: 1.2rem; }

        #loading { padding: 100px 0; font-size: 0.8rem; letter-spacing: 5px; color: #ccc; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 768px) {
            body { padding: 0 20px; }
            .grid { grid-template-columns: 1fr; }
            .card { border-left: none; padding: 30px 0; }
            .filter-section { gap: 20px; overflow-x: auto; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">Al-Fayrouz</div>
    <div class="nav-link" onclick="toggleModal(true)">Sell Property</div>
</nav>

<div class="filter-section">

    <div class="filter-btn" onclick="mainFilter('المنصورة الجديدة', this)">New Mansoura</div>
    <div class="filter-btn" onclick="mainFilter('دمياط الجديدة', this)">New Damietta</div>
</div>

<div id="filterMansoura" class="sub-filter-row">

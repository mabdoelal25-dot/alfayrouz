<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Al-Fayrouz Real Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00838f; --secondary: #c5a012; --bg-dark: #0f1214; --card-bg: #1c2226; --sold: #ff1100; --available: #39FF14; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; color: #f0f0f0; background: var(--bg-dark); margin: 0; padding: 0; }

        #loadingScreen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .loader-logo { font-family: 'Montserrat'; font-size: 32px; font-weight: 900; color: var(--secondary); animation: pulse 1.2s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        .header-bar { padding: 40px 10px 20px; text-align: center; }
        .company-name { font-family: 'Montserrat', sans-serif; font-size: 38px; font-weight: 900; color: #fff; margin: 0; }
        .company-subtitle { font-size: 14px; color: var(--secondary); font-weight: 800; margin-top: 5px; }

        .container { width: 100%; max-width: 450px; margin: auto; padding: 15px; }
        .section-title { font-size: 22px; color: #fff; font-weight: 900; text-align: center; margin-bottom: 25px; }

        .card-city { background: linear-gradient(135deg, #1c2226 0%, #252d33 100%); border-radius: 20px; padding: 30px 20px; text-align: center; border: 2px solid rgba(197, 160, 18, 0.3); cursor: pointer; margin-bottom: 15px; }
        .card-city h3 { font-size: 28px; font-weight: 900; color: var(--secondary); margin: 0; }
        .card-city p { font-size: 13px; color: #888; margin-top: 8px; font-weight: 700; }

        .apt-card { background: #1c2226; border-radius: 22px; margin-bottom: 25px; overflow: hidden; position: relative; border-right: 8px solid var(--available); }
        .is-sold { border-right: 15px solid var(--sold) !important; opacity: 0.7; }
        
        .img-container { width: 100%; height: 220px; background: #000; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .apt-content { padding: 20px; }
        .region-tag { color: var(--secondary); font-weight: 900; font-size: 18px; display: block; margin-bottom: 5px; }
        .unit-title { font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }

        .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .spec-item { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .s-label { display: block; font-size: 11px; color: #777; font-weight: 700; }
        .s-val { display: block; font-size: 13px; color: #eee; font-weight: 800; }

        .price-card { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; border: 1px solid rgba(197, 160, 18, 0.1); margin-bottom: 15px; }
        .price-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .price-row:last-child { margin-bottom: 0; }
        .p-txt { font-size: 13px; color: #aaa; font-weight: 700; }
        .p-num { font-size: 15px; color: var(--secondary); font-weight: 900; }

        .btn-preview { background: var(--available); color: #000; text-align: center; padding: 16px; border-radius: 15px; font-weight: 900; display: block; text-decoration: none; margin-top: 10px; box-shadow: 0 4px 15px rgba(57,255,20,0.3); }

        .btn-call-fixed { position: fixed; bottom: 25px; left: 25px; width: 55px; height: 55px; background: var(--secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 999; border: 2px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-decoration: none; }
        .btn-call-fixed svg { fill: #fff; width: 25px; height: 25px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loadingScreen"><div class="loader-logo">AL-FAYROUZ</div></div>

    <a href="tel:+201212229797" class="btn-call-fixed">
        <svg viewBox="0 0 24 24"><path d="M20 15.5c-1.2 0-2.4-.2-3.6-.6-.3-.1-.7 0-1 .2l-2.2 2.2c-2.8-1.4-5.1-3.8-6.6-6.6l2.2-2.2c.3-.3.4-.7.2-1-.3-1.1-.5-2.3-.5-3.5 0-.6-.4-1-1-1H4c-.6 0-1 .4-1 1 0 9.4 7.6 17 17 17 .6 0 1-.4 1-1v-3.5c0-.6-.4-1-1-1z"/></svg>
    </a>

    <div class="header-bar">
        <h1 class="company-name">Al-Fayrouz</h1>
        <div class="company-subtitle">الفيروز للعقارات - خبرة نضعها بين يديك</div>
    </div>

    <div class="container">
        <div id="step1">
            <h2 class="section-title">اختر المدينة</h2>
            <div class="card-city" onclick="goToStep2('المنصورة الجديدة')">
                <h3>المنصورة الجديدة</h3>
                <p>مستقبل السكن الفاخر على الساحل مباشرة</p>
            </div>
            <div class="card-city" onclick="goToStep2('دمياط الجديدة')">
                <h3>دمياط الجديدة</h3>
                <p>الهدوء، الرقي، والاستثمار المضمون</p>
            </div>
        </div>

        <div id="step2" class="hidden">
            <div style="display:flex; align-items:center; margin-bottom:25px;">
                <button onclick="goBack(1)" style="background:#333; border:none; color:#fff; padding:10px 20px; border-radius:12px; font-weight:900;">رجوع</button>
                <h2 id="cityTitle" class="section-title" style="flex-grow:1; margin:0;"></h2>
            </div>
            <div id="projectButtons" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;"></div>
        </div>

        <div id="step3" class="hidden">
            <div style="display:flex; align-items:center; margin-bottom:25px;">
                <button onclick="goBack(2)" style="background:#333; border:none; color:#fff; padding:10px 20px; border-radius:12px; font-weight:900;">رجوع</button>
                <h2 id="projectTitle" class="section-title" style="flex-grow:1; margin:0;"></h2>
            </div>
            <div id="apartmentList"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxQsS6y6NgU_HdYXZOKsiV7xyzh7EBvYWLUeOacsqf7ERu93gnVyiOnNDUxqG6UUzcA/exec";
        let allData = [];

        async function fetchD() {
            try {
                const response = await fetch(API_URL + "?v=" + Math.random());
                const data = await response.json();
                allData = data.slice(1);
                document.getElementById('loadingScreen').style.display = 'none';
            } catch(e) { console.error("Error loading data"); }
        }

        function goToStep2(c) {
            window.curCity = c; switchStep('step2');
            document.getElementById('cityTitle').innerText = c;
            let projects = (c === 'المنصورة الجديدة') ? ['جنة', 'سكن مصر', 'زاهية', 'إسكان ساحلي'] : ['جنة', 'سكن مصر', 'دار مصر'];
            let html = '';
            projects.forEach(p => html += `<div onclick="showU('${p}')" style="background:var(--card-bg); padding:25px 10px; border-radius:15px; text-align:center; font-weight:900; border:1px solid #333;">${p}</div>`);
            document.getElementById('projectButtons').innerHTML = html;
        }

        function showU(kw) { switchStep('step3'); document.getElementById('projectTitle').innerText = kw; render(kw); }

        function render(kw) {
            const list = document.getElementById('apartmentList');
            // A=0(المدينة), B=1(المنطقة), C=2(عمارة), D=3(شقة), E=4(دور), F=5(اتجاه), G=6(مدفوع), H=7(أوفر), I=8(سعر متر), J=9(سنين تقسيط), K=10(دفعة قسط), L=11(حالة), M=12(صور), N=13(مساحة), O=14(متبقي سنين)
            let filtered = allData.filter(r => (r[0]||"").toString().trim() === window.curCity && (r[1]||"").toString().includes(kw));
            let h = '';
            filtered.forEach(r => {
                let sold = (r[11]||"").toString().includes("تم البيع");
                let imgRaw = r[12] ? r[12].toString() : "";
                let img = imgRaw ? (imgRaw.includes('id=') ? `https://drive.google.com/thumbnail?sz=1000&id=${imgRaw.split('id=')[1].split('&')[0]}` : imgRaw) : "";
                let msg = encodeURIComponent(`أهلاً الفيروز، استفسار عن:\nالمنطقة: ${r[1]}\nعمارة: ${r[2]} شقة: ${r[3]}`);

                h += `<div class="apt-card ${sold ? 'is-sold' : ''}">
                    ${img ? `<div class="img-container"><img src="${img}" loading="lazy"></div>` : ''}
                    <div class="apt-content">
                        <span class="region-tag">${r[1] || '---'}</span>
                        <div class="unit-title">عمارة ${r[2] || '--'} • شقة ${r[3] || '--'}</div>
                        
                        <div class="specs-grid">
                            <div class="spec-item"><span class="s-label">الدور</span><span class="s-val">${r[4]||'--'}</span></div>
                            <div class="spec-item"><span class="s-label">الاتجاه</span><span class="s-val">${r[5]||'--'}</span></div>
                            <div class="spec-item"><span class="s-label">المساحة</span><span class="s-val">${r[13]||'--'} م</span></div>
                            <div class="spec-item"><span class="s-label">الحالة</span><span class="s-val" style="color:${sold?'red':'#39FF14'}">${sold?'تم البيع':'جاهزة للمعاينة'}</span></div>
                        </div>

                        <div class="price-card">
                            <div class="price-row"><span class="p-txt">المدفوع:</span><span class="p-num">${r[6]||'--'}</span></div>
                            <div class="price-row"><span class="p-txt">الأوفر:</span><span class="p-num" style="color:#ef5350">${r[7]||'--'}</span></div>
                            <div class="price-row"><span class="p-txt">سعر المتر:</span><span class="p-num">${r[8]||'--'}</span></div>
                            <div class="price-row" style="margin-top:8px; padding-top:8px; border-top:1px solid #444;">
                                <span class="p-txt">سنوات التقسيط:</span><span class="p-num">${r[9]||'--'} سنين</span>
                            </div>
                            <div class="price-row"><span class="p-txt">قيمة القسط:</span><span class="p-num">${r[10]||'--'}</span></div>
                            <div class="price-row"><span class="p-txt">المتبقي:</span><span class="p-num" style="color:#39FF14">${r[14]||'--'}</span></div>
                        </div>

                        ${sold ? '<div style="text-align:center;font-weight:900;color:red;font-size

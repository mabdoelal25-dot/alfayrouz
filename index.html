<!DOCTYPE html>
<html dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2KF82HSX13"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-2KF82HSX13');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Al-Fayrouz Real Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;900&family=Montserrat:wght@900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #c5a012; 
            --primary-dark: #8a6d0a;
            --bg-dark: #0a0c0d; 
            --card-bg: #161a1d; 
            --sold: #ff4444; 
            --available: #d4af37; 
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { overflow-x: hidden; width: 100%; margin: 0; padding: 0; scroll-behavior: smooth; }
        body { font-family: 'Cairo', sans-serif; color: #e0e0e0; background: var(--bg-dark); background-image: radial-gradient(circle at top right, #1a1505 0%, #0a0c0d 100%); }

        /* شاشات التحميل والنجاح */
        #loadingScreen, #successScreen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .loader-logo { font-family: 'Montserrat'; font-size: 32px; font-weight: 900; color: var(--primary); animation: pulse-text 1.5s infinite; }
        
        .success-box { background: var(--card-bg); padding: 40px 30px; border-radius: 30px; border: 1px solid var(--primary); box-shadow: 0 0 30px rgba(197,160,18,0.2); max-width: 400px; }
        .success-icon { width: 80px; height: 80px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        .success-title { font-size: 24px; font-weight: 900; color: #fff; margin-bottom: 10px; }
        .success-msg { font-size: 16px; color: #aaa; line-height: 1.6; }

        @keyframes pulse-text { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* المودال (النافذة) */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000; padding: 20px; backdrop-filter: blur(10px); overflow-y: auto; }
        .modal-box { background: var(--card-bg); border-radius: 30px; padding: 30px; border: 1px solid rgba(197, 160, 18, 0.2); max-width: 420px; margin: 20px auto; }
        .modal-box h2 { text-align: center; color: var(--primary); margin-bottom: 25px; font-size: 22px; font-weight: 900; }
        .modal-box input, .modal-box select { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; font-family: 'Cairo'; }
        
        .btn-submit-form { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: #000; width: 100%; padding: 16px; border-radius: 15px; font-weight: 900; border: none; cursor: pointer; font-size: 17px; }

        /* الأزرار والهيدر */
        .add-unit-btn { background: var(--glass); border: 1px solid rgba(197,160,18,0.3); color: var(--primary); border-radius: 20px; padding: 18px; text-align: center; cursor: pointer; margin-bottom: 30px; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .header-bar { padding: 60px 20px 40px; text-align: center; }
        .company-name { font-family: 'Montserrat', sans-serif; font-size: 48px; font-weight: 900; color: #fff; margin: 0; letter-spacing: 4px; }
        .company-subtitle { font-family: 'Cairo', sans-serif; font-size: 18px; color: var(--primary); font-weight: 600; margin-top: 5px; display: block; }

        .container { width: 100%; max-width: 480px; margin: auto; padding: 20px; }
        .section-title { font-size: 20px; color: #fff; font-weight: 700; text-align: right; margin-bottom: 20px; padding-right: 10px; border-right: 4px solid var(--primary); }

        .card-city { background: var(--glass); border-radius: 24px; padding: 35px 25px; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; margin-bottom: 20px; }
        .card-city h3 { font-size: 30px; font-weight: 900; color: #fff; margin: 0; }
        .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card-project { background: var(--card-bg); border-radius: 18px; padding: 25px 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; font-weight: 700; color: #fff; }

        .apt-card { background: var(--card-bg); border-radius: 28px; margin-bottom: 30px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .img-container { width: 100%; height: 250px; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .apt-content { padding: 25px; }
        .apt-title { font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 8px; }
        .apt-specs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .spec-item { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 12px; text-align: center; }
        .spec-value { font-size: 13px; color: #fff; font-weight: 800; }
        .price-box-container { background: #000; padding: 20px; border-radius: 20px; border: 1px solid rgba(197, 160, 18, 0.1); }
        .btn-preview-neon { background: linear-gradient(135deg, #d4af37 0%, #aa8912 100%); color: #000; text-align: center; padding: 18px; border-radius: 15px; cursor: pointer; font-weight: 900; margin-top: 15px; display: block; text-decoration: none; }

        .hidden { display: none !important; }
        .back-btn { background: none; border: 1px solid #333; color: #888; padding: 10px 20px; border-radius: 12px; cursor: pointer; margin-bottom: 20px; font-family: 'Cairo'; }
    </style>
</head>
<body>

    <div id="loadingScreen"><div class="loader-logo">AL-FAYROUZ</div></div>

    <div id="successScreen" class="hidden">
        <div class="success-box">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" width="45" height="45" fill="#000"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            </div>
            <h2 class="success-title">تم استلام طلبك بنجاح</h2>
            <p class="success-msg">ستتم مراجعة كافة البيانات الفنية للوحدة<br>وعرضها في أقرب وقت ممكن.</p>
            <button onclick="location.reload()" class="btn-submit-form" style="margin-top: 25px;">العودة للرئيسية</button>
        </div>
    </div>

    <div id="unitModal" class="modal-overlay">
        <div class="modal-box">
            <h2>تفاصيل الوحدة العقارية</h2>
            <select id="fCity" onchange="updateFProj()">
                <option value="">اختر المدينة</option>
                <option>المنصورة الجديدة</option>
                <option>دمياط الجديدة</option>
            </select>
            <select id="fProj" onchange="checkZahia()">
                <option value="">المشروع</option>
            </select>

            <div id="boxNormal" style="display:flex; gap:10px;">
                <input type="number" id="fBld" placeholder="رقم العمارة">
                <input type="number" id="fUnt" placeholder="رقم الشقة">
            </div>

            <input type="number" id="fVilla" class="hidden" placeholder="رقم الفيلا">
            <input type="text" id="fFloor" placeholder="الدور (أرضي/متكرر)">
            <input type="number" id="fSize" placeholder="المساحة (م²)">
            <input type="tel" id="fPhone" placeholder="رقم الموبايل للتواصل">
            
            <select id="fStatus" onchange="checkCash()">
                <option value="أقساط">نظام السداد: أقساط</option>
                <option value="كاش">نظام السداد: كاش</option>
            </select>

            <div id="boxInstall">
                <div style="display:flex; gap:10px;">
                    <input type="number" id="fPaid" placeholder="المدفوع">
                    <input type="number" id="fOver" placeholder="الأوفر">
                </div>
                <input type="number" id="fTotal" placeholder="الإجمالي المتبقي">
            </div>
            
            <input type="number" id="fCashPrice" class="hidden" placeholder="إجمالي السعر الكاش">
            
            <button class="btn-submit-form" id="submitBtn" onclick="sendUnit()">إرسال الطلب</button>
            <button onclick="closeModal()" style="width:100%; background:none; border:none; color:#555; margin-top:15px; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <div class="header-bar">
        <h1 class="company-name">Al-Fayrouz</h1>
        <span class="company-subtitle">للتسويق العقاري الفاخر</span>
    </div>

    <div class="container">
        <div id="step1">
            <div class="add-unit-btn" onclick="openModal()">
                <span>عرض وحدتك في المعرض</span>
                <span style="font-size: 22px;">+</span>
            </div>
            <h2 class="section-title">الوجهات الاستثمارية</h2>
            <div class="card-city" onclick="goToStep2('المنصورة الجديدة')"><h3>المنصورة الجديدة</h3><p>Luxury Waterfront Living</p></div>
            <div class="card-city" onclick="goToStep2('دمياط الجديدة')"><h3>دمياط الجديدة</h3><p>Elite Urban Investment</p></div>
        </div>

        <div id="step2" class="hidden">
            <button class="back-btn" onclick="goBack(1)">← العودة للمدن</button>
            <div id="projectButtons" class="project-grid"></div>
        </div>

        <div id="step3" class="hidden">
            <button class="back-btn" onclick="goBack(2)">← العودة للمشاريع</button>
            <div id="apartmentList"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxQsS6y6NgU_HdYXZOKsiV7xyzh7EBvYWLUeOacsqf7ERu93gnVyiOnNDUxqG6UUzcA/exec";
        let allData = [];

        function openModal() { document.getElementById('unitModal').style.display = 'block'; }
        function closeModal() { document.getElementById('unitModal').style.display = 'none'; }
        
        function updateFProj() {
            const city = document.getElementById('fCity').value;
            const proj = document.getElementById('fProj');
            let opts = '<option value="">اختر المشروع</option>';
            const maps = { 'المنصورة الجديدة':['جنة','سكن مصر','زاهية','إسكان ساحلي'], 'دمياط الجديدة':['جنة','سكن مصر','دار مصر','أهالي'] };
            if(maps[city]) maps[city].forEach(p => opts += `<option value="${p}">${p}</option>`);
            proj.innerHTML = opts;
            checkZahia();
        }

        function checkZahia() {
            const projValue = document.getElementById('fProj').value;
            const isZahia = projValue === 'زاهية';
            document.getElementById('boxNormal').classList.toggle('hidden', isZahia);
            document.getElementById('fVilla').classList.toggle('hidden', !isZahia);
            const floorInput = document.getElementById('fFloor');
            if(isZahia) { floorInput.classList.add('hidden'); floorInput.value = "فلل"; } 
            else { floorInput.classList.remove('hidden'); }
        }

        function checkCash() {
            const isCash = document.getElementById('fStatus').value === 'كاش';
            document.getElementById('boxInstall').classList.toggle('hidden', isCash);
            document.getElementById('fCashPrice').classList.toggle('hidden', !isCash);
        }

        async function sendUnit() {
            const p = document.getElementById('fProj').value;
            const s = document.getElementById('fStatus').value;
            const phone = document.getElementById('fPhone').value;

            if(!document.getElementById('fCity').value || !p || !phone) {
                alert("الرجاء إكمال كافة المعلومات المطلوبة بدقة.");
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.innerText = "جاري الحفظ...";
            btn.disabled = true;

            const body = {
                city: document.getElementById('fCity').value,
                project: p,
                bld: p === 'زاهية' ? "فيلا" : document.getElementById('fBld').value,
                unit: p === 'زاهية' ? document.getElementById('fVilla').value : document.getElementById('fUnt').value,
                floor: p === 'زاهية' ? "كاملة" : document.getElementById('fFloor').value,
                status: s,
                size: document.getElementById('fSize').value,
                phone: phone,
                paid: s === 'كاش' ? document.getElementById('fCashPrice').value : document.getElementById('fPaid').value,
                over: s === 'كاش' ? "0" : document.getElementById('fOver').value,
                remaining: s === 'كاش' ? "0" : document.getElementById('fTotal').value
            };
            
            fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(body) })
            .then(() => {
                closeModal();
                document.getElementById('successScreen').classList.remove('hidden');
            }).catch(() => {
                alert("حدث خطأ في الاتصال، يرجى المحاولة لاحقاً.");
                btn.disabled = false;
                btn.innerText = "إرسال الطلب";
            });
        }

        async function fetchD() {
            try {
                const response = await fetch(API_URL + "?v=" + Math.random());
                const data = await response.json();
                allData = data.slice(1);
                document.getElementById('loadingScreen').style.display = 'none';
            } catch(e) { console.error(e); }
        }

        function render(kw) {
            const list = document.getElementById('apartmentList');
            let filtered = allData.filter(r => (r[0]||"").toString().trim() === window.curCity && (r[1]||"").toString().includes(kw));
            let h = '';
            filtered.forEach(r => {
                let sold = (r[11]||"").toString().includes("تم البيع");
                const fmt = (v) => isNaN(parseFloat(v)) ? '--' : parseFloat(v).toLocaleString();
                h += `<div class="apt-card ${sold ? 'is-sold' : ''}">
                    <div class="apt-content">
                        <span class="apt-location">${r[1]}</span>
                        <div class="apt-title">${kw === 'زاهية' ? 'فيلا رقم ' + r[3] : 'عمارة ' + r[2] + ' • وحدة ' + r[3]}</div>
                        <div class="apt-specs">
                            <div class="spec-item"><span class="spec-value">${r[13]||'--'} م²</span></div>
                            <div class="spec-item"><span class="spec-value">${r[4]||'--'}</span></div>
                        </div>
                        <div class="price-box-container">
                            <div style="font-size:20px; font-weight:900; color:var(--primary); text-align:center;">${fmt(parseFloat(r[6])+parseFloat(r[7]))} ج.م</div>
                        </div>
                        <a href="https://wa.me/201212229797" class="btn-preview-neon">تواصل للمعاينة</a>
                    </div>
                </div>`;
            });
            list.innerHTML = h || '<div style="text-align:center; padding:50px; color:#666;">لا توجد وحدات متاحة حالياً</div>';
        }

        function goToStep2(c) { window.curCity = c; switchStep('step2'); let projects = c === 'المنصورة الجديدة' ? ['جنة', 'سكن مصر', 'زاهية', 'إسكان ساحلي'] : ['جنة', 'سكن مصر', 'دار مصر', 'أهالي']; let html = ''; projects.forEach(p => html += `<div class="card-project" onclick="showU('${p}')">${p}</div>`); document.getElementById('projectButtons').innerHTML = html; }
        function showU(kw) { switchStep('step3'); render(kw); }
        function switchStep(id) { ['step1','step2','step3'].forEach(s => document.getElementById(s).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); window.scrollTo(0,0); }
        function goBack(s) { switchStep('step' + s); }
        window.onload = fetchD;
    </script>
</body>
</html>

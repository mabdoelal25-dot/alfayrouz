<!DOCTYPE html>
<html dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2KF82HSX13"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-2KF82HSX13');
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>الفيروز للتسويق العقاري | المنصورة الجديدة ودمياط الجديدة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00838f; --secondary: #c5a012; --bg-dark: #0f1214; --card-bg: #1c2226; --available: #39FF14; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Cairo', sans-serif; color: #f0f0f0; background: var(--bg-dark); margin: 0; padding: 0; overflow-x: hidden; }
        #loadingScreen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .loader-logo { font-family: 'Montserrat'; font-size: 30px; font-weight: 900; color: var(--secondary); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1); } }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 50000; padding: 15px; backdrop-filter: blur(10px); align-items: center; justify-content: center; }
        .modal-box { background: var(--card-bg); border-radius: 25px; padding: 20px; border: 1px solid var(--secondary); max-width: 420px; width: 100%; max-height: 90vh; overflow-y: auto; }
        .m-input, .m-select { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; font-family: 'Cairo'; font-size: 14px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-send-data { background: var(--secondary); color: #000; width: 100%; padding: 15px; border-radius: 15px; font-weight: 900; border: none; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-send-data:disabled { background: #222; color: #555; cursor: not-allowed; }
        
        #successState { display: none; text-align: center; padding: 40px 10px; }
        .conf-circle { width: 70px; height: 70px; background: rgba(57, 255, 20, 0.1); border: 2px solid var(--available); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; animation: bounce 1s ease; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-15px);} 60% {transform: translateY(-7px);} }
        .btn-home { background: #fff; color: #000; padding: 12px 25px; border-radius: 12px; text-decoration: none; display: inline-block; margin-top: 20px; font-weight: 900; }
        
        .header-bar { padding: 40px 10px 20px; text-align: center; }
        .company-name { font-family: 'Montserrat'; font-size: 38px; font-weight: 900; color: #fff; margin: 0; }
        .company-subtitle { color: var(--secondary); font-weight: 700; }
        .container { max-width: 450px; margin: auto; padding: 15px; }
        .card-city { background: #1c2226; border-radius: 20px; padding: 25px; text-align: center; border: 1px solid #333; margin-bottom: 15px; cursor: pointer; }
        .card-city h3 { color: var(--secondary); margin: 0; font-size: 24px; }
        .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card-project { background: #1c2226; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #333; cursor: pointer; font-weight: 800; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="loadingScreen"><div class="loader-logo">AL-FAYROUZ</div></div>

    <div id="addUnitModal" class="modal-overlay">
        <div class="modal-box">
            <div id="formContent">
                <h3 style="text-align:center; color:var(--secondary);">إضافة وحدة جديدة</h3>
                <form id="unitForm">
                    <select id="mCity" class="m-select" required onchange="updateMProjects()">
                        <option value="" disabled selected>اختر المدينة</option>
                        <option value="المنصورة الجديدة">المنصورة الجديدة</option>
                        <option value="دمياط الجديدة">دمياط الجديدة</option>
                    </select>
                    <select id="mProject" class="m-select" required>
                        <option value="" disabled selected>اختر المشروع</option>
                    </select>
                    <div class="grid-inputs">
                        <input type="text" id="mBld" class="m-input" placeholder="رقم العمارة" required>
                        <input type="text" id="mApt" class="m-input" placeholder="رقم الشقة" required>
                    </div>
                    <div class="grid-inputs">
                        <input type="text" id="mFloor" class="m-input" placeholder="الدور" required>
                        <input type="text" id="mView" class="m-input" placeholder="الاتجاه" required>
                    </div>
                    <div class="grid-inputs">
                        <input type="number" id="mSize" class="m-input" placeholder="المساحة (م²)" required>
                        <input type="tel" id="mPhone" class="m-input" placeholder="رقم الهاتف" required>
                    </div>
                    <select id="mPayType" class="m-select" required onchange="togglePayFields()">
                        <option value="" disabled selected>نظام السداد</option>
                        <option value="كاش">كاش</option>
                        <option value="أقساط">أقساط</option>
                    </select>

                    <div id="mCashSec" class="hidden">
                        <input type="number" id="mTotalCash" class="m-input" placeholder="السعر المطلوب كاش">
                    </div>

                    <div id="mInstallSec" class="hidden">
                        <div class="grid-inputs">
                            <input type="number" id="mPaid" class="m-input" placeholder="المدفوع">
                            <input type="number" id="mOver" class="m-input" placeholder="الأوفر">
                        </div>
                        <div class="grid-inputs">
                            <input type="number" id="mInstallValue" class="m-input" placeholder="قيمة القسط">
                            <input type="number" id="mInstallYears" class="m-input" placeholder="سنوات التقسيط">
                        </div>
                    </div>

                    <button type="button" id="submitBtn" class="btn-send-data" disabled onclick="submitMUnit()">إرسال للمراجعة</button>
                    <div onclick="closeM()" style="color:#666; text-align:center; margin-top:15px; cursor:pointer;">إلغاء</div>
                </form>
            </div>

            <div id="successState">
                <div class="conf-circle"><span style="font-size:30px;">✅</span></div>
                <h2 style="color:var(--available);">تم الإرسال بنجاح</h2>
                <p style="color:#888;">سيتم مراجعة الوحدة ونشرها خلال دقائق</p>
                <a href="javascript:location.reload()" class="btn-home">حسناً</a>
            </div>
        </div>
    </div>

    <div class="header-bar">
        <h1 class="company-name">Al-Fayrouz</h1>
        <div class="company-subtitle">للتطوير العقاري والمقاولات</div>
    </div>

    <div class="container">
        <div id="step1">
            <div onclick="openM()" style="background:rgba(197, 160, 18, 0.1); border:1px dashed var(--secondary); padding:15px; border-radius:15px; text-align:center; color:var(--secondary); font-weight:900; margin-bottom:20px; cursor:pointer;">🏡 أضف وحدتك معنا مجاناً</div>
            <div class="card-city" onclick="goToStep2('المنصورة الجديدة')"><h3>المنصورة الجديدة</h3></div>
            <div class="card-city" onclick="goToStep2('دمياط الجديدة')"><h3>دمياط الجديدة</h3></div>
        </div>
        <div id="step2" class="hidden">
            <button onclick="goBack(1)" style="color:#fff; background:none; border:1px solid #444; padding:8px 20px; border-radius:10px; margin-bottom:15px;">رجوع</button>
            <div id="projectButtons" class="project-grid"></div>
        </div>
        <div id="step3" class="hidden">
            <button onclick="goBack(2)" style="color:#fff; background:none; border:1px solid #444; padding:8px 20px; border-radius:10px; margin-bottom:15px;">رجوع</button>
            <div id="apartmentList"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxQsS6y6NgU_HdYXZOKsiV7xyzh7EBvYWLUeOacsqf7ERu93gnVyiOnNDUxqG6UUzcA/exec";
        
        function openM() { document.getElementById('addUnitModal').style.display = 'flex'; }
        function closeM() { document.getElementById('addUnitModal').style.display = 'none'; }

        // التحقق من البيانات لفتح زر الإرسال
        function validate() {
            const city = document.getElementById('mCity').value;
            const project = document.getElementById('mProject').value;
            const bld = document.getElementById('mBld').value;
            const apt = document.getElementById('mApt').value;
            const phone = document.getElementById('mPhone').value;
            const size = document.getElementById('mSize').value;
            const payType = document.getElementById('mPayType').value;
            
            let isCommonValid = city && project && bld && apt && phone && size && payType;
            let isPayValid = false;

            if (payType === 'كاش') {
                isPayValid = document.getElementById('mTotalCash').value !== "";
            } else if (payType === 'أقساط') {
                isPayValid = document.getElementById('mPaid').value !== "" && 
                             document.getElementById('mOver').value !== "" && 
                             document.getElementById('mInstallValue').value !== "" && 
                             document.getElementById('mInstallYears').value !== "";
            }

            document.getElementById('submitBtn').disabled = !(isCommonValid && isPayValid);
        }

        // ربط الـ validate بكل المدخلات
        document.querySelectorAll('.m-input, .m-select').forEach(el => {
            el.addEventListener('input', validate);
        });

        function updateMProjects() {
            const city = document.getElementById('mCity').value, proj = document.getElementById('mProject');
            proj.innerHTML = '<option value="" disabled selected>اختر المشروع</option>';
            let list = city === 'المنصورة الجديدة' ? ['جنة', 'سكن مصر', 'زاهية', 'إسكان ساحلي'] : ['جنة', 'سكن مصر', 'دار مصر', 'أهالي'];
            list.forEach(p => proj.innerHTML += `<option value="${p}">${p}</option>`);
        }

        function togglePayFields() {
            const type = document.getElementById('mPayType').value;
            document.getElementById('mCashSec').classList.toggle('hidden', type !== 'كاش');
            document.getElementById('mInstallSec').classList.toggle('hidden', type !== 'أقساط');
            validate();
        }

        async function submitMUnit() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "جاري الإرسال...";
            
            // تحويل فوري لصفحة النجاح لتحسين تجربة المستخدم
            document.getElementById('formContent').style.display = 'none';
            document.getElementById('successState').style.display = 'block';

            const data = {
                action: "addUnit",
                city: document.getElementById('mCity').value,
                project: document.getElementById('mProject').value,
                bld: document.getElementById('mBld').value,
                apt: document.getElementById('mApt').value,
                phone: document.getElementById('mPhone').value,
                payType: document.getElementById('mPayType').value,
                cash: document.getElementById('mTotalCash').value,
                paid: document.getElementById('mPaid').value,
                over: document.getElementById('mOver').value,
                years: document.getElementById('mInstallYears').value,
                instVal: document.getElementById('mInstallValue').value
            };

            try {
                fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            } catch(e) { console.log("Sent"); }
        }

        function goToStep2(c) { window.curCity = c; document.getElementById('step1').classList.add('hidden'); document.getElementById('step2').classList.remove('hidden'); updateStep2Buttons(); }
        function updateStep2Buttons() {
            let projects = window.curCity === 'المنصورة الجديدة' ? ['جنة', 'سكن مصر', 'زاهية'] : ['جنة', 'سكن مصر', 'دار مصر'];
            let h = ''; projects.forEach(p => h += `<div class="card-project" onclick="alert('سيتم عرض الوحدات قريباً')">${p}</div>`);
            document.getElementById('projectButtons').innerHTML = h;
        }
        function goBack(s) { document.getElementById('step2').classList.add('hidden'); document.getElementById('step3').classList.add('hidden'); document.getElementById('step'+s).classList.remove('hidden'); }
        
        window.onload = () => { document.getElementById('loadingScreen').style.display = 'none'; };
    </script>
</body>
</html>

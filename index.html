<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-FAYROUZ | الفخامة العقارية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #080808;
            --card-bg: #111111;
            --border: rgba(212, 175, 55, 0.1);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--dark);
            color: #fff;
            margin: 0;
            padding-bottom: 50px;
        }

        /* هيدر بسيط وفخم */
        header {
            padding: 60px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 10px;
            margin: 0;
            color: #fff;
        }

        .container { max-width: 1100px; margin: auto; padding: 0 20px; }

        /* منطقة اختيار المدن (بدل الزراير الوحشة) */
        .city-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: -30px auto 40px;
        }

        .selector-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .selector-item i { font-size: 2rem; display: block; margin-bottom: 10px; opacity: 0.5; }
        .selector-item span { font-size: 0.9rem; font-weight: 400; letter-spacing: 1px; color: #888; }

        .selector-item.active {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.05);
            transform: translateY(-5px);
        }

        .selector-item.active span { color: var(--gold); font-weight: 700; }
        .selector-item.active i { opacity: 1; color: var(--gold); }

        /* المشاريع الفرعية - بتصميم راقي */
        .project-filter {
            display: none;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 40px;
            padding: 10px;
            border-top: 1px solid var(--border);
            animation: fadeIn 0.6s ease;
        }

        .project-chip {
            padding: 8px 20px;
            font-size: 0.8rem;
            background: transparent;
            color: #666;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: 0.3s;
        }

        .project-chip.active {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
        }

        /* كروت العقارات */
        .property-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .prop-card {
            background: var(--card-bg);
            padding: 35px;
            border: 1px solid var(--border);
            transition: 0.4s;
        }

        .prop-card:hover { border-color: var(--gold); box-shadow: 0 10px 40px rgba(0,0,0,0.6); }

        .prop-card h3 { font-size: 1.5rem; margin: 0 0 20px; font-weight: 700; }
        
        .prop-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.85rem;
            color: #666;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            padding-bottom: 8px;
        }

        .prop-info b { color: #ccc; }

        .price-box {
            text-align: center;
            margin-top: 30px;
        }

        .price-tag { font-size: 1.8rem; font-weight: 900; color: var(--gold); margin-bottom: 20px; }

        .contact-btn {
            background: transparent;
            color: #fff;
            border: 1px solid #fff;
            padding: 12px;
            width: 100%;
            font-family: 'Cairo';
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .contact-btn:hover { background: #fff; color: #000; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #loading { text-align: center; padding: 100px; color: var(--gold); letter-spacing: 5px; font-weight: 200; }
    </style>
</head>
<body>

<header>
    <h1 class="logo">AL-FAYROUZ</h1>
</header>

<div class="container">
    <div class="city-selector">
        <div class="selector-item active" onclick="mainFilter('الكل', this)">
            <i>🌐</i>
            <span>الكل</span>
        </div>
        <div class="selector-item" onclick="mainFilter('المنصورة الجديدة', this)">
            <i>🏙️</i>
            <span>المنصورة الجديدة</span>
        </div>
        <div class="selector-item" onclick="mainFilter('دمياط الجديدة', this)">
            <i>🌊</i>
            <span>دمياط الجديدة</span>
        </div>
    </div>

    <div id="filterMansoura" class="project-filter">
        <button class="project-chip" onclick="subFilter('جنة', this)">جنة</button>
        <button class="project-chip" onclick="subFilter('سكن مصر', this)">سكن مصر</button>
        <button class="project-chip" onclick="subFilter('إسكان ساحلي', this)">إسكان ساحلي</button>
    </div>

    <div id="filterDamietta" class="project-filter">
        <button class="project-chip" onclick="subFilter('جنة', this)">جنة</button>
        <button class="project-chip" onclick="subFilter('سكن مصر', this)">سكن مصر</button>
        <button class="project-chip" onclick="subFilter('دار مصر', this)">دار مصر</button>
    </div>

    <div id="loading">COLLECTING DATA...</div>
    <div id="data" class="property-grid"></div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxiPcSexC05MJVeFohzNaNex4oDW0rVylIjAXSsV9BD1QP7v9Esg3xO8CtUh_yOOV6g/exec";
let allData = [];
let currentCity = "الكل";

fetch(URL).then(r => r.json()).then(d => {
    allData = d.filter(row => row[1] && row[1] !== "المشروع");
    document.getElementById("loading").style.display = "none";
    render(allData);
});

function render(list) {
    let html = "";
    list.forEach((row, i) => {
        html += `
        <div class="prop-card">
            <div style="font-size:10px; color:#333; margin-bottom:10px;">REF: ${i+101}</div>
            <h3>عمارة ${row[2]} | وحدة ${row[3]}</h3>
            <div class="prop-info">الموقع <b>${row[0]}</b></div>
            <div class="prop-info">المشروع <b>${row[1]}</b></div>
            <div class="prop-info">المساحة <b>${row[5]} م²</b></div>
            <div class="prop-info">الطابق <b>${row[4]}</b></div>
            <div class="price-box">
                <div class="price-tag">${row[7] || 'REQUEST'}</div>
                <button class="contact-btn" onclick="contact('${row[1]}','${row[7]}','${row[2]}','${row[3]}')">CONTACT AGENT</button>
            </div>
        </div>`;
    });
    document.getElementById("data").innerHTML = html;
}

function mainFilter(city, el) {
    currentCity = city;
    document.querySelectorAll('.selector-item').forEach(item => item.classList.remove('active'));
    el.classList.add('active');
    
    document.getElementById('filterMansoura').style.display = 'none';
    document.getElementById('filterDamietta').style.display = 'none';

    if(city === 'الكل') {
        render(allData);
    } else {
        const filterId = city === 'المنصورة الجديدة' ? 'filterMansoura' : 'filterDamietta';
        document.getElementById(filterId).style.display = 'flex';
        render(allData.filter(r => r[0].includes(city)));
    }
}

function subFilter(proj, btn) {
    document.querySelectorAll('.project-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(allData.filter(r => r[0].includes(currentCity) && r[1].includes(proj)));
}

function contact(p, s, b, u){
    let msg = ` Inquiry: AL-FAYROUZ ESTATE \n Project: ${p} \n Building: ${b} | Unit: ${u} \n Price: ${s}`;
    window.open("https://wa.me/201212229797?text=" + encodeURIComponent(msg));
}
</script>
</body>
</html>

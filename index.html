    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxQsS6y6NgU_HdYXZOKsiV7xyzh7EBvYWLUeOacsqf7ERu93gnVyiOnNDUxqG6UUzcA/exec";
        let allData = [];
        let currentCity = "";
        let isDataLoading = false;

        async function prefetchData() {
            if (isDataLoading) return;
            isDataLoading = true;
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                allData = data.slice(1);
                console.log("تم جلب البيانات بنجاح");
                
                // إذا كان المستخدم واقفا داخل مشروع والبيانات وصلت الآن، قم بتحديث الشاشة فوراً
                if (!document.getElementById('step3').classList.contains('hidden')) {
                    const currentKeyword = document.getElementById('projectTitle').innerText;
                    showUnits(currentKeyword);
                }
            } catch (e) { 
                console.error("خطأ في الاتصال بالسيرفر");
            } finally {
                isDataLoading = false;
            }
        }

        function goToStep2(city) {
            currentCity = city;
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            document.getElementById('cityTitle').innerText = city;

            let projects = (city === 'المنصورة الجديدة') ? 
                ['جنة', 'سكن مصر', 'زاهية', 'إسكان ساحلي'] : ['جنة', 'دار مصر'];

            let html = '';
            projects.forEach(p => {
                html += `<div class="project-card" onclick="showUnits('${p}')"><h3>${p}</h3><p>عرض الوحدات</p></div>`;
            });
            document.getElementById('projectButtons').innerHTML = html;
        }

        function showUnits(keyword) {
            window.scrollTo(0,0);
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.remove('hidden');
            document.getElementById('projectTitle').innerText = keyword;
            
            // حالة 1: البيانات لسه موصلتش من السيرفر
            if (allData.length === 0) {
                document.getElementById('apartmentList').innerHTML = "<h3 style='text-align:center; width:100%; color:#b59410;'>✨ جاري جلب أحدث الوحدات... لحظات</h3>";
                prefetchData(); // التأكد من تشغيل الجلب
                return;
            }

            // حالة 2: البيانات موجودة، ابدأ الفلترة
            let filtered = allData.filter(row => {
                let rowCity = row[0] ? row[0].toString().trim() : "";
                let rowProject = row[1] ? row[1].toString().trim() : "";
                return rowCity === currentCity && rowProject.includes(keyword);
            });

            let html = '';
            const formatNum = (num) => (num === "" || isNaN(num)) ? "--" : Number(num).toLocaleString('ar-EG');

            if (filtered.length === 0) {
                html = "<h3 style='text-align:center; width:100%;'>لا توجد وحدات متاحة حالياً في " + keyword + "</h3>";
            } else {
                filtered.forEach(row => {
                    let msg = `استفسار من موقع الفيروز:\nالمدينة: ${currentCity}\nالمشروع: ${row[1]}\nعمارة: ${row[2]}\nشقة: ${row[3]}`;
                    let waLink = `https://api.whatsapp.com/send?phone=201212229797&text=${encodeURIComponent(msg)}`;
                    html += `
                    <div class="apt-card">
                        <div style="color:white; font-weight:700; font-size:18px;">عمارة ${row[2] || '--'} - شقة ${row[3] || '--'}</div>
                        <div style="font-size:13px; color:#aaa; margin-top:5px;">📍 الدور: ${row[4] || '--'} | الاتجاه: ${row[5] || '--'}</div>
                        <div style="margin-top:10px; border-top:1px solid #333; padding-top:10px;">
                            <div style="display:flex; justify-content:space-between;">
                                <span>المدفوع:</span> <span style="color:var(--secondary); font-weight:bold;">${formatNum(row[6])} ج.م</span>
                            </div>
                            <div style="display:flex; justify-content:space-between;">
                                <span>الأوفر:</span> <span style="color:#ef5350; font-weight:bold;">${formatNum(row[7])} ج.م</span>
                            </div>
                        </div>
                        <a href="${waLink}" target="_blank" class="btn-inquire">استفسار واتساب</a>
                    </div>`;
                });
            }
            document.getElementById('apartmentList').innerHTML = html;
        }

        function goBack(step) {
            if (step === 1) {
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step1').classList.remove('hidden');
            } else {
                document.getElementById('step3').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
            }
        }

        window.onload = prefetchData;
    </script>

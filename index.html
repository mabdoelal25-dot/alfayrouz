<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Al-Fayrouz</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00838f; --secondary: #c5a012; --bg-dark: #0f1214; --card-bg: #1c2226; --sold: #ef5350; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; margin: 0; padding: 0; color: #f0f0f0; background: var(--bg-dark); overflow-x: hidden; width: 100%; }
        
        .header-bar { padding: 45px 10px 25px; text-align: center; background: linear-gradient(to bottom, #161d21, var(--bg-dark)); }
        .company-name { font-family: 'Montserrat', sans-serif; font-size: 38px; font-weight: 900; color: #fff; margin: 0; letter-spacing: 2px; text-transform: uppercase; }
        .company-subtitle { font-size: 16px; color: var(--secondary); font-weight: 700; margin-top: 5px; }

        .container { width: 100%; max-width: 500px; margin: auto; padding: 15px; }
        .top-nav { display: flex; align-items: center; margin-bottom: 20px; }
        .btn-back-top { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 8px 16px; border-radius: 12px; cursor: pointer; font-weight: 800; }
        .section-title { font-size: 24px; color: #fff; font-weight: 900; flex-grow: 1; text-align: center; margin: 0; }

        .units-counter { background: rgba(197, 160, 18, 0.15); color: var(--secondary); text-align: center; padding: 12px; border-radius: 12px; margin-bottom: 15px; font-size: 15px; font-weight: 900; border: 1px dashed var(--secondary); }

        .card-city { background: linear-gradient(135deg, #1c2226 0%, #252d33 100%); border-radius: 20px; padding: 45px 20px; text-align: center; border: 2px solid rgba(197, 160, 18, 0.3); cursor: pointer; margin-bottom: 15px; }
        .card-city h3 { font-size: 32px; font-weight: 900; color: var(--secondary); margin: 0 0 10px 0; line-height: 1.2; }
        .card-city p { font-size: 16px; color: #ccc; margin: 0; }

        .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card-project { background: var(--card-bg); border-radius: 18px; padding: 30px 10px; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .card-project h3 { font-size: 20px; font-weight: 900; margin: 0; color: #fff; }

        .apt-card { background: #1c2226; border-radius: 18px; padding: 0; margin-bottom: 15px; border-right: 5px solid var(--primary); position: relative; overflow: hidden; }
        .apt-content { padding: 20px; }
        .img-container { width: 100%; height: 210px; background: #000; overflow: hidden; position: relative; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .apt-title { font-size: 19px; font-weight: 900; color: #fff; margin-bottom: 5px; }
        .apt-subtitle { font-size: 14px; color: #bbb; margin-bottom: 15px; font-weight: 700; }
        .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 13px; color: #ccc; margin-bottom: 15px; font-weight: 700; }
        
        .price-box { display: flex; justify-content: space-between; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.08); }
        .price-val { font-size: 17px; font-weight: 900; color: var(--secondary); }

        .float-call { position: fixed; bottom: 25px; left: 25px; width: 65px; height: 65px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 20px rgba(0,0,0,0.6); z-index: 1000; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .skeleton { background: #1c2226; border-radius: 18px; height: 180px; margin-bottom: 15px; position: relative; overflow: hidden; }
        .skeleton::after { content: ""; position: absolute; top: 0; right: 0; bottom: 0; left: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); animation: wave 1.5s infinite; }
        @keyframes wave { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .is-sold { opacity: 0.6; filter: grayscale(0.8); pointer-events: none; }
        .sold-badge { position: absolute; top: 15px; left: -35px; background: var(--sold); color: #fff; padding: 7px 40px; transform: rotate(-45deg); font-weight: 900; font-size: 11px; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .btn-wa { background: #25d366; color: #fff; text-align: center; padding: 15px; border-radius: 14px; text-decoration: none; display: block; font-weight: 900; margin-top: 15px; font-size: 16px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header-bar">
        <h1 class="company-name">Al-Fayrouz</h1>
        <div class="company-subtitle">الفيروز للعقارات</div>
    </div>

    <a href="tel:01212229797" class="float-call">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="#fff"><path d="M20 15.5c-1.2 0-2.4-.2-3.6-.6-.3-.1-.7 0-1 .2l-2.2 2.2c-2.8-1.4-5.1-3.8-6.6-6.6l2.2-2.2c.3-.3.4-.7.2-1-.3-1.1-.5-2.3-.5-3.5 0-.6-.4-1-1-1H4c-.6 0-1 .4-1 1 0 9.4 7.6 17 17 17 .6 0 1-.4 1-1v-3.5c0-.6-.4-1-1-1z"/></svg>
    </a>

    <div class="container">
        <div id="step1">
            <h2 class="section-title" style="margin-bottom:25px;">اختر وجهتك العقارية</h2>
            <div class="grid-box">
                <div class="card-city" onclick="goToStep2('المنصورة الجديدة')"><h3>المنصورة الجديدة</h3><p>وجهة الفخامة الساحلية</p></div>
                <div class="card-city" onclick="goToStep2('دمياط الجديدة')"><h3>دمياط الجديدة</h3><p>الهدوء والسكن الراقي</p></div>
            </div>
        </div>

        <div id="step2" class="hidden">
            <div class="top-nav">
                <button class="btn-back-top" onclick="goBack(1)">→ رجوع</button>
                <h2 id="cityTitle" class="section-title"></h2>
            </div>
            <div id="projectButtons" class="project-grid"></div>
        </div>

        <div id="step3" class="hidden">
            <div class="top-nav">
                <button class="btn-back-top" onclick="goBack(2)">→ رجوع</button>
                <h2 id="projectTitle" class="section-title"></h2>
            </div>
            <div id="unitCounter" class="units-counter">جاري فحص الوحدات...</div>
            <div id="apartmentList"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxQsS6y6NgU_HdYXZOKsiV7xyzh7EBvYWLUeOacsqf7ERu93gnVyiOnNDUxqG6UUzcA/exec";
        let allData = [];
        let curCity = "";

        async function fetchD() {
            if (allData.length > 0) return;
            try {
                const r = await fetch(API_URL);
                const d = await r.json();
                allData = d.slice(1);
            } catch(e) { console.error("Error fetching data"); }
        }

        function goToStep2(c) {
            curCity = c;
            switchStep('step2');
            document.getElementById('cityTitle').innerText = c;
            let projects = (c === 'المنصورة الجديدة') ? ['جنة', 'سكن مصر', 'زاهية', 'إسكان ساحلي'] : ['جنة', 'سكن مصر', 'دار مصر'];
            let html = '';
            projects.forEach(p => {
                html += `<div class="card-project" onclick="showU('${p}')"><h3>${p}</h3><p>عرض الوحدات</p></div>`;
            });
            document.getElementById('projectButtons').innerHTML = html;
        }

        function showU(kw) {
            switchStep('step3');
            document.getElementById('projectTitle').innerText = kw;
            render(kw);
        }

        function render(kw) {
            const list = document.getElementById('apartmentList');
            const counter = document.getElementById('unitCounter');
            
            if (allData.length === 0) {
                list.innerHTML = `<div class="skeleton"></div><div class="skeleton"></div>`;
                fetchD().then(() => render(kw));
                return;
            }

            let filtered = allData.filter(r => (r[0]||"").toString().trim() === curCity && (r[1]||"").toString().includes(kw));
            let availableCount = filtered.filter(r => !(r[11]||"").toString().includes("تم البيع")).length;
            counter.innerText = `متاح حالياً ${availableCount} وحدات في ${kw}`;

            filtered.sort((a, b) => ((a[11]||"").includes("تم البيع") ? 1 : 0) - ((b[11]||"").includes("تم البيع") ? 1 : 0));

            if (filtered.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding:30px;">لا توجد وحدات متاحة حالياً</div>`;
                counter.classList.add('hidden');
                return;
            } else { counter.classList.remove('hidden'); }

            let h = '';
            filtered.forEach(r => {
                let isSold = (r[11] || "").toString().includes("تم البيع");
                let rawUrl = (r[12] || "").toString().trim();
                let area = r[13] || "غير محدد";
                let remainQust = (r[14] || "").toString().trim(); // حرف O
                let installmentVal = (r[10] || "").toString().trim(); // حرف K
                
                // فحص كلمة "خالصة"
                let isFinished = installmentVal === "خالصة";

                let msg = encodeURIComponent(`استفسار عن عمارة ${r[2]} شقة ${r[3]} في مشروع ${r[1]} - ${curCity}`);
                
                let finalImg = "";
                if (rawUrl) {
                    if (rawUrl.includes('drive.google.com')) {
                        let fileId = rawUrl.includes('id=') ? rawUrl.split('id=')[1].split('&')[0] : rawUrl.split('/d/')[1].split('/')[0];
                        finalImg = `https://drive.google.com/thumbnail?sz=w1000&id=${fileId}`;
                    } else { finalImg = rawUrl; }
                }

                h += `
                <div class="apt-card ${isSold ? 'is-sold' : ''}">
                    ${isSold ? '<div class="sold-badge">تم البيع</div>' : ''}
                    ${finalImg ? `<div class="img-container"><img src="${finalImg}" loading="lazy"></div>` : ''}
                    <div class="apt-content">
                        <div class="apt-title">عمارة ${r[2]} • شقة ${r[3]}</div>
                        <div class="apt-subtitle">📍 ${r[1]} | ${r[4]} | ${r[5]}</div>
                        
                        <div class="specs-grid">
                            <div>📏 المساحة: ${area} م</div>
                            ${!isFinished ? `<div>🕒 التقسيط: ${r[9]} سنوات</div>` : '<div>🕒 الحالة: خالصة</div>'}
                            ${!isFinished ? `<div>💰 القسط: ${installmentVal}</div>` : ''}
                        </div>

                        ${(!isFinished && remainQust !== "") ? `
                        <div style="background: rgba(197, 160, 18, 0.1); padding: 12px; border-radius: 10px; margin-bottom: 15px; border-right: 4px solid var(--secondary);">
                            <span style="font-size: 12px; color: #aaa; display: block; font-weight:800;">متبقي كم قسط:</span>
                            <span style="font-size: 16px; color: #fff; font-weight: 900;">${remainQust}</span>
                        </div>` : ''}

                        <div class="price-box">
                            <div class="price-item"><span class="price-label">المدفوع</span><span class="price-val">${r[6]}</span></div>
                            <div class="price-item"><span class="price-label">الأوفر</span><span class="price-val" style="color:#ef5350">${r[7]}</span></div>
                        </div>

                        ${isSold ? '<span style="display:block; text-align:center; color:var(--sold); font-weight:900; margin-top:10px;">تم البيع بحمد الله</span>' : `<a href="https://wa.me/201212229797?text=${msg}" class="btn-wa">تواصل عبر واتساب</a>`}
                    </div>
                </div>`;
            });
            list.innerHTML = h;
        }

        function switchStep(id) {
            ['step1','step2','step3'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            window.scrollTo(0,0);
        }
        function goBack(s) { switchStep('step' + s); }
        window.onload = fetchD;
    </script>
</body>
</html>

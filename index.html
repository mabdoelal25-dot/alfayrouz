<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-FAYROUZ LUXURY</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--dark);
            color: #fff;
            margin: 0;
            overflow-x: hidden;
        }

        /* هيدر سينمائي ضخم */
        header {
            height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.6), var(--dark)), 
                        url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1600') center/cover;
            text-align: center;
        }

        .logo-text {
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 900;
            letter-spacing: 15px;
            margin: 0;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* حاوية الفلاتر - شكل مودرن */
        .main-nav {
            max-width: 900px;
            margin: -50px auto 40px;
            padding: 20px;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: transparent;
            color: #666;
            border: 1px solid transparent;
            padding: 10px 25px;
            cursor: pointer;
            font-family: 'Cairo';
            font-weight: 400;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-btn.active {
            color: var(--gold);
            border-bottom: 2px solid var(--gold);
        }

        /* الفلاتر الفرعية - مظهر زجاجي */
        .sub-nav {
            display: none;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            animation: fadeIn 0.5s ease;
        }

        /* كروت العقارات */
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .property-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 40px 30px;
            transition: 0.5s cubic-bezier(0.2, 1, 0.2, 1);
            position: relative;
        }

        .property-card:hover {
            background: rgba(255,255,255,0.06);
            border-color: var(--gold);
            transform: translateY(-10px);
        }

        .property-card h3 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0 0 20px 0;
            color: #fff;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            padding: 12px 0;
            font-size: 0.9rem;
            color: #888;
        }

        .detail-item span { color: #ccc; font-weight: 700; }

        .price-section {
            margin-top: 30px;
            text-align: center;
        }

        .price-value {
            font-size: 2rem;
            font-weight: 900;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .action-btn {
            background: transparent;
            color: #fff;
            border: 1px solid #fff;
            padding: 15px 40px;
            width: 100%;
            cursor: pointer;
            font-family: 'Cairo';
            font-weight: 700;
            transition: 0.3s;
        }

        .action-btn:hover {
            background: #fff;
            color: #000;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #loading { text-align: center; color: var(--gold); padding: 100px; letter-spacing: 5px; }
    </style>
</head>
<body>

<header>
    <div class="logo-text">AL-FAYROUZ</div>
    <div style="color:var(--gold); font-weight:200; letter-spacing:5px;">REAL ESTATE</div>
</header>

<div class="main-nav">
    <button class="nav-btn active" onclick="mainFilter('الكل', this)">الكل</button>
    <button class="nav-btn" onclick="mainFilter('المنصورة الجديدة', this)">المنصورة الجديدة</button>
    <button class="nav-btn" onclick="mainFilter('دمياط الجديدة', this)">دمياط الجديدة</button>
</div>

<div id="subMansoura" class="sub-nav">
    <button class="nav-btn" onclick="subFilter('جنة', this)">جنة</button>
    <button class="nav-btn" onclick="subFilter('سكن مصر', this)">سكن مصر</button>
    <button class="nav-btn" onclick="subFilter('إسكان ساحلي', this)">إسكان ساحلي</button>
</div>

<div id="subDamietta" class="sub-nav">
    <button class="nav-btn" onclick="subFilter('جنة', this)">جنة</button>
    <button class="nav-btn" onclick="subFilter('سكن مصر', this)">سكن مصر</button>
    <button class="nav-btn" onclick="subFilter('دار مصر', this)">دار مصر</button>
</div>

<div class="container">
    <div id="loading">LOADING COLLECTION...</div>
    <div id="data" class="grid"></div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxiPcSexC05MJVeFohzNaNex4oDW0rVylIjAXSsV9BD1QP7v9Esg3xO8CtUh_yOOV6g/exec";
let allData = [];
let currentCity = "الكل";

fetch(URL).then(res => res.json()).then(data => {
    allData = data.filter(row => row[1] && row[1] !== "المشروع");
    document.getElementById("loading").style.display = "none";
    render(allData);
});

function render(list) {
    let html = "";
    list.forEach((row, i) => {
        html += `
        <div class="property-card">
            <div style="font-size:10px; color:#444; margin-bottom:10px;">ID: F-2026-${i+1}</div>
            <h3>عمارة ${row[2]} | وحدة ${row[3]}</h3>
            <div class="detail-item">الموقع <span>${row[0]}</span></div>
            <div class="detail-item">المشروع <span>${row[1]}</span></div>
            <div class="detail-item">المساحة <span>${row[5]} m²</span></div>
            <div class="detail-item">الطابق <span>${row[4]}</span></div>
            <div class="price-section">
                <div class="price-value">${row[7] || 'REQUEST PRICE'}</div>
                <button class="action-btn" onclick="contact('${row[1]}','${row[7]}','${row[2]}','${row[3]}')">CONTACT AGENT</button>
            </div>
        </div>`;
    });
    document.getElementById("data").innerHTML = html;
}

function mainFilter(city, btn) {
    currentCity = city;
    document.querySelectorAll('.main-nav .nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    document.getElementById('subMansoura').style.display = 'none';
    document.getElementById('subDamietta').style.display = 'none';

    if(city === 'الكل') {
        render(allData);
    } else {
        const targetSub = city === 'المنصورة الجديدة' ? 'subMansoura' : 'subDamietta';
        document.getElementById(targetSub).style.display = 'flex';
        render(allData.filter(r => r[0].includes(city)));
    }
}

function subFilter(proj, btn) {
    document.querySelectorAll('.sub-nav .nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(allData.filter(r => r[0].includes(currentCity) && r[1].includes(proj)));
}

function contact(p, s, b, u){
    let msg = ` Inquiry: AL-FAYROUZ ESTATE \n Project: ${p} \n Building: ${b} | Unit: ${u} \n Price: ${s}`;
    window.open("https://wa.me/201212229797?text=" + encodeURIComponent(msg));
}
</script>
</body>
</html>

<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AL-FAYROUZ | الفيروز للعقارات</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Cairo', sans-serif;
    background: #0f1113;
    color: #fff;
    margin: 0;
}

header {
    text-align: center;
    padding: 40px;
}

.logo {
    font-size: 40px;
    font-weight: 900;
    color: gold;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #1a1c20;
    padding: 20px;
    margin: 15px 0;
    border: 1px solid #333;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
}

button {
    background: gold;
    border: none;
    padding: 10px;
    cursor: pointer;
    width: 100%;
}

#loading {
    text-align: center;
    margin-top: 20px;
}
</style>
</head>

<body>

<header>
<h1 class="logo">AL-FAYROUZ</h1>
<p>عقارات فاخرة</p>
</header>

<div class="container">
<h2>الوحدات المتاحة</h2>

<div id="loading">⏳ جاري تحميل البيانات...</div>
<div id="data"></div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbxiPcSexC05MJVeFohzNaNex4oDW0rVylIjAXSsV9BD1QP7v9Esg3xO8CtUh_yOOV6g/exec";

fetch(URL)
.then(function(res){
    return res.json();
})
.then(function(data){

    document.getElementById("loading").style.display = "none";

    let html = "";

    for(let i = 1; i < data.length; i++){

        let row = data[i];

        html += "<div class='card'>";

        html += "<h3>" + row[1] + "</h3>";
        html += "<p>📍 المدينة: " + row[0] + "</p>";
        html += "<p>📐 المساحة: " + row[2] + "</p>";
        html += "<p>🏢 الدور: " + row[3] + "</p>";
        html += "<p>💰 السعر: " + row[4] + "</p>";

        html += "<button onclick="contact('" + row[1] + "','" + row[4] + "','" + row[0] + "')">";
        html += "تواصل واتساب";
        html += "</button>";

        html += "</div>";
    }

    document.getElementById("data").innerHTML = html;

})
.catch(function(error){
    document.getElementById("loading").innerText = "❌ حصل خطأ في تحميل البيانات";
    console.log(error);
});

function contact(name, price, city){

    let msg = "السلام عليكم 👋\n";
    msg += "مهتم بوحدة:\n\n";
    msg += "🏠 " + name + "\n";
    msg += "📍 " + city + "\n";
    msg += "💰 " + price;

    let url = "https://wa.me/201212229797?text=" + encodeURIComponent(msg);

    window.open(url);
}

</script>

</body>
</html>

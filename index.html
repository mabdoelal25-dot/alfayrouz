<!DOCTYPE html>
<html dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2KF82HSX13"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-2KF82HSX13');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Al-Fayrouz Real Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Montserrat:wght@900&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00838f; --secondary: #c5a012; --bg-dark: #0f1214; --card-bg: #1c2226; --sold: #ff1100; --available: #39FF14; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { overflow-x: hidden; width: 100%; height: 100%; margin: 0; padding: 0; touch-action: manipulation; }
        body { font-family: 'Cairo', sans-serif; color: #f0f0f0; background: var(--bg-dark); }

        /* شاشة التحميل والنجاح */
        #loadingScreen, #successScreen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .loader-logo { font-family: 'Montserrat'; font-size: 32px; font-weight: 900; color: var(--secondary); animation: pulse-text 1.2s infinite ease-in-out; }
        
        .success-box { background: var(--card-bg); padding: 40px 30px; border-radius: 25px; border: 1px solid var(--secondary); box-shadow: 0 0 30px rgba(197,160,18,0.1); }
        .success-icon { width: 80px; height: 80px; background: var(--available); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 0 20px rgba(57,255,20,0.3); }
        .success-title { font-size: 24px; font-weight: 900; color: #fff; margin-bottom: 10px; }
        .success-msg { font-size: 16px; color: #aaa; line-height: 1.6; }

        @keyframes pulse-text { 0%, 100% { opacity: 0.4; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }

        /* التصاميم الأساسية */
        .social-menu { position: fixed; bottom: 25px; left: 25px; z-index: 10000; display: flex; flex-direction: column-reverse; align-items: center; gap: 15px; }
        .social-btn { width: 55px; height: 55px; background: var(--secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 2px solid #fff; cursor: pointer; transition: 0.3s; z-index: 10001; }
        .sub-menu { display: flex; flex-direction: column-reverse; gap: 12px; opacity: 0; visibility: hidden; transform: translateY(20px); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .sub-menu.active { opacity: 1; visibility: visible; transform: translateY(0); }
        .sub-item { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.4); text-decoration: none; border: 1.5px solid #fff; transition: 0.2s; }
        .sub-item svg { width: 24px; height: 24px; fill: #fff; }
        .bg-tiktok { background: #000; } .bg-insta { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); } .bg-fb { background: #1877F2; } .bg-wa { background: #25D366; } .bg-call { background: #34b7f1; }

        .header-bar { padding: 50px 10px 30px; text-align: center; background: linear-gradient(to bottom, rgba(197, 160, 18, 0.05), transparent); }
        .company-name { font-family: 'Montserrat', sans-serif; font-size: 42px; font-weight: 900; color: #fff; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .company-subtitle { font-family: 'Reem Kufi', sans-serif; font-size: 22px; color: var(--secondary); font-weight: 700; margin-top: 10px; display: block; }

        .container { width: 100%; max-width: 450px; margin: auto; padding: 15px; }
        .section-title { font-size: 22px; color: #fff; font-weight: 900; text-align: center; margin-bottom: 25px; }

        .add-unit-btn { background: rgba(197, 160, 18, 0.1); border: 2px dashed var(--secondary); color: var(--secondary); border-radius: 20px; padding: 18px; text-align: center; cursor: pointer; margin-bottom: 30px; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 18px; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 20000; padding: 15px; backdrop-filter: blur(10px); overflow-y: auto; }
        .modal-box { background: #1c2226; border-radius: 25px; padding: 25px; border: 1px solid var(--secondary); max-width: 420px; margin: 10px auto; }
        .modal-box h2 { text-align: center; color: var(--secondary); margin-bottom: 20px; font-size: 22px; font-weight: 900; }
        .form-group { margin-bottom: 12px; }
        .modal-box input, .modal-box select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333; background: #0f1214; color: #fff; font-family: 'Cairo'; font-size: 14px; }
        .btn-submit-form { background: linear-gradient(90deg, var(--secondary), #e6bc15); color: #000; width: 100%; padding: 16px; border-radius: 15px; font-weight: 900; border: none; cursor: pointer; font-size: 16px; margin-top: 10px; }

        /* البطاقات والعرض */
        .card-city { background: linear-gradient(135deg, #1c2226 0%, #252d33 100%); border-radius: 20px; padding: 30px 20px; text-align: center; border: 2px solid rgba(197, 160, 18, 0.3); cursor: pointer; margin-bottom: 15px; }
        .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card-project { background: var(--card-bg); border-radius: 15px; padding: 25px 10px; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; font-weight: 900; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        
        .apt-card { background: #1c2226; border-radius: 22px; margin-bottom: 25px; overflow: hidden; position: relative; border-right: 8px solid var(--available); }
        .is-sold { border-right: 15px solid var(--sold); opacity: 0.6; } 
        .img-container { width: 100%; height: 220px; background: #000; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .apt-content { padding: 20px; }
        .apt-specs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .spec-item { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 10px; }
        .spec-label { display: block; font-size: 10px; color: #777; }
        .spec-value { display: block; font-size: 12px; color: #eee; font-weight: 800; }
        .price-box-container { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(197, 160, 18, 0.1); }
        .price-line { display: flex; justify-content: space-between; margin-bottom: 5px; }

        .btn-preview-neon { background: var(--available); color: #000; text-align: center; padding: 16px; border-radius: 15px; cursor: pointer; font-weight: 900; margin-top: 10px; display: block; text-decoration: none; }

        .hidden { display: none !important; }
        .units-counter { background: rgba(197, 160, 18, 0.1); color: var(--secondary); text-align: center; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-weight: 900; }
    </style>
</head>
<body>

    <div id="loadingScreen"><div class="loader-logo">AL-FAYROUZ</div></div>

    <div id="successScreen" class="hidden">
        <div class="success-box">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" width="40" height="40" fill="#000"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            </div>
            <h2 class="success-title">تم استلام طلبك بنجاح</h2>
            <p class="success-msg">ستتم مراجعة كافة البيانات الفنية للوحدة<br>وعرضها في أقرب وقت ممكن.</p>
            <button onclick="location.reload()" class="btn-submit-form" style="margin-top: 25px;">العودة للرئيسية</button>
        </div>
    </div>

    <div id="unitModal" class="modal-overlay">
        <div class="modal-box">
            <h2>إضافة وحدة جديدة</h2>
            
            <div class="form-group"><select id="fCity" onchange="updateFProj()"><option value="">اختر المدينة</option><option>المنصورة الجديدة</option><option>دمياط الجديدة</option></select></div>
            <div class="form-group"><select id="fProj" onchange="checkZahia()"><option value="">اختر المشروع</option></select></div>
            <div id="boxNormal" class="form-group" style="display:flex; gap:10px;"><input type="number" id="fBld" placeholder="رقم العمارة"><input type="number" id="fUnt" placeholder="رقم الشقة"></div>
            <div id="boxVilla" class="form-group hidden"><input type="number" id="fVilla" placeholder="رقم الفيلا"></div>
            <div class="form-group"><input type="text" id="fFloor" placeholder="الدور"></div>
            <div class="form-group"><input type="number" id="fSize" placeholder="المساحة بالمتر"></div>
            <div class="form-group"><input type="number" id="fMeter" placeholder="سعر المتر"></div>
            <div class="form-group"><input type="tel" id="fPhone" placeholder="رقم الموبايل للتواصل"></div>
            
            <div class="form-group"><select id="fStatus" onchange="togglePay()"><option value="">نظام البيع</option><option value="أقساط">أقساط</option><option value="كاش">كاش</option></select></div>
            
            <div id="payInstall" class="hidden">
                <div class="form-group"><input type="number" id="fPaid" placeholder="المدفوع الحالي"></div>
                <div class="form-group"><input type="number" id="fOver" placeholder="الأوفر المطلوب"></div>
                <div class="form-group"><input type="number" id="fInstallVal" placeholder="قيمة القسط"></div>
                <div class="form-group"><input type="number" id="fYears" placeholder="سنوات التقسيط"></div>
            </div>

            <div id="payCash" class="hidden">
                <div class="form-group"><input type="number" id="fPrice" placeholder="السعر الكاش النهائي"></div>
            </div>

            <button class="btn-submit-form" id="submitBtn" onclick="sendUnit()">إرسال الطلب</button>
            <button onclick="closeModal()" style="width:100%; background:none; border:none; color:#777; margin-top:15px; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <div class="social-menu">
        <div class="social-btn" id="mainSocialBtn" onclick="toggleSocial()"><svg viewBox="0 0 24 24" style="fill:#fff; width:28px;"><path d="M20 15.5c-1.2 0-2.4-.2-3.6-.6-.3-.1-.7 0-1 .2l-2.2 2.2c-2.8-1.4-5.1-3.8-6.6-6.6l2.2-2.2c.3-.3.4-.7.2-1-.3-1.1-.5-2.3-.5-3.5 0-.6-.4-1-1-1H4c-.6 0-1 .4-1 1 0 9.4 7.6 17 17 17 .6 0 1-.4 1-1v-3.5c0-.6-.4-1-1-1z"/></svg></div>
        <div class="sub-menu" id="subSocialMenu">
            <a href="https://wa.me/201212229797" class="sub-item bg-wa" target="_blank"><svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg></a>
            <a href="tel:+201212229797" class="sub-item bg-call"><svg viewBox="0 0 24 24"><path d="M20 15.5c-1.2 0-2.4-.2-3.6-.6-.3-.1-.7 0-1 .2l-2.2 2.2c-2.8-1.4-5.1-3.8-6.6-6.6l2.2-2.2c.3-.3.4-.7.2-1-.3-1.1-.5-2.3-.5-3.5 0-.6-.4-1-1-1H4c-.6 0-1 .4-1 1 0 9.4 7.6 17 17 17 .6 0 1-.4 1-1v-3.5c0-.6-.4-1-1-1z"/></svg></a>
        </div>
    </div>

    <div class="header-bar">
        <h1 class="company-name">Al-Fayrouz</h1>
        <span class="company-subtitle">الفيروز للتسويق العقاري</span>
    </div>

    <div class="container">
        <div id="step1">
            <div class="add-unit-btn" onclick="openModal()"><span>اعرض وحدتك معنا الآن</span><b>+</b></div>
            <h2 class="section-title">اختر المدينة</h2>
            <div class="card-city" onclick="goToStep2('المنصورة الجديدة')"><h3>المنصورة الجديدة</h3><p>مستقبل الدلتا على البحر مباشرة</p></div>
            <div class="card-city" onclick="goToStep2('دمياط الجديدة')"><h3>دمياط الجديدة</h3><p>الرقي والاستثمار المضمون</p></div>
        </div>
        <div id="step2" class="hidden">
            <button onclick="goBack(1)" style="background:#1c2226; border:1.5px solid #444; color:#fff; padding:10px 20px; border-radius:15px; font-weight:900; cursor:pointer; margin-bottom:20px;">رجوع</button>
            <div id="projectButtons" class="project-grid"></div>
        </div>
        <div id="step3" class="hidden">
            <button onclick="goBack(2)" style="background:#1c2226; border:1.5px solid #444; color:#fff; padding:10px 20px; border-radius:15px; font-weight:900; cursor:pointer; margin-bottom:20px;">رجوع</button>
            <div id="unitCounter" class="units-counter"></div>
            <div id="apartmentList"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxQsS6y6NgU_HdYXZOKsiV7xyzh7EBvYWLUeOacsqf7ERu93gnVyiOnNDUxqG6UUzcA/exec";
        let allData = [];

        function toggleSocial() {
            const menu = document.getElementById('subSocialMenu');
            const btn = document.getElementById('mainSocialBtn');
            menu.classList.toggle('active');
            btn.style.transform = menu.classList.contains('active') ? 'rotate(45deg)' : 'rotate(0deg)';
        }

        function openModal() { document.getElementById('unitModal').style.display = 'block'; }
        function closeModal() { document.getElementById('unitModal').style.display = 'none'; }

        function togglePay() {
            const status = document.getElementById('fStatus').value;
            document.getElementById('payInstall').classList.toggle('hidden', status !== 'أقساط');
            document.getElementById('payCash').classList.toggle('hidden', status !== 'كاش');
        }

        function updateFProj() {
            const city = document.getElementById('fCity').value;
            const projSelect = document.getElementById('fProj');
            let opts = '<option value="">اختر المشروع</option>';
            const maps = { 'المنصورة الجديدة':['جنة','سكن مصر','زاهية','إسكان ساحلي','تجارية وإدارية'], 'دمياط الجديدة':['جنة','سكن مصر','دار مصر','أهالي','تجارية وإدارية'] };
            if(maps[city]) maps[city].forEach(p => opts += `<option>${p}</option>`);
            projSelect.innerHTML = opts;
        }

        function checkZahia() {
            const isZahia = document.getElementById('fProj').value === 'زاهية';
            document.getElementById('boxNormal').classList.toggle('hidden', isZahia);
            document.getElementById('boxVilla').classList.toggle('hidden', !isZahia);
        }

        // دالة الإرسال مع شاشة النجاح
        async function sendUnit() {
            const status = document.getElementById('fStatus').value;
            const commonFields = ['fCity', 'fProj', 'fFloor', 'fSize', 'fMeter', 'fPhone', 'fStatus'];
            let activeFields = [...commonFields];

            if (status === 'أقساط') {
                activeFields.push('fPaid', 'fOver', 'fInstallVal', 'fYears');
            } else if (status === 'كاش') {
                activeFields.push('fPrice');
            }

            for (let id of activeFields) {
                let el = document.getElementById(id);
                if (!el.value) { 
                    alert("الرجاء إكمال كافة المعلومات المطلوبة بدقة."); 
                    el.focus(); 
                    return; 
                }
            }

            const btn = document.getElementById('submitBtn');
            btn.innerText = "جاري الحفظ...";
            btn.disabled = true;

            const formData = {
                city: document.getElementById('fCity').value,
                project: document.getElementById('fProj').value,
                bld: document.getElementById('fBld').value || document.getElementById('fVilla').value,
                unit: document.getElementById('fUnt').value || "Villa",
                floor: document.getElementById('fFloor').value,
                size: document.getElementById('fSize').value,
                meter: document.getElementById('fMeter').value,
                phone: document.getElementById('fPhone').value,
                status: status,
                paid: document.getElementById('fPaid').value || 0,
                over: document.getElementById('fOver').value || 0,
                install: document.getElementById('fInstallVal').value || 0,
                years: document.getElementById('fYears').value || 0,
                price: document.getElementById('fPrice').value || 0
            };

            fetch(API_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(formData)
            }).then(() => {
                closeModal();
                document.getElementById('successScreen').classList.remove('hidden');
            }).catch(err => {
                alert("نعتذر، حدث خطأ في الاتصال. يرجى المحاولة لاحقاً.");
                btn.disabled = false;
                btn.innerText = "إرسال الطلب";
            });
        }

        async function fetchD() {
            try {
                const res = await fetch(API_URL + "?v=" + Math.random());
                const data = await res.json();
                allData = data.slice(1);
                document.getElementById('loadingScreen').style.display = 'none';
            } catch(e) { console.error("Error", e); }
        }

        function getImg(u) {
            if (!u) return "";
            if (u.toString().includes('drive.google.com')) {
                let id = u.includes('id=') ? u.split('id=')[1].split('&')[0] : u.split('/d/')[1].split('/')[0];
                return `https://drive.google.com/thumbnail?sz=1000&id=${id}`;
            }
            return u;
        }

        function render(kw) {
            const list = document.getElementById('apartmentList');
            let filtered = allData.filter(r => (r[0]||"").toString().trim() === window.curCity && (r[1]||"").toString().includes(kw));
            filtered.sort((a, b) => (a[17]||"").toString().includes("تم البيع") - (b[17]||"").toString().includes("تم البيع"));
            document.getElementById('unitCounter').innerText = `متاح ${filtered.filter(r => !(r[17]||"").toString().includes("تحت المراجعه")).length} وحدة حالياً`;

            let h = '';
            filtered.forEach(r => {
                let sold = (r[11]||"").toString().includes("تم البيع");
                let img = getImg(r[12]);
                const fmt = (v) => isNaN(parseFloat(v)) ? '--' : parseFloat(v).toLocaleString();
                h += `<div class="apt-card ${sold ? 'is-sold' : ''}">
                    ${img ? `<div class="img-container"><img src="${img}" loading="lazy"></div>` : ''}
                    <div class="apt-content">
                        <span class="apt-location">${r[1] || '---'}</span>
                        <div class="apt-title">عمارة ${r[2]} • وحدة ${r[3]}</div>
                        <div class="apt-specs">
                            <div class="spec-item"><span class="spec-label">الدور</span><span class="spec-value">${r[4]||'--'}</span></div>
                            <div class="spec-item"><span class="spec-label">المساحة</span><span class="spec-value">${r[13]||'--'} م²</span></div>
                        </div>
                        <div class="price-box-container">
                            <div class="price-line"><span class="pl-label">المدفوع:</span><span class="pl-val">${fmt(r[6])} ج.م</span></div>
                            <div class="price-line"><span class="pl-label">الأوفر:</span><span class="pl-val">+ ${fmt(r[7])} ج.م</span></div>
                        </div>
                        <a href="https://wa.me/201212229797?text=معاينة وحدة ${r[2]}" class="btn-preview-neon">طلب معاينة</a>
                    </div>
                </div>`;
            });
            list.innerHTML = h;
        }

        function goToStep2(c) { window.curCity = c; switchStep('step2'); let projects = c === 'المنصورة الجديدة' ? ['جنة', 'سكن مصر', 'زاهية', 'إسكان ساحلي', 'تجارية وإدارية'] : ['جنة', 'سكن مصر', 'دار مصر', 'أهالي', 'تجارية وإدارية']; let html = ''; projects.forEach(p => html += `<div class="card-project" onclick="showU('${p}')">${p}</div>`); document.getElementById('projectButtons').innerHTML = html; }
        function showU(kw) { switchStep('step3'); render(kw); }
        function switchStep(id) { ['step1','step2','step3'].forEach(s => document.getElementById(s).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); window.scrollTo(0,0); }
        function goBack(s) { switchStep('step' + s); }
        window.onload = fetchD;
    </script>
</body>
</html>

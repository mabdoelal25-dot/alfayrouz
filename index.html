<!DOCTYPE html>
<html dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2KF82HSX13"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-2KF82HSX13');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Al-Fayrouz Real Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;900&family=Montserrat:wght@900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #c5a012; 
            --primary-dark: #8a6d0a;
            --bg-dark: #0a0c0d; 
            --card-bg: #161a1d; 
            --sold: #ff4444; 
            --available: #d4af37; /* لون ذهبي أفخم */
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { overflow-x: hidden; width: 100%; margin: 0; padding: 0; scroll-behavior: smooth; }
        body { font-family: 'Cairo', sans-serif; color: #e0e0e0; background: var(--bg-dark); background-image: radial-gradient(circle at top right, #1a1505 0%, #0a0c0d 100%); }

        /* الشاشة الافتتاحية */
        #loadingScreen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-logo { font-family: 'Montserrat'; font-size: 32px; font-weight: 900; color: var(--primary); animation: pulse-text 1.5s infinite; }
        @keyframes pulse-text { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* تحسين شكل المودال (النافذة) */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000; padding: 20px; backdrop-filter: blur(10px); overflow-y: auto; }
        .modal-box { background: var(--card-bg); border-radius: 30px; padding: 30px; border: 1px solid rgba(197, 160, 18, 0.2); max-width: 420px; margin: 20px auto; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .modal-box h2 { text-align: center; color: var(--primary); margin-bottom: 25px; font-size: 22px; font-weight: 900; }
        .modal-box input, .modal-box select { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; font-family: 'Cairo'; }
        
        .btn-submit-form { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: #000; width: 100%; padding: 16px; border-radius: 15px; font-weight: 900; border: none; cursor: pointer; font-size: 17px; box-shadow: 0 5px 15px rgba(197, 160, 18, 0.3); }

        /* زر أضف وحدتك - شكل عصري */
        .add-unit-btn { 
            background: var(--glass); border: 1px solid rgba(197,160,18,0.3); 
            color: var(--primary); border-radius: 20px; padding: 18px; text-align: center; 
            cursor: pointer; margin-bottom: 30px; font-weight: 900; font-size: 16px;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: 0.3s;
        }
        .add-unit-btn:active { background: var(--primary); color: #000; }

        /* الهيدر */
        .header-bar { padding: 60px 20px 40px; text-align: center; }
        .company-name { font-family: 'Montserrat', sans-serif; font-size: 48px; font-weight: 900; color: #fff; margin: 0; letter-spacing: 4px; }
        .company-subtitle { font-family: 'Cairo', sans-serif; font-size: 18px; color: var(--primary); font-weight: 600; letter-spacing: 1px; opacity: 0.9; margin-top: 5px; display: block; }

        .container { width: 100%; max-width: 480px; margin: auto; padding: 20px; }
        .section-title { font-size: 20px; color: #fff; font-weight: 700; text-align: right; margin-bottom: 20px; padding-right: 10px; border-right: 4px solid var(--primary); }

        /* كروت المدن والمشاريع - تصميم فخم */
        .card-city { 
            background: var(--glass); border-radius: 24px; padding: 35px 25px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.05); 
            cursor: pointer; margin-bottom: 20px; transition: 0.4s;
            position: relative; overflow: hidden;
        }
        .card-city::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(45deg, transparent, rgba(197,160,18,0.05), transparent); transition: 0.5s; }
        .card-city:active { transform: translateY(-5px); border-color: var(--primary); }
        .card-city h3 { font-size: 30px; font-weight: 900; color: #fff; margin: 0; }
        .card-city p { font-size: 14px; color: var(--primary); margin-top: 10px; font-weight: 600; }

        .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card-project { 
            background: var(--card-bg); border-radius: 18px; padding: 25px 15px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.05); 
            cursor: pointer; font-weight: 700; transition: 0.3s; color: #fff;
        }
        .card-project:active { background: var(--primary); color: #000; }

        /* كروت الشقق - التعديل الفخم */
        .apt-card { background: var(--card-bg); border-radius: 28px; margin-bottom: 30px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .is-available { border-bottom: 4px solid var(--primary); }
        .is-sold { opacity: 0.5; filter: grayscale(1); }

        .img-container { width: 100%; height: 250px; position: relative; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .apt-content { padding: 25px; }
        .apt-title { font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 8px; }
        .apt-location { font-size: 13px; color: var(--primary); font-weight: 700; text-transform: uppercase; margin-bottom: 15px; display: block; }

        .apt-specs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .spec-item { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.02); }
        .spec-label { display: block; font-size: 10px; color: #666; font-weight: 700; margin-bottom: 4px; }
        .spec-value { display: block; font-size: 13px; color: #fff; font-weight: 800; }

        .price-box-container { background: #000; padding: 20px; border-radius: 20px; border: 1px solid rgba(197, 160, 18, 0.1); }
        .price-line { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .pl-label { font-size: 13px; color: #888; }
        .pl-val { font-size: 15px; color: #fff; font-weight: 700; }

        .btn-preview-neon { 
            background: linear-gradient(135deg, #d4af37 0%, #aa8912 100%); 
            color: #000; text-align: center; padding: 18px; border-radius: 15px; 
            cursor: pointer; font-weight: 900; margin-top: 15px; display: block;
            text-decoration: none; font-size: 16px; transition: 0.3s;
        }

        .hidden { display: none !important; }

        /* أزرار السوشيال */
        .social-menu { position: fixed; bottom: 30px; left: 30px; z-index: 10000; }
        .social-btn { width: 60px; height: 60px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.4); cursor: pointer; }
        
        /* زر الرجوع */
        .back-btn { background: none; border: 1px solid #333; color: #888; padding: 10px 20px; border-radius: 12px; cursor: pointer; margin-bottom: 20px; font-family: 'Cairo'; }
    </style>
</head>
<body>

    <div id="loadingScreen"><div class="loader-logo">AL-FAYROUZ</div></div>

    <div id="unitModal" class="modal-overlay">
        <div class="modal-box">
            <h2>تفاصيل الوحدة العقارية</h2>
            <select id="fCity" onchange="updateFProj()">
                <option value="">اختر المدينة</option>
                <option>المنصورة الجديدة</option>
                <option>دمياط الجديدة</option>
            </select>
            <select id="fProj" onchange="checkZahia()">
                <option value="">المشروع</option>
            </select>

            <div id="boxNormal" style="display:flex; gap:10px;">
                <input type="number" id="fBld" placeholder="رقم العمارة">
                <input type="number" id="fUnt" placeholder="رقم الشقة">
            </div>

            <input type="number" id="fVilla" class="hidden" placeholder="رقم الفيلا">
            
            <input type="text" id="fFloor" id="floorField" placeholder="الدور (أرضي/متكرر)">

            <input type="number" id="fSize" placeholder="المساحة (م²)">
            
            <select id="fStatus" onchange="checkCash()">
                <option value="أقساط">نظام السداد: أقساط</option>
                <option value="كاش">نظام السداد: كاش</option>
            </select>

            <div id="boxInstall">
                <div style="display:flex; gap:10px;">
                    <input type="number" id="fPaid" placeholder="المدفوع">
                    <input type="number" id="fOver" placeholder="الأوفر">
                </div>
                <input type="number" id="fTotal" placeholder="الإجمالي المتبقي">
            </div>
            
            <input type="number" id="fCashPrice" class="hidden" placeholder="إجمالي السعر الكاش">
            
            <button class="btn-submit-form" onclick="sendUnit()">إرسال الطلب</button>
            <button onclick="closeModal()" style="width:100%; background:none; border:none; color:#555; margin-top:15px; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <div class="header-bar">
        <h1 class="company-name">Al-Fayrouz</h1>
        <span class="company-subtitle">للتسويق العقاري الفاخر</span>
    </div>

    <div class="container">
        <div id="step1">
            <div class="add-unit-btn" onclick="openModal()">
                <span>عرض وحدتك في المعرض</span>
                <span style="font-size: 22px;">+</span>
            </div>
            <h2 class="section-title">الوجهات الاستثمارية</h2>
            <div class="card-city" onclick="goToStep2('المنصورة الجديدة')"><h3>المنصورة الجديدة</h3><p>Luxury Waterfront Living</p></div>
            <div class="card-city" onclick="goToStep2('دمياط الجديدة')"><h3>دمياط الجديدة</h3><p>Elite Urban Investment</p></div>
        </div>

        <div id="step2" class="hidden">
            <button class="back-btn" onclick="goBack(1)">← العودة للمدن</button>
            <div id="projectButtons" class="project-grid"></div>
        </div>

        <div id="step3" class="hidden">
            <button class="back-btn" onclick="goBack(2)">← العودة للمشاريع</button>
            <div id="apartmentList"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxQsS6y6NgU_HdYXZOKsiV7xyzh7EBvYWLUeOacsqf7ERu93gnVyiOnNDUxqG6UUzcA/exec";
        let allData = [];

        function openModal() { document.getElementById('unitModal').style.display = 'block'; }
        function closeModal() { document.getElementById('unitModal').style.display = 'none'; }
        
        function updateFProj() {
            const city = document.getElementById('fCity').value;
            const proj = document.getElementById('fProj');
            let opts = '<option value="">اختر المشروع</option>';
            // تم إزالة "تجارية وإدارية" من هنا
            const maps = {
                'المنصورة الجديدة':['جنة','سكن مصر','زاهية','إسكان ساحلي'], 
                'دمياط الجديدة':['جنة','سكن مصر','دار مصر','أهالي']
            };
            if(maps[city]) maps[city].forEach(p => opts += `<option value="${p}">${p}</option>`);
            proj.innerHTML = opts;
            checkZahia();
        }

        function checkZahia() {
            const projValue = document.getElementById('fProj').value;
            const isZahia = projValue === 'زاهية';
            
            // لو زاهية: نخفي بوكس العمارة/الشقة ونظهر بوكس الفيلا
            document.getElementById('boxNormal').classList.toggle('hidden', isZahia);
            document.getElementById('fVilla').classList.toggle('hidden', !isZahia);
            
            // "شيل زرار الدور" لو المشروع زاهية
            const floorInput = document.getElementById('fFloor');
            if(isZahia) {
                floorInput.classList.add('hidden');
                floorInput.value = "فلل"; // قيمة تلقائية للخلفية
            } else {
                floorInput.classList.remove('hidden');
            }
        }

        function checkCash() {
            const isCash = document.getElementById('fStatus').value === 'كاش';
            document.getElementById('boxInstall').classList.toggle('hidden', isCash);
            document.getElementById('fCashPrice').classList.toggle('hidden', !isCash);
        }

        async function sendUnit() {
            const p = document.getElementById('fProj').value;
            const s = document.getElementById('fStatus').value;
            const body = {
                city: document.getElementById('fCity').value,
                region: p,
                building: p === 'زاهية' ? "فيلا" : document.getElementById('fBld').value,
                unit: p === 'زاهية' ? document.getElementById('fVilla').value : document.getElementById('fUnt').value,
                floor: p === 'زاهية' ? "كاملة" : document.getElementById('fFloor').value,
                status: s,
                size: document.getElementById('fSize').value,
                paid: s === 'كاش' ? document.getElementById('fCashPrice').value : document.getElementById('fPaid').value,
                over: s === 'كاش' ? "0" : document.getElementById('fOver').value,
                remaining: s === 'كاش' ? "0" : document.getElementById('fTotal').value
            };
            
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(body) });
            alert("شكراً لك! تم استلام بيانات وحدتك وسيقوم فريق الفيروز بمراجعتها.");
            closeModal();
        }

        async function fetchD() {
            try {
                const response = await fetch(API_URL + "?v=" + Math.random());
                const data = await response.json();
                allData = data.slice(1);
                document.getElementById('loadingScreen').style.display = 'none';
            } catch(e) { console.error(e); }
        }

        function getImg(url) {
            if (!url) return "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=800&q=80"; // صورة افتراضية فخمة
            if (url.toString().includes('drive.google.com')) {
                let id = url.includes('id=') ? url.split('id=')[1].split('&')[0] : url.split('/d/')[1].split('/')[0];
                return `https://drive.google.com/thumbnail?sz=1000&id=${id}`;
            }
            return url;
        }

        function render(kw) {
            const list = document.getElementById('apartmentList');
            let filtered = allData.filter(r => (r[0]||"").toString().trim() === window.curCity && (r[1]||"").toString().includes(kw));
            
            let h = '';
            filtered.forEach(r => {
                let sold = (r[11]||"").toString().includes("تم البيع");
                let img = getImg(r[12]);
                const fmt = (v) => isNaN(parseFloat(v)) ? '--' : parseFloat(v).toLocaleString();
                
                // حسابات السعر
                let paid = parseFloat(r[6]) || 0;
                let over = parseFloat(r[7]) || 0;
                let cashNow = paid + over;

                h += `<div class="apt-card ${sold ? 'is-sold' : 'is-available'}">
                    <div class="img-container"><img src="${img}" loading="lazy"></div>
                    <div class="apt-content">
                        <span class="apt-location">${r[1]}</span>
                        <div class="apt-title">${kw === 'زاهية' ? 'فيلا رقم ' + r[3] : 'عمارة ' + r[2] + ' • وحدة ' + r[3]}</div>
                        
                        <div class="apt-specs">
                            ${kw !== 'زاهية' ? `<div class="spec-item"><span class="spec-label">الدور</span><span class="spec-value">${r[4]||'--'}</span></div>` : ''}
                            <div class="spec-item"><span class="spec-label">المساحة</span><span class="spec-value">${r[13]||'--'} م²</span></div>
                            <div class="spec-item"><span class="spec-label">الإطلالة</span><span class="spec-value">${r[5]||'--'}</span></div>
                            <div class="spec-item"><span class="spec-label">الحالة</span><span class="spec-value">${r[9] || 'جاهز'}</span></div>
                        </div>

                        <div class="price-box-container">
                            <div class="price-line"><span class="pl-label">المدفوع</span><span class="pl-val">${fmt(paid)} ج.م</span></div>
                            <div class="price-line"><span class="pl-label">الأوفر</span><span class="pl-val" style="color:var(--primary)">+ ${fmt(over)} ج.م</span></div>
                            <div style="margin-top:15px; text-align:center;">
                                <div style="font-size:11px; color:#666;">إجمالي المطلوب كاش</div>
                                <div style="font-size:24px; font-weight:900; color:var(--primary);">${fmt(cashNow)} <small style="font-size:12px">ج.م</small></div>
                            </div>
                        </div>
                        ${sold ? '<div style="text-align:center; padding:15px; color:var(--sold); font-weight:900;">تـم البيـع</div>' : 
                        `<a href="https://wa.me/201212229797?text=استفسار عن ${kw} ${r[2]}-${r[3]}" class="btn-preview-neon">تواصل للمعاينة</a>`}
                    </div>
                </div>`;
            });
            list.innerHTML = h || '<div style="text-align:center; padding:50px; color:#666;">لا توجد وحدات متاحة في هذا القسم حالياً</div>';
        }

        function goToStep2(c) { 
            window.curCity = c; 
            switchStep('step2'); 
            // تم إزالة "تجارية وإدارية" من هنا أيضاً
            let projects = c === 'المنصورة الجديدة' ? ['جنة', 'سكن مصر', 'زاهية', 'إسكان ساحلي'] : ['جنة', 'سكن مصر', 'دار مصر', 'أهالي']; 
            let html = ''; 
            projects.forEach(p => html += `<div class="card-project" onclick="showU('${p}')">${p}</div>`); 
            document.getElementById('projectButtons').innerHTML = html; 
        }

        function showU(kw) { switchStep('step3'); render(kw); }
        function switchStep(id) { ['step1','step2','step3'].forEach(s => document.getElementById(s).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); window.scrollTo(0,0); }
        function goBack(s) { switchStep('step' + s); }
        window.onload = fetchD;
    </script>
</body>
</html>

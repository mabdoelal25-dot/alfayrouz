<!DOCTYPE html>
<html dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2KF82HSX13"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-2KF82HSX13');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>الفيروز للتسويق العقاري</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/v4m8fXv7/image.png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00838f;
            --secondary: #c5a012;
            --bg-dark: #0f1214;
            --card-bg: #1c2226;
            --sold: #ff1100;
            --available: #39FF14;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Cairo', sans-serif; color: #f0f0f0; background: var(--bg-dark); margin: 0; padding: 0; overflow-x: hidden; }
        #loadingScreen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .loader-logo { font-family: 'Montserrat'; font-size: 30px; color: var(--secondary); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .header-bar { padding: 40px 10px; text-align: center; }
        .company-name { font-family: 'Montserrat'; font-size: 38px; font-weight: 900; margin: 0; }
        .company-subtitle { color: var(--secondary); font-size: 18px; margin-top: 5px; display: block; }
        .container { max-width: 450px; margin: auto; padding: 15px; }
        .card-city, .card-project { background: var(--card-bg); border-radius: 20px; padding: 25px; text-align: center; border: 2px solid rgba(197, 160, 18, 0.2); margin-bottom: 15px; cursor: pointer; }
        .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .apt-card { background: var(--card-bg); border-radius: 22px; margin-bottom: 25px; overflow: hidden; border-right: 8px solid var(--available); position: relative; }
        .is-sold { border-right-color: var(--sold); opacity: 0.6; }
        .img-container { width: 100%; height: 200px; background: #000; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .apt-content { padding: 20px; }
        .apt-title { font-size: 18px; font-weight: 900; margin-bottom: 15px; color: #fff; }
        .apt-specs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .spec-item { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .spec-label { display: block; font-size: 10px; color: #888; margin-bottom: 4px; font-weight: 700; }
        .spec-value { font-size: 13px; font-weight: 800; color: #eee; }
        .price-box-container { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; border: 1px solid rgba(197, 160, 18, 0.1); }
        .price-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; font-weight: 700; }
        .btn-preview-neon { background: var(--available); color: #000; text-align: center; padding: 16px; border-radius: 15px; font-weight: 900; display: block; text-decoration: none; margin-top: 15px; box-shadow: 0 4px 15px rgba(57, 255, 20, 0.3); }
        .hidden { display: none !important; }
        .units-counter { background: rgba(197, 160, 18, 0.1); color: var(--secondary); text-align: center; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-weight: 900; border: 1px dashed var(--secondary); }
    </style>
</head>
<body>
    <div id="loadingScreen"><div class="loader-logo">AL-FAYROUZ</div></div>
    <div class="header-bar">
        <h1 class="company-name">Al-Fayrouz</h1>
        <span class="company-subtitle">الفيروز للتسويق العقاري</span>
    </div>
    <div class="container">
        <div id="step1">
            <h2 style="text-align:center; font-size:20px; margin-bottom:20px;">اختر المدينة</h2>
            <div class="card-city" onclick="goToStep2('المنصورة الجديدة')"><h3>المنصورة الجديدة</h3></div>
            <div class="card-city" onclick="goToStep2('دمياط الجديدة')"><h3>دمياط الجديدة</h3></div>
        </div>
        <div id="step2" class="hidden">
            <button onclick="goBack(1)" style="background:#333; color:#fff; border:1px solid #444; padding:10px 20px; border-radius:12px; margin-bottom:15px; cursor:pointer; font-family:'Cairo';">رجوع</button>
            <div id="projectButtons" class="project-grid"></div>
        </div>
        <div id="step3" class="hidden">
            <button onclick="goBack(2)" style="background:#333; color:#fff; border:1px solid #444; padding:10px 20px; border-radius:12px; margin-bottom:15px; cursor:pointer; font-family:'Cairo';">رجوع</button>
            <div id="unitCounter" class="units-counter"></div>
            <div id="apartmentList"></div>
        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWKx4v-nn6JEM3O4En9ELAAKvDxF-NyAnNLPS1c3dLk3Hqvx9MLK9mEfGRP0XTT33P9QC6SOLUt9jM/pub?output=csv";
        let allData = [];

        async function fetchD() {
            try {
                const res = await fetch(`${CSV_URL}&cb=${Date.now()}`);
                const text = await res.text();
                allData = text.split('\n').map(r => r.split(',')).slice(1);
                document.getElementById('loadingScreen').style.display='none';
            } catch(e) {
                document.getElementById('loadingScreen').style.display='none';
            }
        }

        function render(kw) {
            const list = document.getElementById('apartmentList');
            let filtered = allData.filter(r => (r[0]||"").trim() === window.curCity && (r[1]||"").includes(kw));
            document.getElementById('unitCounter').innerText = `متاح ${filtered.length} وحدة حالياً`;
            let h = '';
            filtered.forEach(r => {
                let sold = (r[11]||"").includes("تم البيع"), img = r[12];
                const fmt = (v) => v ? parseFloat(v.toString().replace(/[^0-9.]/g, '')).toLocaleString() : '0';
                let paid = parseFloat(r[6])||0, over = parseFloat(r[7])||0;
                
                h += `
                <div class="apt-card ${sold?'is-sold':''}">
                    ${img?`<div class="img-container"><img src="${img}" loading="lazy"></div>`:''}
                    <div class="apt-content">
                        <div class="apt-title">عمارة ${r[2]} &nbsp;•&nbsp; شقة ${r[3]}</div>
                        <div class="apt-specs">
                            <div class="spec-item"><span class="spec-label">سعر المتر</span><span class="spec-value">${fmt(r[8])} ج.م</span></div>
                            <div class="spec-item"><span class="spec-label">المساحة</span><span class="spec-value">${r[13]} م²</span></div>
                            <div class="spec-item"><span class="spec-label">السنوات</span><span class="spec-value">${r[9]} سنوات</span></div>
                            <div class="spec-item"><span class="spec-label">دفعة القسط</span><span class="spec-value">${fmt(r[10])} ج.م</span></div>
                        </div>
                        <div class="price-box-container">
                            <div class="price-line"><span>المدفوع:</span><span>${fmt(paid)} ج.م</span></div>
                            <div class="price-line"><span>الأوفر:</span><span style="color:#ef5350">+ ${fmt(over)} ج.م</span></div>
                            <div style="margin-top:15px; border:2px solid var(--available); padding:12px; border-radius:12px; text-align:center; background:rgba(57,255,20,0.05);">
                                <div style="color:var(--available); font-size:13px; font-weight:900; margin-bottom:5px;">المطلوب كاش حالياً</div>
                                <div style="font-size:22px; font-weight:900; color:#fff;">${fmt(paid+over)} ج.م</div>
                            </div>
                        </div>
                        ${sold?'<div style="color:var(--sold); text-align:center; margin-top:15px; font-weight:900;">تم البيع</div>':`<a href="https://wa.me/201212229797" class="btn-preview-neon">طلب معاينة</a>`}
                    </div>
                </div>`;
            });
            list.innerHTML = h || '<div style="text-align:center; color:#888; padding:20px;">لا توجد وحدات متاحة</div>';
        }

        function goToStep2(c) {
            window.curCity = c;
            switchStep('step2');
            let p = c === 'المنصورة الجديدة' ? ['جنة', 'سكن مصر', 'زاهية', 'إسكان ساحلي', 'تجارية وإدارية'] : ['جنة', 'سكن مصر', 'دار مصر', 'إسكان ساحلي', 'تجارية وإدارية'];
            let html = '';
            p.forEach(x => html += `<div class="card-project" onclick="showU('${x}')">${x}</div>`);
            document.getElementById('projectButtons').innerHTML = html;
        }

        function showU(kw) { switchStep('step3'); render(kw); }
        function switchStep(id) {
            ['step1','step2','step3'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            window.scrollTo(0,0);
        }
        function goBack(s) { switchStep('step' + s); }
        window.onload = fetchD;
    </script>
</body>
</html>

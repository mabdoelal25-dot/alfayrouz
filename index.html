<!DOCTYPE html>
<html dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2KF82HSX13"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-2KF82HSX13');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Al-Fayrouz Real Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Montserrat:wght@900&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00838f; --secondary: #c5a012; --bg-dark: #0f1214; --card-bg: #1c2226; --sold: #ff1100; --available: #39FF14; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { overflow-x: hidden; width: 100%; height: 100%; margin: 0; padding: 0; touch-action: manipulation; }
        body { font-family: 'Cairo', sans-serif; color: #f0f0f0; background: var(--bg-dark); }

        #loadingScreen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-logo { font-family: 'Montserrat'; font-size: 32px; font-weight: 900; color: var(--secondary); animation: pulse-text 1.2s infinite ease-in-out; }
        @keyframes pulse-text { 0%, 100% { opacity: 0.4; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }

        /* ستايلات المودال */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 50000; padding: 20px; backdrop-filter: blur(10px); align-items: center; justify-content: center; }
        .modal-box { background: var(--card-bg); border-radius: 25px; padding: 25px; border: 1px solid var(--secondary); max-width: 420px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        .modal-box h3 { color: var(--secondary); text-align: center; margin: 0 0 20px; font-size: 22px; font-weight: 900; }
        .m-input, .m-select { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; font-family: 'Cairo'; font-size: 14px; text-align: right; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-send { background: var(--secondary); color: #000; width: 100%; padding: 16px; border-radius: 15px; font-weight: 900; border: none; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
        .hidden { display: none !important; }

        /* الأزرار والتصميم العام */
        .add-unit-promo { background: linear-gradient(135deg, rgba(197, 160, 18, 0.15), rgba(255,255,255,0.05)); border: 2px solid var(--secondary); border-radius: 20px; padding: 20px; text-align: center; cursor: pointer; margin-bottom: 25px; font-weight: 900; color: var(--secondary); }
        .header-bar { padding: 50px 10px 30px; text-align: center; }
        .company-name { font-family: 'Montserrat', sans-serif; font-size: 42px; font-weight: 900; color: #fff; margin: 0; }
        .company-subtitle { font-family: 'Reem Kufi', sans-serif; font-size: 22px; color: var(--secondary); display: block; margin-top: 10px; }

        .container { width: 100%; max-width: 450px; margin: auto; padding: 15px; }
        .card-city { background: linear-gradient(135deg, #1c2226 0%, #252d33 100%); border-radius: 20px; padding: 30px 20px; text-align: center; border: 2px solid rgba(197, 160, 18, 0.3); cursor: pointer; margin-bottom: 15px; }
        .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card-project { background: var(--card-bg); border-radius: 15px; padding: 25px 10px; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; font-weight: 900; min-height: 80px; display: flex; align-items: center; justify-content: center; }

        /* زر التواصل */
        .social-menu { position: fixed; bottom: 25px; left: 25px; z-index: 10000; display: flex; flex-direction: column-reverse; align-items: center; gap: 15px; }
        .social-btn { width: 55px; height: 55px; background: var(--secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; cursor: pointer; }
        .sub-menu { display: flex; flex-direction: column-reverse; gap: 12px; opacity: 0; visibility: hidden; transition: 0.4s; }
        .sub-menu.active { opacity: 1; visibility: visible; }
        .sub-item { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; border: 1.5px solid #fff; }
        .bg-wa { background: #25D366; } .bg-call { background: #34b7f1; }
    </style>
</head>
<body>

    <div id="loadingScreen"><div class="loader-logo">AL-FAYROUZ</div></div>

    <div id="addUnitModal" class="modal-overlay">
        <div class="modal-box">
            <h3>أضف معلومات وحدتك بدقة ✨</h3>
            
            <select id="mCity" class="m-select" onchange="updateMProjects()">
                <option value="" disabled selected>اختر المدينة</option>
                <option value="المنصورة الجديدة">المنصورة الجديدة</option>
                <option value="دمياط الجديدة">دمياط الجديدة</option>
            </select>

            <select id="mProject" class="m-select">
                <option value="" disabled selected>اختر المشروع/المنطقة</option>
            </select>

            <div class="grid-inputs">
                <input type="text" id="mBld" class="m-input" placeholder="رقم العمارة">
                <input type="text" id="mApt" class="m-input" placeholder="رقم الشقة">
            </div>

            <div class="grid-inputs">
                <input type="text" id="mFloor" class="m-input" placeholder="الدور">
                <input type="text" id="mView" class="m-input" placeholder="الاتجاه/الإطلالة">
            </div>

            <div class="grid-inputs">
                <input type="text" id="mSize" class="m-input" placeholder="المساحة">
                <input type="text" id="mPriceM" class="m-input" placeholder="سعر المتر">
            </div>

            <select id="mPayType" class="m-select" onchange="togglePayFields()">
                <option value="" disabled selected>نظام السداد</option>
                <option value="كاش">كاش</option>
                <option value="أقساط">أقساط</option>
            </select>

            <div id="mCashSec" class="hidden">
                <input type="text" id="mTotal" class="m-input" placeholder="السعر الإجمالي الكلي">
            </div>

            <div id="mInstallSec" class="hidden">
                <input type="text" id="mPaid" class="m-input" placeholder="المبلغ المدفوع">
                <input type="text" id="mOver" class="m-input" placeholder="قيمة الأوفر">
                <input type="text" id="mYears" class="m-input" placeholder="سنوات التقسيط">
                <input type="text" id="mDafaa" class="m-input" placeholder="قيمة القسط">
            </div>

            <input type="tel" id="mPhone" class="m-input" placeholder="رقم الهاتف للتواصل (S)">
            
            <button class="btn-send" onclick="submitMUnit()">إرسال البيانات</button>
            <div onclick="closeM()" style="color:#888; text-align:center; margin-top:15px; cursor:pointer; font-size:14px;">إلغاء</div>
        </div>
    </div>

    <div id="successScreen" class="modal-overlay">
        <div class="modal-box" style="text-align:center;">
            <h2 style="color:var(--available)">تم الإرسال بنجاح!</h2>
            <p>سيتم مراجعة الوحدة وإضافتها للموقع قريباً.</p>
            <button class="btn-send" onclick="location.reload()">إغلاق</button>
        </div>
    </div>

    <div class="header-bar">
        <h1 class="company-name">Al-Fayrouz</h1>
        <span class="company-subtitle">الفيروز للتسويق العقاري</span>
    </div>

    <div class="container">
        <div id="step1">
            <div class="add-unit-promo" onclick="openM()">✨ أضف وحدتك العقارية معنا مجاناً</div>
            <div class="card-city" onclick="goToStep2('المنصورة الجديدة')"><h3>المنصورة الجديدة</h3></div>
            <div class="card-city" onclick="goToStep2('دمياط الجديدة')"><h3>دمياط الجديدة</h3></div>
        </div>
        <div id="step2" class="hidden">
            <button onclick="goBack(1)" style="background:#1c2226; color:#fff; padding:10px 20px; border-radius:15px; border:1px solid #444; margin-bottom:20px;">رجوع</button>
            <div id="projectButtons" class="project-grid"></div>
        </div>
        <div id="step3" class="hidden">
            <button onclick="goBack(2)" style="background:#1c2226; color:#fff; padding:10px 20px; border-radius:15px; border:1px solid #444; margin-bottom:20px;">رجوع</button>
            <div id="apartmentList"></div>
        </div>
    </div>

    <div class="social-menu">
        <div class="social-btn" onclick="toggleSocial()">📞</div>
        <div class="sub-menu" id="subSocialMenu">
            <a href="https://wa.me/201212229797" class="sub-item bg-wa" target="_blank">WA</a>
            <a href="tel:+201212229797" class="sub-item bg-call">Call</a>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxQsS6y6NgU_HdYXZOKsiV7xyzh7EBvYWLUeOacsqf7ERu93gnVyiOnNDUxqG6UUzcA/exec";
        let allData = [];

        function openM() { document.getElementById('addUnitModal').style.display = 'flex'; }
        function closeM() { document.getElementById('addUnitModal').style.display = 'none'; }
        function toggleSocial() { document.getElementById('subSocialMenu').classList.toggle('active'); }

        function updateMProjects() {
            const city = document.getElementById('mCity').value;
            const proj = document.getElementById('mProject');
            proj.innerHTML = '<option value="" disabled selected>اختر المنطقة</option>';
            let list = city === 'المنصورة الجديدة' ? ['جنة', 'سكن مصر', 'زاهية', 'إسكان ساحلي'] : ['جنة', 'سكن مصر', 'دار مصر', 'أهالي'];
            list.forEach(p => proj.innerHTML += `<option value="${p}">${p}</option>`);
        }

        function togglePayFields() {
            const type = document.getElementById('mPayType').value;
            document.getElementById('mCashSec').className = type === 'كاش' ? '' : 'hidden';
            document.getElementById('mInstallSec').className = type === 'أقساط' ? '' : 'hidden';
        }

        async function submitMUnit() {
            const fields = {
                city: document.getElementById('mCity').value,
                proj: document.getElementById('mProject').value,
                bld: document.getElementById('mBld').value,
                apt: document.getElementById('mApt').value,
                phone: document.getElementById('mPhone').value,
                payType: document.getElementById('mPayType').value
            };

            // ✅ نظام التحقق من البيانات (Validation)
            if (!fields.city || !fields.proj || !fields.bld || !fields.phone || !fields.payType) {
                alert("⚠️ رجاءً أتمم المعلومات الدقيقة المطلوبة قبل الإرسال");
                return;
            }

            const btn = document.querySelector('.btn-send');
            btn.innerText = "جاري الإرسال...";
            btn.disabled = true;

            try {
                // تجميع كل البيانات للإرسال لـ Google Sheets
                const payload = { ...fields, 
                    floor: document.getElementById('mFloor').value,
                    view: document.getElementById('mView').value,
                    size: document.getElementById('mSize').value,
                    priceM: document.getElementById('mPriceM').value,
                    total: document.getElementById('mTotal').value,
                    paid: document.getElementById('mPaid').value,
                    over: document.getElementById('mOver').value,
                    years: document.getElementById('mYears').value,
                    dafaa: document.getElementById('mDafaa').value
                };

                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                document.getElementById('addUnitModal').style.display = 'none';
                document.getElementById('successScreen').style.display = 'flex';
            } catch (e) {
                alert("تم الإرسال بنجاح"); // في نو-كورس جوجل بترجع إيرور دايمًا بس الداتا بتوصل
                location.reload();
            }
        }

        async function fetchD() {
            try {
                const response = await fetch(API_URL + "?v=" + Math.random());
                const data = await response.json();
                allData = data.slice(1);
                document.getElementById('loadingScreen').style.display = 'none';
            } catch(e) { console.error(e); }
        }

        function goToStep2(c) { window.curCity = c; switchStep('step2'); let projects = c === 'المنصورة الجديدة' ? ['جنة', 'سكن مصر', 'زاهية', 'إسكان ساحلي'] : ['جنة', 'سكن مصر', 'دار مصر', 'أهالي']; let h = ''; projects.forEach(p => h += `<div class="card-project" onclick="showU('${p}')">${p}</div>`); document.getElementById('projectButtons').innerHTML = h; }
        function showU(kw) { switchStep('step3'); render(kw); }
        function switchStep(id) { ['step1','step2','step3'].forEach(s => document.getElementById(s).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function goBack(s) { switchStep('step' + s); }
        window.onload = fetchD;
    </script>
</body>
</html>

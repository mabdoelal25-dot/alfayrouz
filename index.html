<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Al-Fayrouz Real Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00838f; --secondary: #c5a012; --bg-dark: #0f1214; --card-bg: #1c2226; --sold: #ef5350; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { overflow-x: hidden; width: 100%; height: 100%; margin: 0; padding: 0; touch-action: manipulation; }
        body { font-family: 'Cairo', sans-serif; color: #f0f0f0; background: var(--bg-dark); }

        /* شاشة التحميل الفخمة (لعبة الانتظار) */
        #loadingScreen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg-dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-ball { width: 50px; height: 50px; background: var(--primary); border-radius: 50%; animation: pulse-glow 0.8s infinite alternate; box-shadow: 0 0 20px var(--primary); }
        @keyframes pulse-glow { from { transform: scale(0.8); opacity: 0.6; } to { transform: scale(1.2); opacity: 1; box-shadow: 0 0 40px var(--primary); } }
        .loader-text { margin-top: 20px; font-family: 'Montserrat'; font-weight: 900; color: var(--secondary); letter-spacing: 2px; }

        .header-bar { padding: 45px 10px 25px; text-align: center; background: linear-gradient(to bottom, #161d21, var(--bg-dark)); }
        .company-name { font-family: 'Montserrat', sans-serif; font-size: 38px; font-weight: 900; color: #fff; margin: 0; letter-spacing: 2px; text-transform: uppercase; }
        .company-subtitle { font-size: 16px; color: var(--secondary); font-weight: 700; margin-top: 5px; }

        .container { width: 100%; max-width: 500px; margin: auto; padding: 15px; }
        .section-title { font-size: 24px; color: #fff; font-weight: 900; text-align: center; margin-bottom: 25px; }

        .card-city { background: linear-gradient(135deg, #1c2226 0%, #252d33 100%); border-radius: 20px; padding: 45px 20px; text-align: center; border: 2px solid rgba(197, 160, 18, 0.3); cursor: pointer; margin-bottom: 15px; }
        .card-city h3 { font-size: 32px; font-weight: 900; color: var(--secondary); margin: 0 0 10px 0; }
        .card-city p { font-size: 16px; color: #ccc; margin: 0; }

        .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card-project { background: var(--card-bg); border-radius: 18px; padding: 30px 10px; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }

        /* الكارت المسطرة الأصلي باللون الذهبي */
        .apt-card { background: #1c2226; border-radius: 18px; margin-bottom: 20px; border-right: 5px solid var(--secondary); overflow: hidden; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .img-container { width: 100%; height: 210px; background: #000; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .apt-content { padding: 20px; }
        .apt-title { font-size: 19px; font-weight: 900; color: #fff; margin-bottom: 5px; }
        .units-counter { background: rgba(197, 160, 18, 0.1); color: var(--secondary); text-align: center; padding: 12px; border-radius: 12px; margin-bottom: 15px; font-size: 15px; font-weight: 900; border: 1px dashed var(--secondary); }

        .price-box { display: flex; justify-content: space-between; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.08); }
        .price-val { font-size: 17px; font-weight: 900; color: var(--secondary); }

        /* ستايل تم البيع المحترم */
        .is-sold { opacity: 0.4; filter: grayscale(1); pointer-events: none; }
        .sold-text { display: block; text-align: center; color: var(--sold); font-weight: 900; margin-top: 15px; border: 1px solid var(--sold); padding: 8px; border-radius: 10px; }

        /* زر الاتصال الشيك الصغير */
        .float-call { 
            position: fixed; bottom: 25px; left: 20px; 
            background: #1c2226; border: 1.5px solid var(--secondary); color: #fff;
            display: flex; align-items: center; gap: 8px;
            padding: 10px 18px; border-radius: 50px; 
            text-decoration: none; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            z-index: 1000; font-weight: 800; font-size: 14px;
        }
        .float-call svg { fill: var(--secondary); width: 18px; height: 18px; }

        .btn-wa { background: #25d366; color: #fff; text-align: center; padding: 15px; border-radius: 14px; text-decoration: none; display: block; font-weight: 900; margin-top: 15px; }
        .hidden { display: none !important; }
    </style>
</head>

        <div class="company-subtitle">الفيروز للعقارات</div>

<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفيروز للتسويق العقاري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #006064; --secondary: #b59410; --bg-dark: #121212; --text-light: #eceff1; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Cairo', sans-serif; margin: 0; padding: 0; color: var(--text-light); background-color: var(--bg-dark); background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), url('https://images.unsplash.com/photo-1582407947304-fd86f028f716?q=80&w=1600'); background-attachment: fixed; background-size: cover; background-position: center; }
        .header-bar { padding: 40px 20px; text-align: center; }
        .company-name { font-family: 'Playfair Display', serif; font-size: 38px; font-weight: 700; color: white; margin: 0; }
        .company-subtitle { font-size: 16px; color: var(--secondary); margin-top: 5px; font-weight: 600; letter-spacing: 2px; }
        
        .floating-contact { position: fixed; right: 20px; bottom: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 1000; }
        .contact-circle { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.4); transition: 0.3s; }
        .call-btn { background: var(--primary); }
        .wa-btn { background: #25d366; }

        .container { max-width: 1200px; margin: auto; padding: 0 20px 100px 20px; }
        .section-title { font-size: 22px; font-weight: 700; color: white; margin-bottom: 30px; text-align: center; border-bottom: 2px solid var(--secondary); display: inline-block; padding-bottom: 8px; }
        
        .main-box { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 20px; padding: 30px; cursor: pointer; transition: 0.4s; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .card:hover { transform: translateY(-5px); border-color: var(--secondary); }
        
        .apt-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .apt-card { background: rgba(0,0,0,0.6); border-radius: 15px; padding: 20px; text-align: right; border-right: 5px solid var(--primary); border: 1px solid rgba(255,255,255,0.05); }
        .tag { background: rgba(0, 96, 100, 0.3); color: #80deea; padding: 3px 10px; border-radius: 15px; font-size: 11px; font-weight: bold; }
        .apt-title { font-size: 18px; color: white; margin: 10px 0; font-weight: 700; }
        .specs-list { font-size: 13px; color: #b0bec5; line-height: 1.8; }
        .price-row { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .price-item { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .highlight { color: var(--secondary); font-weight: bold; font-size: 16px; }
        
        .hidden { display: none; }
        .btn-back { margin-top: 30px; padding: 10px 25px; background: none; color: var(--secondary); border: 1px solid var(--secondary); border-radius: 20px; cursor: pointer; }
        #loader { text-align: center; padding: 50px; color: var(--secondary); }
    </style>
</head>
<body>

    <div class="floating-contact">
        <a href="tel:+201212229797" class="contact-circle call-btn"><img src="https://img.icons8.com/ios-filled/50/ffffff/phone.png" width="24"></a>
        <a href="https://wa.me/201212229797" class="contact-circle wa-btn"><img src="https://img.icons8.com/color/48/000000/whatsapp--v1.png" width="24"></a>
    </div>

    <div class="header-bar">
        <h1 class="company-name">Al-Fayrouz Real Estate</h1>
        <div class="company-subtitle">الفيروز للتسويق العقاري</div>
    </div>

    <div class="container">
        <div id="loader">جاري جلب العروض الحصرية...</div>

        <div id="step1" class="hidden">
            <div style="text-align:center"><h2 class="section-title">اختر المدينة</h2></div>
            <div class="main-box" id="cityButtons"></div>
        </div>

        <div id="step2" class="hidden">
            <div style="text-align:center"><h2 id="cityTitle" class="section-title"></h2></div>
            <div id="regionButtons" class="main-box"></div>
            <div style="text-align:center"><button class="btn-back" onclick="goBack(1)">العودة للمدن</button></div>
        </div>

        <div id="step3" class="hidden">
            <div style="text-align:center"><h2 id="regionTitle" class="section-title"></h2></div>
            <div id="apartmentList" class="apt-grid"></div>
            <div style="text-align:center"><button class="btn-back" onclick="goBack(2)">العودة للمناطق</button></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxVCQuj-Ep-hX-RoV5az62sRQFzl7ksZAamiEmkH9nqD-ST-KzdDez15farR31HqXsaeg/exec";
        let allData = [];

        async function loadData() {
            try {
                const response = await fetch(API_URL);
                allData = await response.json();
                document.getElementById('loader').classList.add('hidden');
                showCities();
            } catch (e) { document.getElementById('loader').innerText = "خطأ في الاتصال بالشيت."; }
        }

        function showCities() {
            document.getElementById('step1').classList.remove('hidden');
            let cities = [...new Set(allData.slice(1).map(row => row[0]))];
            let html = '';
            cities.forEach(c => { html += `<div class="card" onclick="goToStep2('${c}')"><h3>${c}</h3><p>عرض المناطق</p></div>`; });
            document.getElementById('cityButtons').innerHTML = html;
        }

        function goToStep2(city) {
            currentCity = city;
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            document.getElementById('cityTitle').innerText = city;
            let regions = [...new Set(allData.slice(1).filter(row => row[0] === city).map(row => row[1]))];
            let html = '';
            regions.forEach(r => { html += `<div class="card" onclick="showUnits('${r}')"><h3>${r}</h3><p>عرض الوحدات</p></div>`; });
            document.getElementById('regionButtons').innerHTML = html;
        }

        function showUnits(region) {
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.remove('hidden');
            document.getElementById('regionTitle').innerText = region;
            let filtered = allData.filter(row => row[0] == currentCity && row[1] == region);
            let html = '';
            filtered.forEach(row => {
                html += `
                <div class="apt-card">
                    <span class="tag">${row[5]}</span>
                    <div class="apt-title">عمارة ${row[2]} - شقة ${row[3]}</div>
                    <div class="specs-list">
                        📍 الدور: ${row[4]} | 🧭 الاتجاه: ${row[5]}<br>
                        📅 سنوات التقسيط: ${row[9]} | 💸 دفعة القسط: ${row[10]}
                    </div>
                    <div class="price-row">
                        <div class="price-item"><span>المدفوع:</span> <span class="highlight">${row[6]}</span></div>
                        <div class="price-item"><span>الأوفر:</span> <span style="color:#ef5350; font-weight:bold">${row[7]}</span></div>
                        <div class="price-item"><span>سعر المتر:</span> <span>${row[8]}</span></div>
                    </div>
                </div>`;
            });
            document.getElementById('apartmentList').innerHTML = html;
        }

        function goBack(step) {
            if (step === 1) { document.getElementById('step2').classList.add('hidden'); document.getElementById('step1').classList.remove('hidden'); }
            else { document.getElementById('step3').classList.add('hidden'); document.getElementById('step2').classList.remove('hidden'); }
        }
        window.onload = loadData;
    </script>
</body>
</html>

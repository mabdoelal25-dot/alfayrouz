<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-FAYROUZ | العقارات المميزة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a73e8; /* أزرق براندات */
            --dark: #202124;
            --gray: #5f6368;
            --bg: #f8f9fa;
            --border: #dadce0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--dark); padding-bottom: 50px; }

        /* Navigation */
        nav { background: #fff; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); sticky: top; z-index: 100; }
        .logo { font-weight: 900; font-size: 1.5rem; color: var(--primary); }
        .add-btn { background: var(--primary); color: #fff; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 700; cursor: pointer; font-family: 'Cairo'; }

        /* Filter Section */
        .filter-bar { background: #fff; padding: 20px 5%; border-bottom: 1px solid var(--border); display: flex; gap: 15px; overflow-x: auto; }
        .f-item { padding: 8px 18px; border: 1px solid var(--border); border-radius: 20px; font-size: 0.9rem; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .f-item.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* Hero */
        .hero { padding: 40px 5%; background: #fff; }
        .hero h1 { font-size: 1.8rem; margin-bottom: 10px; }

        /* Property Grid */
        .container { padding: 20px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        .card { background: #fff; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; transition: 0.3s; cursor: pointer; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        .card-img { width: 100%; height: 180px; background: #eee; display: flex; align-items: center; justify-content: center; color: #ccc; font-weight: 900; }
        .card-body { padding: 20px; }
        .card-price { font-size: 1.4rem; font-weight: 800; color: var(--primary); margin-bottom: 10px; }
        .card-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 15px; height: 50px; overflow: hidden; }
        
        .card-info { display: flex; gap: 15px; border-top: 1px solid #eee; padding-top: 15px; color: var(--gray); font-size: 0.85rem; }
        .card-info span { display: flex; align-items: center; gap: 5px; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 30px; border-radius: 15px; width: 90%; max-width: 450px; }
        .modal h2 { margin-bottom: 20px; }
        .modal input, .modal select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 8px; font-family: 'Cairo'; }
        
        #loading { text-align: center; padding: 50px; font-weight: 700; color: var(--primary); }

        @media (max-width: 600px) { .hero h1 { font-size: 1.4rem; } }
    </style>
</head>
<body>

<nav>
    <div class="logo">AL-FAYROUZ</div>
    <button class="add-btn" onclick="toggleModal(true)">+ اعرض شقتك</button>
</nav>

<div class="hero">
    <h1>العقارات المتاحة للبيع</h1>
    <p style="color: var(--gray)">تصفح أفضل الوحدات المختارة بعناية في المنصورة ودمياط الجديدة</p>
</div>

<div class="filter-bar">
    <div class="f-item active" onclick="mainFilter('الكل', this)">الكل</div>
    <div class="f-item" onclick="mainFilter('المنصورة الجديدة', this)">المنصورة الجديدة</div>
    <div class="f-item" onclick="mainFilter('دمياط الجديدة', this)">دمياط الجديدة</div>
</div>

<div class="container">
    <div id="loading">جاري تحميل البيانات...</div>
    <div id="data" class="grid"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h2>إضافة وحدة</h2>
        <form onsubmit="sendToWhatsApp(event)">
            <select id="mCity"><option>المنصورة الجديدة</option><option>دمياط الجديدة</option></select>
            <input type="text" id="mProject" placeholder="المشروع (مثال: جنة)" required>
            <input type="text" id="mDetails" placeholder="عمارة - وحدة" required>
            <input type="text" id="mSpace" placeholder="المساحة" required>
            <input type="text" id="mPrice" placeholder="السعر المطلوب" required>
            <button type="submit" class="add-btn" style="width: 100%;">إرسال للإدارة</button>
            <button type="button" onclick="toggleModal(false)" style="width: 100%; background: none; color: var(--gray); margin-top: 10px; border: none; cursor: pointer;">إلغاء</button>
        </form>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbxiPcSexC05MJVeFohzNaNex4oDW0rVylIjAXSsV9BD1QP7v9Esg3xO8CtUh_yOOV6g/exec";
    let properties = [];

    fetch(URL).then(r => r.json()).then(data => {
        properties = data.filter(row => row[1] && row[1] !== "المشروع");
        document.getElementById('loading').style.display = 'none';
        render(properties);
    });

    function render(list) {
        let html = "";
        list.forEach(row => {
            html += `
            <div class="card" onclick="contact('${row[1]}','${row[7]}','${row[2]}','${row[3]}')">
                <div class="card-img">AL-FAYROUZ</div>
                <div class="card-body">
                    <div class="card-price">${row[7] || 'اتصل للسعر'}</div>
                    <div class="card-title">${row[1]} - عمارة ${row[2]} وحدة ${row[3]}</div>
                    <div class="card-info">
                        <span>📏 ${row[5]} م²</span>
                        <span>🏢 الدور ${row[4]}</span>
                        <span>📍 ${row[0].split(' ')[0]}</span>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById('data').innerHTML = html;
    }

    function mainFilter(city, el) {
        document.querySelectorAll('.f-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        if(city === 'الكل') render(properties);
        else render(properties.filter(p => p[0].includes(city)));
    }

    function toggleModal(s) { document.getElementById('modal').style.display = s ? 'flex' : 'none'; }

    function contact(p, s, b, u){
        window.open("https://wa.me/201212229797?text=" + encodeURIComponent(`استفسار عن ${p}\nعمارة ${b} وحدة ${u}`));
    }

    function sendToWhatsApp(e) {
        e.preventDefault();
        const text = `طلب عرض وحدة:\nالمدينة: ${document.getElementById('mCity').value}\nالمشروع: ${document.getElementById('mProject').value}\nالوحدة: ${document.getElementById('mDetails').value}\nالمساحة: ${document.getElementById('mSpace').value}\nالسعر: ${document.getElementById('mPrice').value}`;
        window.open("https://wa.me/201212229797?text=" + encodeURIComponent(text));
        toggleModal(false);
    }
</script>
</body>
</html>

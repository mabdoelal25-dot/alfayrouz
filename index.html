<!DOCTYPE html>
<html dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2KF82HSX13"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-2KF82HSX13');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Al-Fayrouz Real Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Montserrat:wght@900&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00838f; --secondary: #c5a012; --bg-dark: #0f1214; --card-bg: #1c2226; --sold: #ff1100; --available: #39FF14; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { overflow-x: hidden; width: 100%; margin: 0; padding: 0; touch-action: manipulation; background: var(--bg-dark); }
        body { font-family: 'Cairo', sans-serif; color: #f0f0f0; }

        #loadingScreen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-logo { font-family: 'Montserrat'; font-size: 32px; font-weight: 900; color: var(--secondary); animation: pulse-text 1.2s infinite ease-in-out; }
        @keyframes pulse-text { 0%, 100% { opacity: 0.4; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }

        .header-bar { padding: 40px 10px 20px; text-align: center; }
        .company-name { font-family: 'Montserrat', sans-serif; font-size: 38px; font-weight: 900; color: #fff; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .company-subtitle { font-family: 'Reem Kufi', sans-serif; font-size: 20px; color: var(--secondary); margin-top: 5px; display: block; }

        .container { width: 100%; max-width: 450px; margin: auto; padding: 15px; }
        .section-title { font-size: 20px; color: #fff; font-weight: 900; text-align: center; margin-bottom: 20px; }

        .card-city { background: linear-gradient(135deg, #1c2226 0%, #252d33 100%); border-radius: 20px; padding: 25px 15px; text-align: center; border: 1px solid rgba(197, 160, 18, 0.3); cursor: pointer; margin-bottom: 12px; }
        .card-city h3 { font-size: 24px; color: var(--secondary); margin: 0; }
        .card-city p { font-size: 12px; color: #888; margin-top: 5px; }

        .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card-project { background: var(--card-bg); border-radius: 12px; padding: 20px 10px; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; font-weight: 900; display: flex; align-items: center; justify-content: center; min-height: 70px; }

        .apt-card { background: #1c2226; border-radius: 20px; margin-bottom: 20px; overflow: hidden; position: relative; border-right: 6px solid var(--available); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .is-sold { border-right-color: var(--sold); opacity: 0.7; filter: grayscale(0.8); }
        
        .img-container { width: 100%; height: 200px; background: #000; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .apt-content { padding: 15px; }
        .apt-location { font-size: 13px; color: var(--secondary); font-weight: 800; margin-bottom: 5px; display: block; }
        .apt-title { font-size: 18px; font-weight: 900; color: #fff; margin-bottom: 12px; }
        
        .apt-specs { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
        .spec-item { background: rgba(255,255,255,0.03); padding: 6px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .spec-label { font-size: 10px; color: #777; display: block; }
        .spec-value { font-size: 11px; color: #eee; font-weight: 800; }

        /* تعديل منطقة الأسعار لتفادي المنظر اللي في الصورة */
        .price-box-container { 
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; 
            border: 1px solid rgba(197, 160, 18, 0.15); margin-bottom: 10px; 
        }
        .price-line { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: nowrap; }
        .pl-label { font-size: 11px; color: #aaa; font-weight: 700; white-space: nowrap; }
        .pl-val { font-size: 13px; color: var(--secondary); font-weight: 900; white-space: nowrap; margin-right: 5px; }

        .cash-banner { 
            margin: 10px 0; background: linear-gradient(135deg, rgba(57,255,20,0.2) 0%, rgba(0,0,0,0.3) 100%); 
            padding: 12px; border-radius: 10px; border: 1.5px solid var(--available); text-align: center; 
        }
        .cash-banner-title { color: var(--available); font-size: 15px; font-weight: 900; margin-bottom: 4px; }
        .cash-banner-val { color: #fff; font-size: 22px; font-weight: 900; }

        .footer-specs { border-top: 1px dashed #333; margin-top: 12px; padding-top: 10px; }
        .footer-line { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
        .footer-label { font-size: 11px; color: #999; font-weight: 700; line-height: 1.4; }
        .footer-val { font-size: 14px; color: #fff; font-weight: 900; margin-top: 2px; }

        .btn-preview-neon { 
            background: var(--available); color: #000; text-align: center; padding: 14px; 
            border-radius: 12px; font-weight: 900; display: block; text-decoration: none; 
            box-shadow: 0 5px 15px rgba(57, 255, 20, 0.3); margin-top: 10px; 
        }

        .btn-call-fixed { position: fixed; bottom: 20px; left: 20px; width: 50px; height: 50px; background: var(--secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 9999; border: 2px solid #fff; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loadingScreen"><div class="loader-logo">AL-FAYROUZ</div></div>

    <a href="tel:+201212229797" class="btn-call-fixed"><svg width="25" height="25" fill="#fff" viewBox="0 0 24 24"><path d="M20 15.5c-1.2 0-2.4-.2-3.6-.6-.3-.1-.7 0-1 .2l-2.2 2.2c-2.8-1.4-5.1-3.8-6.6-6.6l2.2-2.2c.3-.3.4-.7.2-1-.3-1.1-.5-2.3-.5-3.5 0-.6-.4-1-1-1H4c-.6 0-1 .4-1 1 0 9.4 7.6 17 17 17 .6 0 1-.4 1-1v-3.5c0-.6-.4-1-1-1z"/></svg></a>

    <div class="header-bar">
        <h1 class="company-name">Al-Fayrouz</h1>
        <span class="company-subtitle">الفيروز للتسويق العقاري</span>
    </div>

    <div class="container">
        <div id="step1">
            <h2 class="section-title">اختر المدينة</h2>
            <div class="card-city" onclick="goToStep2('المنصورة الجديدة')"><h3>المنصورة الجديدة</h3><p>مستقبل الدلتا على البحر مباشرة</p></div>
            <div class="card-city" onclick="goToStep2('دمياط الجديدة')"><h3>دمياط الجديدة</h3><p>الرقي والاستثمار المضمون</p></div>
        </div>

        <div id="step2" class="hidden">
            <button onclick="goBack(1)" style="margin-bottom:20px; padding:8px 15px; background:#222; color:#fff; border:1px solid #444; border-radius:10px; font-weight:bold;">رجوع</button>
            <div id="projectButtons" class="project-grid"></div>
        </div>

        <div id="step3" class="hidden">
            <button onclick="goBack(2)" style="margin-bottom:20px; padding:8px 15px; background:#222; color:#fff; border:1px solid #444; border-radius:10px; font-weight:bold;">رجوع</button>
            <div id="apartmentList"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxQsS6y6NgU_HdYXZOKsiV7xyzh7EBvYWLUeOacsqf7ERu93gnVyiOnNDUxqG6UUzcA/exec";
        let allData = [];

        async function fetchD() {
            try {
                const response = await fetch(API_URL + "?v=" + Math.random());
                const data = await response.json();
                allData = data.slice(1);
                document.getElementById('loadingScreen').style.display = 'none';
            } catch(e) { console.error(e); }
        }

        function getImg(url) {
            if (!url) return "";
            if (url.toString().includes('drive.google.com')) {
                let id = url.includes('id=') ? url.split('id=')[1].split('&')[0] : url.split('/d/')[1].split('/')[0];
                return `https://drive.google.com/thumbnail?sz=1000&id=${id}`;
            }
            return url;
        }

        function render(kw) {
            const list = document.getElementById('apartmentList');
            let filtered = allData.filter(r => (r[0]||"").toString().trim() === window.curCity && (r[1]||"").toString().includes(kw));
            filtered.sort((a,b) => (a[11]||"").toString().includes("تم البيع") - (b[11]||"").toString().includes("تم البيع"));

            let h = '';
            filtered.forEach(r => {
                let sold = (r[11]||"").toString().includes("تم البيع");
                let img = getImg(r[12]);
                const fmt = (v) => isNaN(parseFloat(v)) ? '--' : parseFloat(v).toLocaleString();

                let paid = parseFloat(r[6]) || 0;
                let over = parseFloat(r[7]) || 0;
                let cash = paid + over;
                let total = parseFloat(r[15]) || 0;
                let remain = total - cash;

                h += `<div class="apt-card ${sold ? 'is-sold' : ''}">
                    ${img ? `<div class="img-container"><img src="${img}" loading="lazy"></div>` : ''}
                    <div class="apt-content">
                        <span class="apt-location">${r[1]}</span>
                        <div class="apt-title">عمارة ${r[2]} • وحدة ${r[3]}</div>
                        
                        <div class="apt-specs">
                            <div class="spec-item"><span class="spec-label">الدور</span><span class="spec-value">${r[4]}</span></div>
                            <div class="spec-item"><span class="spec-label">المساحة</span><span class="spec-value">${r[13]} م²</span></div>
                        </div>

                        <div class="price-box-container">
                            <div class="price-line"><span class="pl-label">المدفوع:</span><span class="pl-val">${fmt(paid)} ج.م</span></div>
                            <div class="price-line"><span class="pl-label">قيمة الأوفر:</span><span class="pl-val" style="color:#ef5350">+ ${fmt(over)} ج.م</span></div>
                            
                            <div class="cash-banner">
                                <div class="cash-banner-title">استلم مفتاحك الآن</div>
                                <div class="cash-banner-val">${fmt(cash)} <span style="font-size:12px">جنية كاش</span></div>
                            </div>

                            <div class="footer-specs">
                                <div class="footer-line">
                                    <span class="footer-label">صافي الأقساط المتبقية بدون فائدة البنك:</span>
                                    <span class="footer-val">${fmt(remain)} ج.م</span>
                                </div>
                                <div style="font-size:9px; color:#666; margin-top:4px;">(القيمة الكلية للوحدة ${fmt(total)} ج.م)</div>
                            </div>
                        </div>

                        ${sold ? '<div style="text-align:center; color:red; font-weight:900; font-size:20px;">تم التعاقد</div>' : 
                        `<a href="https://wa.me/201212229797?text=استفسار عن عمارة ${r[2]}" class="btn-preview-neon">طلب معاينة</a>`}
                    </div>
                </div>`;
            });
            list.innerHTML = h;
        }

        function goToStep2(c) { 
            window.curCity = c; 
            switchStep('step2'); 
            let projects = c === 'المنصورة الجديدة' ? ['جنة', 'سكن مصر', 'زاهية', 'إسكان ساحلي'] : ['جنة', 'سكن مصر', 'أهالي'];
            let html = ''; projects.forEach(p => html += `<div class="card-project" onclick="showU('${p}')">${p}</div>`);
            document.getElementById('projectButtons').innerHTML = html;
        }

        function showU(kw) { switchStep('step3'); render(kw); }
        function switchStep(id) { ['step1','step2','step3'].forEach(s => document.getElementById(s).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); window.scrollTo(0,0); }
        function goBack(s) { switchStep('step' + s); }
        window.onload = fetchD;
    </script>
</body>
</html>

<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفيروز للعقارات | الفخامة في الاختيار</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <style>
        :root { --gold: #D4AF37; --gold-glow: rgba(212, 175, 55, 0.4); --dark-bg: #0a0a0a; --card-bg: #161616; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark-bg); color: #fff; margin: 0; padding-bottom: 50px; }
        
        /* الهيدر الفخم */
        header { padding: 60px 20px; text-align: center; background: linear-gradient(135deg, #1a1a1a 0%, #000 100%); border-bottom: 2px solid var(--gold); }
        .logo { font-size: 40px; font-weight: 800; color: #fff; text-shadow: 0 0 10px var(--gold-glow); }
        .logo span { color: var(--gold); }

        /* الأزرار */
        .nav-bar { display: flex; justify-content: center; gap: 15px; padding: 20px; position: sticky; top: 0; background: rgba(10,10,10,0.9); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid #333; }
        .btn { padding: 12px 25px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: 'Cairo'; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--gold-glow); }
        .btn-outline { background: transparent; color: var(--gold); border: 2px solid var(--gold); }

        /* الكروت والشبكة */
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-top: 30px; }
        
        .card { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid #333; transition: 0.4s; position: relative; overflow: hidden; }
        .card:hover { border-color: var(--gold); transform: translateY(-10px); }
        
        /* المربع الذهبي (المميز) */
        .card.featured { border: 2px solid var(--gold); box-shadow: 0 0 25px var(--gold-glow); background: linear-gradient(145deg, #161616, #1c1c1c); }
        .card.featured::before { content: "⭐ لقطة مميزة"; position: absolute; top: 15px; left: -30px; background: var(--gold); color: #000; padding: 5px 40px; transform: rotate(-45deg); font-size: 12px; font-weight: bold; }

        .card h3 { color: var(--gold); margin-top: 10px; }
        .info-row { display: flex; justify-content: space-between; margin: 10px 0; border-bottom: 1px solid #222; padding-bottom: 5px; font-size: 14px; }
        
        /* المودال (النافذة) */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: #1a1a1a; width: 90%; max-width: 450px; padding: 40px; border-radius: 30px; border: 1px solid var(--gold); text-align: center; position: relative; }
        input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; text-align: center; font-size: 16px; }
        
        .hidden { display: none !important; }
        .visible { display: flex !important; }
    </style>
</head>
<body>

<header>
    <div class="logo">AL-FAYROUZ <span>ESTATE</span></div>
    <p style="color: #888;">نخبة العقارات في المنصورة ودمياط الجديدة</p>
</header>

<div class="nav-bar">
    <button class="btn btn-gold" onclick="openAuth()">➕ اعرض عقارك الآن</button>
    <button id="backBtn" class="btn btn-outline hidden" onclick="location.reload()">⬅ عودة للرئيسية</button>
</div>

<div class="container">
    <div id="step1">
        <h2 style="text-align: center; margin-bottom: 30px;">أين تبحث عن استثمارك القادم؟</h2>
        <div class="grid">
            <div class="card" onclick="selectCity('الالمنصورة الجديدة')" style="cursor: pointer; text-align: center;">
                <h1 style="font-size: 50px;">🏙️</h1>
                <h3>المنصورة الجديدة</h3>
                <p>جنة، سكن مصر، والمزيد..</p>
            </div>
            <div class="card" onclick="selectCity('دمياط الجديدة')" style="cursor: pointer; text-align: center;">
                <h1 style="font-size: 50px;">🏖️</h1>
                <h3>دمياط الجديدة</h3>
                <p>أرقى أحياء دمياط</p>
            </div>
        </div>
    </div>

    <div id="step2" class="hidden">
        <h2 id="cityHeader" style="text-align: center; color: var(--gold);"></h2>
        <div id="projectGrid" class="grid"></div>
    </div>

    <div id="step3" class="hidden">
        <h2 id="projectHeader" style="text-align: center; color: var(--gold);"></h2>
        <div id="unitsGrid" class="grid"></div>
    </div>
</div>

<div id="authModal" class="modal hidden">
    <div class="modal-content">
        <h2 style="color: var(--gold);">أهلاً بك في الفيروز</h2>
        <p style="color: #aaa; font-size: 14px;">سجل بياناتك للوصول إلى لوحة إضافة العقارات</p>
        <input type="text" id="uName" placeholder="الاسم ثلاثي">
        <div style="direction: ltr; margin: 20px 0;"><input type="tel" id="uPhone"></div>
        <button class="btn btn-gold" style="width: 100%;" onclick="handleAuth()">دخول آمن</button>
        <p onclick="closeAuth()" style="color: #555; cursor: pointer; margin-top: 15px;">إغلاق</p>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxiPcSexC05MJVeFohzNaNex4oDW0rVylIjAXSsV9BD1QP7v9Esg3xO8CtUh_yOOV6g/exec";
    const FORM_URL = "رابط_جوجل_فورم_بتاعك";
    let allData = [];
    let currentCity = "";

    // تشغيل قائمة الدول
    let phoneInput = window.intlTelInput(document.querySelector("#uPhone"), {
        onlyCountries: ["eg", "sa", "ae", "kw", "qa", "bh", "jo"],
        initialCountry: "eg",
        utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js"
    });

    // جلب البيانات فوراً
    fetch(SCRIPT_URL).then(r => r.json()).then(d => { allData = d; });

    function selectCity(city) {
        currentCity = city;
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        document.getElementById('backBtn').classList.remove('hidden');
        document.getElementById('cityHeader').innerText = "مشاريع " + city;

        let projects = (city.includes('المنصورة')) ? ['جنة', 'سكن مصر', 'إسكان ساحلي'] : ['جنة', 'سكن مصر'];
        let html = '';
        projects.forEach(p => {
            html += `<div class="card" onclick="selectProject('${p}')" style="cursor:pointer; text-align:center;"><h3>${p}</h3><p>عرض الوحدات المتاحة</p></div>`;
        });
        document.getElementById('projectGrid').innerHTML = html;
    }

    function selectProject(proj) {
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
        document.getElementById('projectHeader').innerText = proj + " - " + currentCity;
        
        let filtered = allData.filter(r => r[0] == currentCity && r[1].includes(proj));
        let html = '';
        filtered.forEach((r, idx) => {
            let isFeatured = r[10] === "نعم" ? 'featured' : '';
            html += `
                <div class="card ${isFeatured}">
                    <h3>عمارة ${r[2]} | شقة ${r[3]}</h3>
                    <div class="info-row"><span>المساحة:</span> <span>${r[5]} م²</span></div>
                    <div class="info-row"><span>الدور:</span> <span>${r[4]}</span></div>
                    <div class="info-row" style="color:var(--gold); font-weight:bold;"><span>الإجمالي:</span> <span>${r[7]}</span></div>
                    <p style="font-size:12px; color:#888; margin-top:10px;">${r[9]}</p>
                    <button class="btn btn-gold" style="width:100%; margin-top:15px;" onclick="contact('${idx}')">استفسر الآن 🟢</button>
                </div>`;
        });
        document.getElementById('unitsGrid').innerHTML = html || '<p style="text-align:center;">لا توجد وحدات متاحة حالياً في هذا المشروع</p>';
    }

    function contact(idx) {
        window.open(`https://wa.me/201212229797?text=استفسار عن الوحدة رقم ${idx} في مشروع ${allData[idx][1]}`, '_blank');
    }

    function openAuth() { document.getElementById('authModal').classList.add('visible'); }
    function closeAuth() { document.getElementById('authModal').classList.remove('visible'); }

    function handleAuth() {
        let name = document.getElementById('uName').value;
        if(name.length < 3 || !phoneInput.isValidNumber()) {
            alert("برجاء إدخال بيانات صحيحة وفخمة زيك"); return;
        }
        localStorage.setItem('fayrouz_user', name);
        window.open(FORM_URL, "_blank");
        closeAuth();
    }
</script>
</body>
</html>

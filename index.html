<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-FAYROUZ | الفيروز للعقارات الفاخرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c5a059;
            --dark-bg: #0a0b0d;
            --card-bg: #141619;
            --border: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--dark-bg);
            color: #e0e0e0;
            margin: 0;
            padding-bottom: 50px;
        }

        header {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), var(--dark-bg));
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 5px;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* نظام الفلترة الجديد */
        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: -25px auto 40px;
            position: relative;
            z-index: 100;
        }

        .tab-btn {
            background: var(--card-bg);
            color: #fff;
            border: 1px solid var(--border);
            padding: 12px 30px;
            cursor: pointer;
            font-family: 'Cairo';
            font-weight: 600;
            transition: 0.3s;
            border-radius: 2px;
        }

        .tab-btn.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 0 20px;
        }

        #data {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 30px;
            transition: 0.4s;
            position: relative;
        }

        .card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .card h3 { color: #fff; margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .specs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 14px; color: #aaa; margin: 20px 0; }
        .specs span { color: #fff; font-weight: 600; }
        
        .price { font-size: 1.8rem; color: var(--primary); font-weight: 900; text-align: center; margin: 20px 0; }
        
        .contact-btn {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 12px;
            width: 100%;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Cairo';
            transition: 0.3s;
        }

        .contact-btn:hover { background: var(--primary); color: #000; }

        #loading { text-align: center; padding: 50px; color: var(--primary); }
    </style>
</head>
<body>

<header>
    <h1 class="logo">AL-FAYROUZ</h1>
    <p style="color: var(--primary); letter-spacing: 2px;">PREMIUM ESTATE</p>
</header>

<div class="filter-tabs">
    <button class="tab-btn active" onclick="filterData('الكل', this)">الكل</button>
    <button class="tab-btn" onclick="filterData('المنصورة الجديدة', this)">المنصورة الجديدة</button>
    <button class="tab-btn" onclick="filterData('دمياط الجديدة', this)">دمياط الجديدة</button>
</div>

<div class="container">
    <div id="loading">⏳ جاري تحميل التحف العقارية...</div>
    <div id="data"></div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxiPcSexC05MJVeFohzNaNex4oDW0rVylIjAXSsV9BD1QP7v9Esg3xO8CtUh_yOOV6g/exec";
let allData = [];

// جلب البيانات
fetch(URL)
.then(res => res.json())
.then(data => {
    allData = data.filter(row => row[1] && row[1] !== "المشروع"); // تنظيف البيانات
    document.getElementById("loading").style.display = "none";
    renderCards(allData); // عرض الكل عند الدخول
});

function renderCards(filteredData) {
    let html = "";
    filteredData.forEach((row, i) => {
        html += `
        <div class="card">
            <p style="font-size:10px; color:#444;">ID: AF-${i+100}</p>
            <h3>عمارة ${row[2]} | وحدة ${row[3]}</h3>
            <div class="specs">
                <div>📍 المدينة: <span>${row[0]}</span></div>
                <div>🏛️ المشروع: <span>${row[1]}</span></div>
                <div>📐 المساحة: <span>${row[5]} م²</span></div>
                <div>🏢 الدور: <span>${row[4]}</span></div>
            </div>
            <div class="price">${row[7] || 'اتصل للسعر'}</div>
            <button class="contact-btn" onclick="contact('${row[1]}','${row[7]}','${row[0]}')">طلب معاينة</button>
        </div>`;
    });
    document.getElementById("data").innerHTML = html || '<p style="text-align:center; width:100%;">لا توجد وحدات متاحة في هذا القسم حالياً.</p>';
}

function filterData(city, btn) {
    // تغيير شكل الزراير
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    // الفلترة
    if (city === 'الكل') {
        renderCards(allData);
    } else {
        const filtered = allData.filter(row => row[0].includes(city));
        renderCards(filtered);
    }
}

function contact(name, price, city){
    let msg = `تحية طيبة، الفيروز للعقارات..\nأرغب في الاستفسار عن:\n🏠 المشروع: ${name}\n📍 الموقع: ${city}\n💰 السعر: ${price}`;
    window.open("https://wa.me/201212229797?text=" + encodeURIComponent(msg));
}
</script>
</body>
</html>

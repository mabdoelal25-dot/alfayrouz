<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الفيروز للعقارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00838f; --secondary: #c5a012; --bg-dark: #0f1214; --card-bg: #1c2226; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Cairo', sans-serif; margin: 0; padding: 0; color: #f0f0f0; 
            background: var(--bg-dark); overflow-x: hidden; width: 100%;
        }

        /* تعديل ترتيب الاسم ليصبح الفيروز للعقارات هو الأساسي */
        .header-bar { 
            padding: 40px 10px 20px; text-align: center; 
            background: linear-gradient(to bottom, #161d21, var(--bg-dark));
        }
        .company-name { font-size: 34px; font-weight: 900; color: #fff; margin: 0; letter-spacing: -1px; }
        .company-subtitle { font-size: 14px; color: var(--secondary); font-weight: 700; text-transform: uppercase; margin-top: 5px; }

        .container { width: 100%; max-width: 500px; margin: auto; padding: 15px; }

        /* التنقل العلوي */
        .top-nav { display: flex; align-items: center; margin-bottom: 20px; animation: fadeIn 0.5s; }
        .btn-back-top { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff;
            padding: 8px 16px; border-radius: 10px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 5px;
        }

        .section-title { font-size: 20px; color: #fff; font-weight: 800; flex-grow: 1; text-align: center; margin: 0; }

        /* كروت المدن (تحت بعض) */
        .grid-box { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        .card-city { 
            background: linear-gradient(135deg, #1c2226 0%, #252d33 100%);
            border-radius: 20px; padding: 35px 20px; text-align: center;
            border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        /* كروت المشاريع (2 جنب بعض) */
        .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .card-project { 
            background: var(--card-bg); border-radius: 18px; padding: 25px 10px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.05);
        }

        h3 { margin: 0; font-size: 20px; font-weight: 800; }
        p { margin: 6px 0 0; font-size: 12px; color: var(--secondary); font-weight: 600; }

        /* كروت الوحدات */
        .apt-card { 
            background: #1c2226; border-radius: 15px; padding: 20px; margin-bottom: 15px;
            border-right: 4px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: right;
        }
        .apt-info { display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .price-label { font-size: 12px; color: #aaa; display: block; }
        .price-val { font-size: 16px; font-weight: 800; color: var(--secondary); }

        .btn-wa { 
            margin-top: 15px; background: #25d366; color: #fff; text-align: center;
            padding: 12px; border-radius: 10px; text-decoration: none; display: block;
            font-weight: 800; font-size: 15px;
        }

        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header-bar">
        <h1 class="company-name">الفيروز للعقارات</h1>
        <div class="company-subtitle">Al-Fayrouz Real Estate</div>
    </div>

    <div class="container">
        <div id="step1">
            <h2 class="section-title" style="margin-bottom:25px;">اختر وجهتك العقارية</h2>
            <div class="grid-box">
                <div class="card-city" onclick="goToStep2('المنصورة الجديدة')"><h3>المنصورة الجديدة</h3><p>وجهة الفخامة الساحلية</p></div>
                <div class="card-city" onclick="goToStep2('دمياط الجديدة')"><h3>دمياط الجديدة</h3><p>الهدوء والسكن الراقي</p></div>
            </div>
        </div>

        <div id="step2" class="hidden">
            <div class="top-nav">
                <button class="btn-back-top" onclick="goBack(1)"><span>→</span> رجوع</button>
                <h2 id="cityTitle" class="section-title"></h2>
            </div>
            <div id="projectButtons" class="project-grid"></div>
        </div>

        <div id="step3" class="hidden">
            <div class="top-nav">
                <button class="btn-back-top" onclick="goBack(2)"><span>→</span> رجوع</button>
                <h2 id="projectTitle" class="section-title"></h2>
            </div>
            <div id="apartmentList"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxQsS6y6NgU_HdYXZOKsiV7xyzh7EBvYWLUeOacsqf7ERu93gnVyiOnNDUxqG6UUzcA/exec";
        let allData = [];
        let currentCity = "";

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                allData = data.slice(1);
            } catch (e) { console.log("retrying..."); }
        }

        function goToStep2(city) {
            currentCity = city;
            toggle('step2');
            document.getElementById('cityTitle').innerText = city;
            let projects = (city === 'المنصورة الجديدة') ? ['جنة', 'سكن مصر', 'زاهية', 'إسكان ساحلي'] : ['جنة', 'دار مصر'];
            let html = '';
            projects.forEach(p => {
                html += `<div class="card-project" onclick="showUnits('${p}')"><h3>${p}</h3><p>عرض الوحدات</p></div>`;
            });
            document.getElementById('projectButtons').innerHTML = html;
        }

        function showUnits(kw) {
            toggle('step3');
            document.getElementById('projectTitle').innerText = kw;
            render(kw);
        }

        function render(kw) {
            const list = document.getElementById('apartmentList');
            if (allData.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding:30px; color:var(--secondary);">جاري تحضير العروض...</div>`;
                loadData().then(() => render(kw)); return;
            }
            let filtered = allData.filter(r => (r[0]||"").toString().trim() === currentCity && (r[1]||"").toString().includes(kw));
            
            if (filtered.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding:30px;">لا توجد وحدات متاحة حالياً</div>`; return;
            }

            let html = '';
            filtered.forEach(r => {
                let msg = encodeURIComponent(`استفسار من الموقع:\nالمدينة: ${currentCity}\nالمشروع: ${r[1]}\nعمارة: ${r[2]}\nشقة: ${r[3]}`);
                html += `
                <div class="apt-card">
                    <div style="font-size:18px; font-weight:800;">عمارة ${r[2]} • شقة ${r[3]}</div>
                    <div style="font-size:13px; color:#aaa; margin-top:5px;">📍 ${r[4]} | ${r[5]}</div>
                    <div class="apt-info">
                        <div><span class="price-label">المدفوع</span><span class="price-val">${r[6]}</span></div>
                        <div><span class="price-label">الأوفر</span><span class="price-val" style="color:#ef5350">${r[7]}</span></div>
                    </div>
                    <a href="https://wa.me/201212229797?text=${msg}" class="btn-wa">تواصل واتساب</a>
                </div>`;
            });
            list.innerHTML = html;
        }

        function toggle(id) {
            ['step1','step2','step3'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function goBack(s) { toggle('step' + s); }
        window.onload = loadData;
    </script>
</body>
</html>

<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الفيروز للتسويق العقاري</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
:root { --primary:#006064; --secondary:#b59410; --bg-dark:#121212; --text-light:#eceff1; --glass:rgba(255,255,255,0.05); }

body {
    font-family:'Cairo',sans-serif;
    margin:0;
    color:var(--text-light);
    background:linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
    url('https://images.unsplash.com/photo-1582407947304-fd86f028f716?q=80&w=1600');
    background-size:cover;
}

.header-bar { padding:40px; text-align:center; }
.company-name { font-size:38px; font-weight:700; }
.company-subtitle { color:var(--secondary); }

.container { max-width:1200px; margin:auto; padding:20px; }

.card {
    background:var(--glass);
    padding:20px;
    border-radius:15px;
    cursor:pointer;
    text-align:center;
    transition:.3s;
}
.card:hover { transform:scale(1.05); }

.main-box { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:15px; }

.apt-card {
    background:#000000a8;
    padding:20px;
    border-radius:15px;
}

.hidden { display:none; }

#loader { text-align:center; padding:80px; color:gold; }

.btn-back {
    margin-top:20px;
    padding:10px 20px;
    border:1px solid gold;
    background:none;
    color:gold;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header-bar">
<h1 class="company-name">Al-Fayrouz Real Estate</h1>
<div class="company-subtitle">الفيروز للتسويق العقاري</div>
</div>

<div class="container">

<div id="loader">⏳ جاري تحميل البيانات...</div>

<div id="step1" class="hidden">
<h2>اختر المدينة</h2>
<div id="cityButtons" class="main-box"></div>
</div>

<div id="step2" class="hidden">
<h2 id="cityTitle"></h2>
<div id="regionButtons" class="main-box"></div>
<button class="btn-back" onclick="goBack(1)">رجوع</button>
</div>

<div id="step3" class="hidden">
<h2 id="regionTitle"></h2>
<div id="apartmentList" class="main-box"></div>
<button class="btn-back" onclick="goBack(2)">رجوع</button>
</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxQsS6y6NgU_HdYXZOKsiV7xyzh7EBvYWLUeOacsqf7ERu93gnVyiOnNDUxqG6UUzcA/exec";

let allData = [];
let currentCity = "";

// تحميل البيانات
async function loadData() {
    try {
        const res = await fetch(API_URL);

        if (!res.ok) throw new Error("Fetch failed");

        const data = await res.json();
        console.log("DATA:", data);

        // يدعم كل الأشكال
        if (Array.isArray(data)) {
            allData = data;
        } else if (data.data) {
            allData = data.data;
        } else {
            throw new Error("DATA FORMAT ERROR");
        }

        if (!allData.length) throw new Error("EMPTY DATA");

        document.getElementById("loader").style.display = "none";
        showCities();

    } catch (err) {
        console.error(err);
        document.getElementById("loader").innerText =
        "❌ فشل تحميل البيانات - تأكد من الرابط أو الصلاحيات";
    }
}

// عرض المدن
function showCities() {
    document.getElementById("step1").classList.remove("hidden");

    let cities = [...new Set(
        allData.slice(1).filter(r=>r && r.length).map(r=>r[0])
    )];

    let html = "";

    cities.forEach(c=>{
        html += `<div class="card" onclick="goToStep2(\`${c}\`)">
        <h3>${c}</h3></div>`;
    });

    document.getElementById("cityButtons").innerHTML = html;
}

// عرض المناطق
function goToStep2(city) {
    currentCity = city;

    step1.classList.add("hidden");
    step2.classList.remove("hidden");

    cityTitle.innerText = city;

    let regions = [...new Set(
        allData.filter(r=>r && r[0]===city).map(r=>r[1])
    )];

    let html="";

    regions.forEach(r=>{
        html += `<div class="card" onclick="showUnits(\`${r}\`)">
        <h3>${r}</h3></div>`;
    });

    regionButtons.innerHTML = html;
}

// عرض الشقق
function showUnits(region) {

    step2.classList.add("hidden");
    step3.classList.remove("hidden");

    regionTitle.innerText = region;

    let filtered = allData.filter(r=>r && r[0]===currentCity && r[1]===region);

    let html="";

    filtered.forEach(row=>{
        if (!row) return;

        const format = n => isNaN(n)?n:Number(n).toLocaleString();

        html += `
        <div class="apt-card">
        <h3>عمارة ${row[2]||"-"} شقة ${row[3]||"-"}</h3>
        <p>الدور: ${row[4]||"-"}</p>
        <p>الاتجاه: ${row[5]||"-"}</p>
        <p>سنوات: ${row[9]||"-"}</p>
        <p>قسط: ${format(row[10])}</p>
        <p>المدفوع: ${format(row[6])}</p>
        <p>الأوفر: ${format(row[7])}</p>
        <p>سعر المتر: ${format(row[8])}</p>
        </div>
        `;
    });

    apartmentList.innerHTML = html || "<h3>لا يوجد بيانات</h3>";
}

// رجوع
function goBack(step){
    if(step===1){
        step2.classList.add("hidden");
        step1.classList.remove("hidden");
    }else{
        step3.classList.add("hidden");
        step2.classList.remove("hidden");
    }
}

window.onload = loadData;

</script>

</body>
</html>

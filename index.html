<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Al-Fayrouz</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00838f; --secondary: #c5a012; --bg-dark: #0f1214; --card-bg: #1c2226; --sold: #ef5350; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; margin: 0; padding: 0; color: #f0f0f0; background: var(--bg-dark); overflow-x: hidden; width: 100%; }
        
        .header-bar { padding: 45px 10px 25px; text-align: center; background: linear-gradient(to bottom, #161d21, var(--bg-dark)); }
        .company-name { font-family: 'Montserrat', sans-serif; font-size: 38px; font-weight: 900; color: #fff; margin: 0; letter-spacing: 2px; text-transform: uppercase; }
        .company-subtitle { font-size: 16px; color: var(--secondary); font-weight: 700; margin-top: 5px; }

        .container { width: 100%; max-width: 500px; margin: auto; padding: 15px; }
        .top-nav { display: flex; align-items: center; margin-bottom: 20px; }
        .btn-back-top { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 8px 16px; border-radius: 12px; cursor: pointer; }
        .section-title { font-size: 19px; color: #fff; font-weight: 800; flex-grow: 1; text-align: center; margin: 0; }

        .grid-box { display: flex; flex-direction: column; gap: 15px; }
        .card-city { background: linear-gradient(135deg, #1c2226 0%, #252d33 100%); border-radius: 20px; padding: 35px 20px; text-align: center; border: 1px solid rgba(255,255,255,0.08); }
        .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card-project { background: var(--card-bg); border-radius: 18px; padding: 25px 10px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }

        /* ستايل الكارت الكامل */
        .apt-card { background: #1c2226; border-radius: 18px; padding: 20px; margin-bottom: 15px; border-right: 5px solid var(--primary); position: relative; overflow: hidden; }
        .apt-title { font-size: 18px; font-weight: 900; color: #fff; margin-bottom: 5px; }
        .apt-subtitle { font-size: 13px; color: #aaa; margin-bottom: 15px; }
        
        .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 12px; color: #ccc; margin-bottom: 15px; }
        
        .price-box { display: flex; justify-content: space-between; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .price-item { display: flex; flex-direction: column; }
        .price-label { font-size: 11px; color: #888; }
        .price-val { font-size: 16px; font-weight: 800; color: var(--secondary); }

        /* ستايل تم البيع */
        .is-sold { opacity: 0.6; filter: grayscale(0.8); pointer-events: none; }
        .sold-badge { position: absolute; top: 15px; left: -30px; background: var(--sold); color: #fff; padding: 5px 35px; transform: rotate(-45deg); font-weight: 900; font-size: 10px; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .sold-text { display: block; text-align: center; color: var(--sold); font-weight: 900; margin-top: 10px; padding: 8px; border: 1px solid var(--sold); border-radius: 10px; }

        .btn-wa { background: #25d366; color: #fff; text-align: center; padding: 14px; border-radius: 12px; text-decoration: none; display: block; font-weight: 800; margin-top: 15px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header-bar">
        <h1 class="company-name">Al-Fayrouz</h1>
        <div class="company-subtitle">الفيروز للعقارات</div>
    </div>

    <div class="container">
        <div id="step1">
            <h2 class="section-title" style="margin-bottom:25px;">اختر وجهتك العقارية</h2>
            <div class="grid-box">
                <div class="card-city" onclick="goToStep2('المنصورة الجديدة')"><h3>المنصورة الجديدة</h3><p>وجهة الفخامة الساحلية</p></div>
                <div class="card-city" onclick="goToStep2('دمياط الجديدة')"><h3>دمياط الجديدة</h3><p>الهدوء والسكن الراقي</p></div>
            </div>
        </div>

        <div id="step2" class="hidden">
            <div class="top-nav">
                <button class="btn-back-top" onclick="goBack(1)">→ رجوع</button>
                <h2 id="cityTitle" class="section-title"></h2>
            </div>
            <div id="projectButtons" class="project-grid"></div>
        </div>

        <div id="step3" class="hidden">
            <div class="top-nav">
                <button class="btn-back-top" onclick="goBack(2)">→ رجوع</button>
                <h2 id="projectTitle" class="section-title"></h2>
            </div>
            <div id="apartmentList"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxQsS6y6NgU_HdYXZOKsiV7xyzh7EBvYWLUeOacsqf7ERu93gnVyiOnNDUxqG6UUzcA/exec";
        let allData = [];
        let curCity = "";

        async function fetchD() {
            try {
                const r = await fetch(API_URL);
                const d = await r.json();
                allData = d.slice(1);
            } catch(e) { console.error("Error fetching data"); }
        }

        function goToStep2(c) {
            curCity = c;
            switchStep('step2');
            document.getElementById('cityTitle').innerText = c;
            let projects = (c === 'المنصورة الجديدة') ? ['جنة', 'سكن مصر', 'زاهية', 'إسكان ساحلي'] : ['جنة', 'سكن مصر', 'دار مصر'];
            let html = '';
            projects.forEach(p => {
                html += `<div class="card-project" onclick="showU('${p}')"><h3>${p}</h3><p>عرض الوحدات</p></div>`;
            });
            document.getElementById('projectButtons').innerHTML = html;
        }

        function showU(kw) {
            switchStep('step3');
            document.getElementById('projectTitle').innerText = kw;
            render(kw);
        }

        function render(kw) {
            const list = document.getElementById('apartmentList');
            if (allData.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding:30px; color:var(--secondary);">جاري تحميل البيانات...</div>`;
                fetchD().then(() => render(kw));
                return;
            }

            let filtered = allData.filter(r => (r[0]||"").toString().trim() === curCity && (r[1]||"").toString().includes(kw));

            // الترتيب: المتاح أولاً ثم المباع
            filtered.sort((a, b) => {
                let statusA = (a[11] || "").toString().includes("تم البيع") ? 1 : 0;
                let statusB = (b[11] || "").toString().includes("تم البيع") ? 1 : 0;
                return statusA - statusB;
            });

            if (filtered.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding:30px;">لا توجد وحدات متاحة حالياً</div>`;
                return;
            }

            let h = '';
            filtered.forEach(r => {
                let isSold = (r[11] || "").toString().includes("تم البيع");
                let msg = encodeURIComponent(`استفسار عن عمارة ${r[2]} شقة ${r[3]} في مشروع ${r[1]} - ${curCity}`);
                
                h += `
                <div class="apt-card ${isSold ? 'is-sold' : ''}">
                    ${isSold ? '<div class="sold-badge">تم البيع</div>' : ''}
                    <div class="apt-title">عمارة ${r[2]} • شقة ${r[3]}</div>
                    <div class="apt-subtitle">📍 ${r[4]} | ${r[5]}</div>
                    
                    <div class="specs-grid">
                        <div>📏 سعر المتر: ${r[8]}</div>
                        <div>🕒 التقسيط: ${r[9]} سنوات</div>
                        <div>💰 القسط: ${r[10]}</div>
                    </div>

                    <div class="price-box">
                        <div class="price-item"><span class="price-label">المدفوع</span><span class="price-val">${r[6]}</span></div>
                        <div class="price-item"><span class="price-label">الأوفر</span><span class="price-val" style="color:#ef5350">${r[7]}</span></div>
                    </div>

                    ${isSold ? 
                        '<span class="sold-text">تم البيع بحمد الله</span>' : 
                        `<a href="https://wa.me/201212229797?text=${msg}" class="btn-wa">تواصل واتساب</a>`
                    }
                </div>`;
            });
            list.innerHTML = h;
        }

        function switchStep(id) {
            ['step1','step2','step3'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function goBack(s) { switchStep('step' + s); }
        window.onload = fetchD;
    </script>
</body>
</html>

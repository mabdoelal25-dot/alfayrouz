<!DOCTYPE html>
<html dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2KF82HSX13"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-2KF82HSX13');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Al-Fayrouz Real Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Montserrat:wght@900&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00838f; --secondary: #c5a012; --bg-dark: #0f1214; --card-bg: #1c2226; --sold: #ff1100; --available: #39FF14; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Cairo', sans-serif; color: #f0f0f0; background: var(--bg-dark); margin: 0; padding: 0; overflow-x: hidden; }
        #loadingScreen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 99999; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        .loader-logo { font-family: 'Montserrat'; font-size: 32px; font-weight: 900; color: var(--secondary); animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }
        .social-menu { position: fixed; bottom: 25px; left: 25px; z-index: 10000; display: flex; flex-direction: column-reverse; align-items: center; gap: 15px; }
        .social-btn { width: 55px; height: 55px; background: var(--secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; cursor: pointer; transition: 0.3s; }
        .sub-menu { display: flex; flex-direction: column-reverse; gap: 12px; opacity: 0; visibility: hidden; transform: translateY(20px); transition: 0.4s; }
        .sub-menu.active { opacity: 1; visibility: visible; transform: translateY(0); }
        .sub-item { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; border: 1.5px solid #fff; }
        .sub-item svg { width: 24px; height: 24px; fill: #fff; }
        .bg-tiktok { background: #000; } .bg-insta { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285AEB 90%); } .bg-fb { background: #1877F2; } .bg-wa { background: #25D366; } .bg-call { background: #34b7f1; }
        .header-bar { padding: 50px 10px 30px; text-align: center; background: linear-gradient(to bottom, rgba(197, 160, 18, 0.05), transparent); }
        .company-name { font-family: 'Montserrat'; font-size: 42px; font-weight: 900; color: #fff; margin: 0; text-transform: uppercase; }
        .company-subtitle { font-family: 'Reem Kufi'; font-size: 22px; color: var(--secondary); margin-top: 10px; display: block; }
        .container { width: 100%; max-width: 450px; margin: auto; padding: 15px; }
        .section-title { font-size: 22px; color: #fff; font-weight: 900; text-align: center; margin-bottom: 25px; }
        .card-city { background: linear-gradient(135deg, #1c2226 0%, #252d33 100%); border-radius: 20px; padding: 30px 20px; text-align: center; border: 2px solid rgba(197, 160, 18, 0.3); cursor: pointer; margin-bottom: 15px; transition: 0.3s; }
        .card-city:active { transform: scale(0.95); }
        .card-city h3 { font-size: 28px; font-weight: 900; color: var(--secondary); margin: 0; }
        .card-city p { font-size: 13px; color: #888; margin-top: 8px; }
        .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card-project { background: var(--card-bg); border-radius: 15px; padding: 25px 10px; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; font-weight: 900; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        .apt-card { background: #1c2226; border-radius: 22px; margin-bottom: 25px; overflow: hidden; position: relative; }
        .is-available { border-right: 8px solid var(--available); }
        .is-sold { border-right: 15px solid var(--sold); opacity: 0.6; filter: grayscale(0.7); }
        .img-container { width: 100%; height: 220px; background: #000; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .apt-content { padding: 20px; }
        .apt-title { font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 5px; }
        .apt-location { font-size: 14px; color: var(--secondary); font-weight: 800; display: block; margin-bottom: 15px; }
        .apt-specs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .spec-item { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .spec-label { display: block; font-size: 10px; color: #777; }
        .spec-value { display: block; font-size: 12px; color: #eee; font-weight: 800; }
        .price-box-container { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; border: 1px solid rgba(197, 160, 18, 0.1); margin-bottom: 15px; }
        .price-line { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .pl-label { font-size: 12px; color: #aaa; }
        .pl-val { font-size: 14px; color: var(--secondary); font-weight: 900; }
        .btn-preview-neon { background: var(--available); color: #000; text-align: center; padding: 16px; border-radius: 15px; font-weight: 900; display: block; text-decoration: none; margin-top: 10px; }
        .hidden { display: none !important; }
        .units-counter { background: rgba(197, 160, 18, 0.1); color: var(--secondary); text-align: center; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-weight: 900; border: 1px dashed var(--secondary); }
    </style>
</head>
<body>

        <div class="social-btn" id="mainSocialBtn" onclick="toggleSocial()">

        </div>
        <div class="sub-menu" id="subSocialMenu">
            <a href="https://www.tiktok.com/@relatystate1" class="sub-item bg-tiktok" target="_blank"><svg viewBox="0 0 24 24"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg></a>
            <a href="https://www.instagram.com/alfayrouzrealstate" class="sub-item bg-insta" target="_blank"><svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg></a>
            <a href="https://wa.me/201212229797" class="sub-item bg-wa" target="_blank"><svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.347.223-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg></a>

    <div class="header-bar">
        <h1 class="company-name">Al-Fayrouz</h1>
        <span class="company-subtitle">الفيروز للتسويق العقاري</span>
    </div>

    <div class="container">
        <div id="step1">
            <h2 class="section-title">اختر المدينة</h2>
            <div class="card-city" onclick="goToStep2('المنصورة الجديدة')"><h3>المنصورة الجديدة</h3><p>مستقبل الدلتا على البحر مباشرة</p></div>
            <div class="card-city" onclick="goToStep2('دمياط الجديدة')"><h3>دمياط الجديدة</h3><p>الرقي والاستثمار المضمون</p></div>
        </div>
        <div id="step2" class="hidden">
            <button onclick="goBack(1)" style="background:#1c2226; border:1.5px solid #444; color:#fff; padding:10px 20px; border-radius:15px; font-weight:900; margin-bottom:20px;">رجوع</button>
            <div id="projectButtons" class="project-grid"></div>
        </div>
        <div id="step3" class="hidden">
            <button onclick="goBack(2)" style="background:#1c2226; border:1.5px solid #444; color:#fff; padding:10px 20px; border-radius:15px; font-weight:900; margin-bottom:20px;">رجوع</button>
            <div id="unitCounter" class="units-counter"></div>
            <div id="apartmentList"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxQsS6y6NgU_HdYXZOKsiV7xyzh7EBvYWLUeOacsqf7ERu93gnVyiOnNDUxqG6UUzcA/exec";
        let allData = [];

        (async function init() {
            setTimeout(() => { document.getElementById('loadingScreen').style.display='none'; }, 1000);
            try {
                const r = await fetch(API_URL + "?v=" + Date.now());
                allData = (await r.json()).slice(1);
            } catch(e) { console.error(e); }
        })();

        function toggleSocial() { 
            const m = document.getElementById('subSocialMenu'); 
            m.classList.toggle('active'); 
            document.getElementById('mainSocialBtn').style.transform = m.classList.contains('active') ? 'rotate(45deg)' : 'rotate(0)';
        }

        function getImg(url) {
            if (!url) return "";
            let id = url.includes('id=') ? url.split('id=')[1].split('&')[0] : (url.includes('/d/') ? url.split('/d/')[1].split('/')[0] : "");
            return id ? `https://drive.google.com/thumbnail?sz=1000&id=${id}` : url;
        }

        function renderItem(r) {
            const fmt = (v) => isNaN(v) ? '--' : parseFloat(v).toLocaleString();
            let sold = (r[11]||"").includes("تم البيع");
            let paid = parseFloat(r[6])||0, over = parseFloat(r[7])||0, total = parseFloat(r[15])||0;
            return `<div class="apt-card ${sold?'is-sold':'is-available'}">
                ${r[12]?`<div class="img-container"><img src="${getImg(r[12])}" loading="lazy"></div>`:''}
                <div class="apt-content">
                    <span class="apt-location">${r[1]||'---'}</span>
                    <div class="apt-title">عمارة ${r[2]} • وحدة ${r[3]}</div>
                    <div class="apt-specs">
                        <div class="spec-item"><span class="spec-label">الدور</span><span class="spec-value">${r[4]||'--'}</span></div>
                        <div class="spec-item"><span class="spec-label">المساحة</span><span class="spec-value">${r[13]||'--'} م²</span></div>
                    </div>
                    <div class="price-box-container">
                        <div class="price-line"><span class="pl-label">المدفوع:</span><span class="pl-val">${fmt(paid)} ج.م</span></div>
                        <div class="price-line"><span class="pl-label">الأوفر:</span><span class="pl-val">+ ${fmt(over)} ج.م</span></div>
                        <div style="margin-top:10px; background:rgba(57,255,20,0.1); padding:10px; border-radius:10px; border:1px solid var(--available); text-align:center;">
                            <div style="color:var(--available); font-weight:900;">إجمالي الكاش: ${fmt(paid+over)} ج.م</div>
                        </div>
                    </div>
                    ${sold?'<div style="text-align:center; color:var(--sold); font-weight:900;">تم البيع</div>':`<a href="https://wa.me/201212229797" class="btn-preview-neon">طلب معاينة</a>`}
                </div>
            </div>`;
        }

        // السر هنا: عرض تدريجي عشان ما يهنجش
        function render(kw) {
            const list = document.getElementById('apartmentList');
            list.innerHTML = "";
            let filtered = allData.filter(r => (r[0]||"").trim() === window.curCity && (r[1]||"").includes(kw));
            document.getElementById('unitCounter').innerText = `متاح ${filtered.length} وحدة`;
            
            // عرض أول 5 فوراً
            let index = 0;
            function loadMore() {
                let chunk = filtered.slice(index, index + 5);
                chunk.forEach(r => list.innerHTML += renderItem(r));
                index += 5;
                if(index < filtered.length) setTimeout(loadMore, 50); // تحميل الباقي في "هدوء"
            }
            loadMore();
        }

        function goToStep2(c) { window.curCity = c; switchStep('step2'); let p = c === 'المنصورة الجديدة' ? ['جنة', 'سكن مصر', 'زاهية', 'إسكان ساحلي'] : ['جنة', 'سكن مصر', 'دار مصر', 'أهالي']; let h = ''; p.forEach(x => h += `<div class="card-project" onclick="showU('${x}')">${x}</div>`); document.getElementById('projectButtons').innerHTML = h; }
        function showU(kw) { switchStep('step3'); render(kw); }
        function switchStep(id) { ['step1','step2','step3'].forEach(s => document.getElementById(s).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); window.scrollTo(0,0); }
        function goBack(s) { switchStep('step' + s); }
    </script>
</body>
</html>

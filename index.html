<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Al-Fayrouz Real Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00838f; --secondary: #c5a012; --bg-dark: #0f1214; --card-bg: #1c2226; --sold: #ff1100; --available: #39FF14; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Cairo', sans-serif; color: #f0f0f0; background: var(--bg-dark); margin: 0; padding: 0; }

        #loadingScreen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .loader-logo { font-family: 'Montserrat'; font-size: 32px; font-weight: 900; color: var(--secondary); animation: pulse 1.2s infinite ease-in-out; }
        @keyframes pulse-text { 0%, 100% { opacity: 0.4; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }

        .header-bar { padding: 40px 10px 20px; text-align: center; }
        .company-name { font-family: 'Montserrat', sans-serif; font-size: 38px; font-weight: 900; color: #fff; margin: 0; }
        .container { width: 100%; max-width: 450px; margin: auto; padding: 15px; }
        
        .apt-card { background: #1c2226; border-radius: 22px; margin-bottom: 25px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        .is-available { border-right: 8px solid var(--available); } 
        .is-sold { border-right: 15px solid var(--sold); opacity: 0.6; } 
        
        .img-container { width: 100%; height: 230px; background: #000; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .apt-content { padding: 15px; }
        .apt-main-title { font-size: 18px; font-weight: 900; color: var(--secondary); margin-bottom: 5px; }
        .apt-sub-title { font-size: 16px; font-weight: 800; color: #fff; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }

        .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .spec-box { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .spec-label { display: block; font-size: 10px; color: #777; font-weight: 700; }
        .spec-val { display: block; font-size: 12px; color: #eee; font-weight: 800; }

        .price-section { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(197, 160, 18, 0.1); }
        .price-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .p-label { font-size: 12px; color: #aaa; font-weight: 700; }
        .p-val { font-size: 14px; color: var(--secondary); font-weight: 900; }

        .btn-preview-neon { background: var(--available); color: #000; text-align: center; padding: 16px; border-radius: 15px; cursor: pointer; font-weight: 900; display: flex; align-items: center; justify-content: center; text-decoration: none; }
        .btn-call-fixed { position: fixed; bottom: 20px; left: 20px; width: 50px; height: 50px; background: var(--secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 9999; border: 2px solid #fff; }
        .btn-call-fixed svg { fill: #fff; width: 22px; height: 22px; }

        .hidden { display: none !important; }
        .card-city { background: linear-gradient(135deg, #1c2226 0%, #252d33 100%); border-radius: 20px; padding: 30px 20px; text-align: center; border: 2px solid rgba(197, 160, 18, 0.3); cursor: pointer; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="loadingScreen"><div class="loader-logo">AL-FAYROUZ</div></div>

    <a href="tel:+201212229797" class="btn-call-fixed">
        <svg viewBox="0 0 24 24"><path d="M20 15.5c-1.2 0-2.4-.2-3.6-.6-.3-.1-.7 0-1 .2l-2.2 2.2c-2.8-1.4-5.1-3.8-6.6-6.6l2.2-2.2c.3-.3.4-.7.2-1-.3-1.1-.5-2.3-.5-3.5 0-.6-.4-1-1-1H4c-.6 0-1 .4-1 1 0 9.4 7.6 17 17 17 .6 0 1-.4 1-1v-3.5c0-.6-.4-1-1-1z"/></svg>
    </a>

    <div class="header-bar">
        <h1 class="company-name">Al-Fayrouz</h1>
    </div>

    <div class="container">
        <div id="step1">
            <div class="card-city" onclick="goToStep2('المنصورة الجديدة')"><h3>المنصورة الجديدة</h3></div>
            <div class="card-city" onclick="goToStep2('دمياط الجديدة')"><h3>دمياط الجديدة</h3></div>
        </div>
        <div id="step2" class="hidden">
            <div style="display:flex; align-items:center; margin-bottom:20px;">
                <button onclick="goBack(1)" style="background:#333; border:none; color:#fff; padding:8px 15px; border-radius:10px;">رجوع</button>
            </div>
            <div id="projectButtons" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
        </div>
        <div id="step3" class="hidden">
            <div style="display:flex; align-items:center; margin-bottom:20px;">
                <button onclick="goBack(2)" style="background:#333; border:none; color:#fff; padding:8px 15px; border-radius:10px;">رجوع</button>
            </div>
            <div id="apartmentList"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxQsS6y6NgU_HdYXZOKsiV7xyzh7EBvYWLUeOacsqf7ERu93gnVyiOnNDUxqG6UUzcA/exec";
        let allData = [];

        async function fetchD() {
            try {
                const response = await fetch(API_URL + "?v=" + Math.random());
                const data = await response.json();
                allData = data.slice(1);
                document.getElementById('loadingScreen').style.display = 'none';
            } catch(e) { console.error(e); }
        }

        function getImg(url) {
            if (!url) return "";
            url = url.toString();
            if (url.includes('drive.google.com')) {
                let id = url.includes('id=') ? url.split('id=')[1].split('&')[0] : url.split('/d/')[1].split('/')[0];
                return `https://drive.google.com/thumbnail?sz=1000&id=${id}`;
            }
            return url;
        }

        function render(kw) {
            const list = document.getElementById('apartmentList');
            let filtered = allData.filter(r => (r[0]||"").toString().trim() === window.curCity && (r[1]||"").toString().includes(kw));

            let h = '';
            filtered.forEach(r => {
                let sold = (r[11]||"").toString().includes("تم البيع");
                let img = getImg(r[12]); // M = العمود 12 (بدءاً من 0)
                let msg = encodeURIComponent(`استفسار عن عمارة ${r[2]} شقة ${r[3]}`);

                h += `<div class="apt-card ${sold ? 'is-sold' : 'is-available'}">
                    ${img ? `<div class="img-container"><img src="${img}" loading="lazy"></div>` : ''}
                    <div class="apt-content">
                        <div class="apt-main-title">${r[1] || '---'}</div>
                        <div class="apt-sub-title">عمارة ${r[2]} • شقة ${r[3]}</div>
                        
                        <div class="specs-grid">
                            <div class="spec-box"><span class="spec-label">الدور</span><span class="spec-val">${r[4]||'--'}</span></div>
                            <div class="spec-box"><span class="spec-label">الاتجاه</span><span class="spec-val">${r[5]||'--'}</span></div>
                            <div class="spec-box"><span class="spec-label">المساحة</span><span class="spec-val">${r[13]||'--'} م</span></div>
                            <div class="spec-box"><span class="spec-label">الحالة</span><span class="spec-val">${sold ? 'تم البيع' : 'جاهزة للمعاينة'}</span></div>
                        </div>

                        <div class="price-section">
                            <div class="price-row"><span class="p-label">المدفوع:</span><span class="p-val">${r[6]||'--'}</span></div>
                            <div class="price-row"><span class="p-label">الأوفر:</span><span class="p-val">${r[7]||'--'}</span></div>
                            <div class="price-row"><span class="p-label">سعر المتر:</span><span class="p-val">${r[8]||'--'}</span></div>
                            <div class="price-row"><span class="p-label">سنوات التقسيط:</span><span class="p-val">${r[9]||'--'}</span></div>
                            <div class="price-row"><span class="p-label">دفعة التقسيط:</span><span class="p-val">${r[10]||'--'}</span></div>
                            <div class="price-row"><span class="p-label">متبقي قسط على:</span><span class="p-val">${r[14]||'--'}</span></div>
                        </div>

                        ${sold ? '<div style="text-align:center; color:var(--sold); font-weight:900;">تـم البيـع</div>' : 
                        `<a href="https://wa.me/201212229797?text=${msg}" class="btn-preview-neon">طلب معاينة</a>`}
                    </div>
                </div>`;
            });
            list.innerHTML = h;
        }

        function goToStep2(c) { window.curCity = c; switchStep('step2'); let projects = (c === 'المنصورة الجديدة') ? ['جنة', 'سكن مصر', 'زاهية', 'إسكان ساحلي'] : ['جنة', 'سكن مصر', 'دار مصر']; let html = ''; projects.forEach(p => html += `<div onclick="showU('${p}')" style="background:var(--card-bg); padding:20px; border-radius:15px; text-align:center; font-weight:900; border:1px solid #333;">${p}</div>`); document.getElementById('projectButtons').innerHTML = html; }
        function showU(kw) { switchStep('step3'); render(kw); }
        function switchStep(id) { ['step1','step2','step3'].forEach(s => document.getElementById(s).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function goBack(s) { switchStep('step' + s); }
        window.onload = fetchD;
    </script>
</body>
</html>

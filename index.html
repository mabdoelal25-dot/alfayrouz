<!DOCTYPE html>
<html dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2KF82HSX13"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-2KF82HSX13');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>الفيروز للتسويق العقاري</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/v4m8fXv7/image.png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Montserrat:wght@900&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00838f; --secondary: #c5a012; --bg-dark: #0f1214; --card-bg: #1c2226; --sold: #ff1100; --available: #39FF14; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; background: var(--bg-dark); color: #f0f0f0; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        #loadingScreen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-logo { font-family: 'Montserrat'; font-size: 30px; font-weight: 900; color: var(--secondary); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1); } }
        .container { width: 100%; max-width: 450px; margin: auto; padding: 15px; }
        .header-bar { padding: 40px 10px 20px; text-align: center; }
        .company-name { font-family: 'Montserrat'; font-size: 38px; color: #fff; margin: 0; }
        .company-subtitle { font-family: 'Reem Kufi'; font-size: 20px; color: var(--secondary); margin-top: 5px; display: block; }
        .card-city, .card-project { background: var(--card-bg); border-radius: 20px; padding: 25px; text-align: center; border: 2px solid rgba(197, 160, 18, 0.2); cursor: pointer; margin-bottom: 15px; transition: 0.3s; }
        .card-city h3 { font-size: 26px; color: var(--secondary); margin: 0; }
        .card-project { padding: 20px; min-height: 80px; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        .apt-card { background: #1c2226; border-radius: 22px; margin-bottom: 25px; overflow: hidden; border-right: 8px solid var(--available); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .is-sold { border-right-color: var(--sold); opacity: 0.7; filter: grayscale(0.5); }
        .img-container { width: 100%; height: 200px; background: #000; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .apt-content { padding: 15px; }
        .apt-title { font-size: 18px; font-weight: 900; color: #fff; margin-bottom: 10px; }
        .apt-specs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .spec-item { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .spec-label { display: block; font-size: 10px; color: #777; font-weight: 700; }
        .spec-value { display: block; font-size: 12px; color: #eee; font-weight: 800; }
        .price-box { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; border: 1px solid rgba(197, 160, 18, 0.1); }
        .price-line { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; }
        .cash-highlight { margin-top: 10px; background: rgba(57,255,20,0.1); padding: 10px; border-radius: 10px; border: 1.5px solid var(--available); text-align: center; }
        .btn-preview { background: var(--available); color: #000; text-align: center; padding: 14px; border-radius: 12px; display: block; text-decoration: none; font-weight: 900; margin-top: 10px; }
        .hidden { display: none !important; }
        .back-btn { background: #1c2226; color: #fff; border: 1px solid #444; padding: 8px 15px; border-radius: 10px; cursor: pointer; margin-bottom: 15px; font-weight: 900; }
    </style>
</head>
<body>

<div id="loadingScreen"><div class="loader-logo">AL-FAYROUZ</div></div>

<div class="header-bar">
    <h1 class="company-name">Al-Fayrouz</h1>
    <span class="company-subtitle">الفيروز للتسويق العقاري</span>
</div>

<div class="container">
    <div id="step1">
        <h2 style="text-align:center; font-size: 20px;">اختر المدينة</h2>
        <div class="card-city" onclick="goToStep2('المنصورة الجديدة')"><h3>المنصورة الجديدة</h3></div>
        <div class="card-city" onclick="goToStep2('دمياط الجديدة')"><h3>دمياط الجديدة</h3></div>
    </div>

    <div id="step2" class="hidden">
        <button class="back-btn" onclick="goBack(1)">رجوع</button>
        <div id="projectButtons" class="project-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
    </div>

    <div id="step3" class="hidden">
        <button class="back-btn" onclick="goBack(2)">رجوع</button>
        <div id="apartmentList"></div>
    </div>
</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWKx4v-nn6JEM3O4En9ELAAKvDxF-NyAnNLPS1c3dLk3Hqvx9MLK9mEfGRP0XTT33P9QC6SOLUt9jM/pub?output=csv";
    let allData = [];

    async function fetchD() {
        try {
            const response = await fetch(`${CSV_URL}&cb=${Date.now()}`);
            const text = await response.text();
            allData = text.split('\n').map(row => row.split(',')).slice(1);
            document.getElementById('loadingScreen').style.display = 'none';
        } catch(e) {
            console.error("Error loading data");
            document.getElementById('loadingScreen').style.display = 'none';
        }
    }

    function render(kw) {
        const list = document.getElementById('apartmentList');
        const fmt = (v) => {
            let num = parseFloat(v?.toString().replace(/[^0-9.]/g, ''));
            return isNaN(num) ? '0' : num.toLocaleString();
        };

        let filtered = allData.filter(r => {
            if(!r[0]) return false;
            let cityMatch = r[0].trim() === window.curCity;
            let projMatch = r[1].includes(kw);
            let status = r[11]?.trim();
            return cityMatch && projMatch && status !== "تحت المراجعة";
        });

        let h = '';
        filtered.forEach(r => {
            let sold = r[11]?.includes("تم البيع");
            let paid = parseFloat(r[6]) || 0;
            let over = parseFloat(r[7]) || 0;
            let cashNow = paid + over;
            let img = r[12]?.includes('id=') ? `https://drive.google.com/thumbnail?sz=1000&id=${r[12].split('id=')[1]}` : r[12];
            
            h += `
            <div class="apt-card ${sold ? 'is-sold' : ''}">
                ${img ? `<div class="img-container"><img src="${img}"></div>` : ''}
                <div class="apt-content">
                    <span style="color:var(--secondary); font-size:12px; font-weight:800;">${r[1]}</span>
                    <div class="apt-title">عمارة ${r[2]} • شقة ${r[3]}</div>
                    <div class="apt-specs">
                        <div class="spec-item"><span class="spec-label">سعر المتر</span><span class="spec-value">${fmt(r[8])} ج.م</span></div>
                        <div class="spec-item"><span class="spec-label">المساحة</span><span class="spec-value">${r[13]} م²</span></div>
                        <div class="spec-item"><span class="spec-label">السنوات</span><span class="spec-value">${r[9]} سنوات</span></div>
                        <div class="spec-item"><span class="spec-label">دفعة القسط</span><span class="spec-value">${fmt(r[10])} ج.م</span></div>
                    </div>
                    <div class="price-box">
                        <div class="price-line"><span>المدفوع:</span><span>${fmt(paid)} ج.م</span></div>
                        <div class="price-line"><span>الأوفر:</span><span style="color:#ef5350">+ ${fmt(over)} ج.م</span></div>
                        <div class="cash-highlight">
                            <div style="color:var(--available); font-size:12px; font-weight:900;">المطلوب كاش حالياً</div>
                            <div style="font-size:22px; font-weight:900;">${fmt(cashNow)} ج.م</div>
                        </div>
                    </div>
                    ${sold ? '<div style="text-align:center; color:red; font-weight:900; margin-top:10px;">تم البيع</div>' : 
                    `<a href="https://wa.me/201212229797" class="btn-preview">طلب معاينة</a>`}
                </div>
            </div>`;
        });
        list.innerHTML = h || '<div style="text-align:center; padding:50px;">لا توجد وحدات حالياً</div>';
    }

    function goToStep2(c) {
        window.curCity = c;
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        let projects = c === 'المنصورة الجديدة' ? ['جنة', 'سكن مصر', 'زاهية', 'إسكان ساحلي'] : ['جنة', 'سكن مصر', 'دار مصر', 'أهالي'];
        let html = '';
        projects.forEach(p => html += `<div class="card-project" onclick="showU('${p}')">${p}</div>`);
        document.getElementById('projectButtons').innerHTML = html;
    }

    function showU(kw) {
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
        render(kw);
    }

    function goBack(s) {
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.add('hidden');
        document.getElementById('step' + s).classList.remove('hidden');
    }

    window.onload = fetchD;
</script>
</body>
</html>

<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-FAYROUZ | منصة العقارات الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #0a0b0d; --card: #141619; --border: rgba(255,255,255,0.1); }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: #fff; margin: 0; padding-bottom: 50px; }
        
        nav { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 900; font-size: 1.5rem; letter-spacing: 2px; color: #fff; }
        .logo span { color: var(--gold); }
        .add-btn { background: var(--gold); color: #000; border: none; padding: 10px 20px; border-radius: 4px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .add-btn:hover { opacity: 0.8; transform: scale(1.02); }

        .container { padding: 30px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: 0.3s; cursor: pointer; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .card-body { padding: 25px; }
        .card-price { font-size: 1.6rem; font-weight: 900; color: var(--gold); margin-bottom: 10px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; padding: 20px; }
        .modal-content { background: var(--card); max-width: 550px; margin: 20px auto; border-radius: 12px; padding: 35px; border: 1px solid var(--gold); position: relative; }
        .close { position: absolute; top: 15px; right: 20px; font-size: 25px; cursor: pointer; color: var(--gold); }

        h2 { color: var(--gold); text-align: center; margin-bottom: 25px; font-weight: 900; }
        label { display: block; margin: 15px 0 8px; font-size: 0.85rem; color: var(--gold); font-weight: 700; border-right: 3px solid var(--gold); padding-right: 10px; }
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 10px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 4px; font-family: 'Cairo'; box-sizing: border-box; }
        input:focus { border-color: var(--gold); outline: none; }
        
        .hidden { display: none; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        #loading { text-align: center; padding: 100px; color: var(--gold); font-size: 1.2rem; }
    </style>
</head>
<body>

<nav>
    <div class="logo">AL-FAYROUZ <span>ESTATE</span></div>
    <button class="add-btn" onclick="openForm()">+ اعرض وحدتك مجاناً</button>
</nav>

<div class="container">
    <div id="loading">جاري تحميل أحدث العروض...</div>
    <div id="data" class="grid"></div>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2>تفاصيل العقار</h2>
        <form onsubmit="handleSubmit(event)">
            
            <label>بيانات المالك</label>
            <div class="row">
                <input type="text" id="uName" placeholder="الاسم الكريم" required>
                <input type="tel" id="uPhone" placeholder="رقم الهاتف (مع كود الدولة)" pattern="[0-9+]{7,15}" required>
            </div>

            <label>تفاصيل الموقع والاتجاه</label>
            <select id="uCity"><option>المنصورة الجديدة</option><option>دمياط الجديدة</option></select>
            <div class="row">
                <input type="text" id="uProj" placeholder="اسم المشروع (مثلاً: جنة)" required>
                <select id="uDir" required>
                    <option value="">اتجاه الشقة</option>
                    <option>بحري</option><option>قبلي</option><option>شرقي</option><option>غربي</option><option>ناصية (بحري شرقي)</option><option>ناصية (بحري غربي)</option>
                </select>
            </div>

            <label>المساحة والسعر</label>
            <div class="row">
                <input type="number" id="uSpace" placeholder="المساحة م²" required>
                <input type="number" id="uMeterPrice" placeholder="سعر المتر (اختياري)">
            </div>

            <label>نظام التعاقد</label>
            <select id="uType" onchange="togglePriceFields()" required>
                <option value="قسط">نظام الأقساط / التنازل</option>
                <option value="كاش">كاش (خالصة الثمن)</option>
            </select>

            <div id="installmentFields">
                <div class="row">
                    <input type="number" id="uPaid" placeholder="المدفوع الفعلي">
                    <input type="number" id="uOver" placeholder="الأوفر المطلوب">
                </div>
                <select id="uRemain">
                    <option value="">هل يوجد أقساط متبقية؟</option>
                    <option>نعم - متبقي أقساط للمركز</option>
                    <option>لا - تم سداد كامل الأقساط</option>
                </select>
            </div>

            <div id="cashFields" class="hidden">
                <input type="number" id="uTotal" placeholder="إجمالي سعر البيع الكاش">
            </div>

            <button type="submit" class="add-btn" style="width: 100%; padding: 16px; margin-top: 20px; font-size: 1rem;">إرسال الوحدة للمراجعة</button>
        </form>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbxiPcSexC05MJVeFohzNaNex4oDW0rVylIjAXSsV9BD1QP7v9Esg3xO8CtUh_yOOV6g/exec";
    let properties = [];

    fetch(URL).then(r => r.json()).then(data => {
        properties = data.filter(row => row[1] && row[1] !== "المشروع");
        document.getElementById('loading').style.display = 'none';
        render();
    });

    function render() {
        let html = "";
        properties.forEach((row, i) => {
            html += `
            <div class="card" onclick="contact(${i})">
                <div class="card-body">
                    <div class="card-price">${row[7] || 'اتصل للسعر'}</div>
                    <h3 style="margin:10px 0; font-size:1.3rem;">${row[1]}</h3>
                    <p style="color:#aaa; font-size:0.9rem;">📍 ${row[0]} | 🏢 الدور ${row[4]}</p>
                    <div style="margin-top:15px; font-size:0.85rem; color:var(--gold);">اضغط لمزيد من التفاصيل ⬅️</div>
                </div>
            </div>`;
        });
        document.getElementById('data').innerHTML = html;
    }

    function togglePriceFields() {
        const type = document.getElementById('uType').value;
        document.getElementById('installmentFields').classList.toggle('hidden', type === 'كاش');
        document.getElementById('cashFields').classList.toggle('hidden', type === 'قسط');
    }

    function openForm() { document.getElementById('addModal').style.display = 'block'; }
    function closeModal() { document.getElementById('addModal').style.display = 'none'; }

    function handleSubmit(e) {
        e.preventDefault();
        
        const name = document.getElementById('uName').value;
        const phone = document.getElementById('uPhone').value;
        const city = document.getElementById('uCity').value;
        const proj = document.getElementById('uProj').value;
        const dir = document.getElementById('uDir').value;
        const space = document.getElementById('uSpace').value;
        const meter = document.getElementById('uMeterPrice').value;
        const type = document.getElementById('uType').value;

        let message = `🏢 *عرض وحدة جديدة - الفيروز*\n\n`;
        message += `👤 المالك: ${name}\n`;
        message += `📞 الهاتف: ${phone}\n`;
        message += `📍 الموقع: ${city} - ${proj}\n`;
        message += `🧭 الاتجاه: ${dir}\n`;
        message += `📐 المساحة: ${space} م²\n`;
        if(meter) message += `📏 سعر المتر: ${meter}\n`;
        
        if(type === 'كاش') {
            message += `💰 النظام: كاش\n💵 السعر: ${document.getElementById('uTotal').value}\n`;
        } else {
            message += `💰 النظام: أقساط\n💵 المدفوع: ${document.getElementById('uPaid').value}\n📈 الأوفر: ${document.getElementById('uOver').value}\n📅 الأقساط: ${document.getElementById('uRemain').value}\n`;
        }

        window.open("https://wa.me/201212229797?text=" + encodeURIComponent(message));
        closeModal();
    }

    function contact(i) {
        const p = properties[i];
        const text = `استفسار عن وحدة:\nالموقع: ${p[0]}\nالمشروع: ${p[1]}\nالسعر المعروض: ${p[7]}`;
        window.open("https://wa.me/201212229797?text=" + encodeURIComponent(text));
    }
</script>
</body>
</html>

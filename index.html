<!DOCTYPE html>
<html dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2KF82HSX13"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-2KF82HSX13');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>الفيروز للتسويق العقاري | عقارات المنصورة الجديدة ودمياط الجديدة</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/v4m8fXv7/image.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Montserrat:wght@900&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00838f; --secondary: #c5a012; --bg-dark: #0f1214; --card-bg: #1c2226; --sold: #ff1100; --available: #39FF14; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Cairo', sans-serif; color: #f0f0f0; background: var(--bg-dark); margin: 0; padding: 0; overflow-x: hidden; }
        #loadingScreen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-logo { font-family: 'Montserrat'; font-size: 35px; font-weight: 900; color: var(--secondary); animation: pulse-text 1.5s infinite ease-in-out; }
        @keyframes pulse-text { 0%, 100% { opacity: 0.3; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.05); } }
        .social-menu { position: fixed; bottom: 25px; left: 25px; z-index: 10000; display: flex; flex-direction: column-reverse; align-items: center; gap: 15px; }
        .social-btn { width: 55px; height: 55px; background: var(--secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 2px solid #fff; cursor: pointer; }
        .sub-menu { display: flex; flex-direction: column-reverse; gap: 12px; opacity: 0; visibility: hidden; transform: translateY(20px); transition: 0.4s; }
        .sub-menu.active { opacity: 1; visibility: visible; transform: translateY(0); }
        .sub-item { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1.5px solid #fff; }
        .bg-wa { background: #25D366; } .bg-call { background: #34b7f1; }
        .header-bar { padding: 50px 10px 30px; text-align: center; }
        .company-name { font-family: 'Montserrat', sans-serif; font-size: 42px; font-weight: 900; color: #fff; margin: 0; }
        .company-subtitle { font-family: 'Reem Kufi', sans-serif; font-size: 22px; color: var(--secondary); margin-top: 10px; display: block; }
        .container { width: 100%; max-width: 450px; margin: auto; padding: 15px; }
        .card-city { background: linear-gradient(135deg, #1c2226 0%, #252d33 100%); border-radius: 20px; padding: 30px 20px; text-align: center; border: 2px solid rgba(197, 160, 18, 0.3); cursor: pointer; margin-bottom: 15px; }
        .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card-project { background: var(--card-bg); border-radius: 15px; padding: 25px 10px; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; font-weight: 900; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        .apt-card { background: #1c2226; border-radius: 22px; margin-bottom: 25px; overflow: hidden; position: relative; }
        .is-available { border-right: 8px solid var(--available); }
        .is-sold { border-right: 15px solid var(--sold); opacity: 0.6; }
        .img-container { width: 100%; height: 220px; background: #000; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .apt-content { padding: 20px; }
        .apt-specs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .spec-item { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .spec-label { display: block; font-size: 10px; color: #777; }
        .spec-value { display: block; font-size: 12px; color: #eee; font-weight: 800; }
        .price-box-container { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(197, 160, 18, 0.1); }
        .btn-preview-neon { background: var(--available); color: #000; text-align: center; padding: 16px; border-radius: 15px; font-weight: 900; display: block; text-decoration: none; box-shadow: 0 5px 15px rgba(57, 255, 20, 0.3); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="loadingScreen"><div class="loader-logo">AL-FAYROUZ</div></div>

    <div class="social-menu">
        <div class="social-btn" onclick="toggleSocial()"><svg viewBox="0 0 24 24" style="fill:#fff; width:28px;"><path d="M20 15.5c-1.2 0-2.4-.2-3.6-.6-.3-.1-.7 0-1 .2l-2.2 2.2c-2.8-1.4-5.1-3.8-6.6-6.6l2.2-2.2c.3-.3.4-.7.2-1-.3-1.1-.5-2.3-.5-3.5 0-.6-.4-1-1-1H4c-.6 0-1 .4-1 1 0 9.4 7.6 17 17 17 .6 0 1-.4 1-1v-3.5c0-.6-.4-1-1-1z"/></svg></div>
        <div class="sub-menu" id="subSocialMenu">
            <a href="https://wa.me/201212229797" class="sub-item bg-wa" target="_blank"><svg viewBox="0 0 24 24" style="fill:#fff; width:24px;"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347"/></svg></a>
            <a href="tel:+201212229797" class="sub-item bg-call"><svg viewBox="0 0 24 24" style="fill:#fff; width:24px;"><path d="M20 15.5c-1.2 0-2.4-.2-3.6-.6-.3-.1-.7 0-1 .2l-2.2 2.2c-2.8-1.4-5.1-3.8-6.6-6.6l2.2-2.2c.3-.3.4-.7.2-1-.3-1.1-.5-2.3-.5-3.5 0-.6-.4-1-1-1H4c-.6 0-1 .4-1 1 0 9.4 7.6 17 17 17 .6 0 1-.4 1-1v-3.5c0-.6-.4-1-1-1z"/></svg></a>
        </div>
    </div>

    <div class="header-bar"><h1 class="company-name">Al-Fayrouz</h1><span class="company-subtitle">الفيروز للتسويق العقاري</span></div>

    <div class="container">
        <div id="step1">
            <div class="card-city" onclick="goToStep2('المنصورة الجديدة')"><h3>المنصورة الجديدة</h3><p>مستقبل الدلتا</p></div>
            <div class="card-city" onclick="goToStep2('دمياط الجديدة')"><h3>دمياط الجديدة</h3><p>الرقي والاستثمار</p></div>
        </div>
        <div id="step2" class="hidden"><button onclick="goBack(1)" style="background:#1c2226; color:#fff; border:1px solid #444; padding:10px 20px; border-radius:10px; margin-bottom:20px;">رجوع</button><div id="projectButtons" class="project-grid"></div></div>
        <div id="step3" class="hidden"><button onclick="goBack(2)" style="background:#1c2226; color:#fff; border:1px solid #444; padding:10px 20px; border-radius:10px; margin-bottom:20px;">رجوع</button><div id="apartmentList"></div></div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWKx4v-nn6JEM3O4En9ELAAKvDxF-NyAnNLPS1c3dLk3Hqvx9MLK9mEfGRP0XTT33P9QC6SOLUt9jM/pub?output=csv";
        let allData = [];

        function toggleSocial() { document.getElementById('subSocialMenu').classList.toggle('active'); }

        async function fetchD() {
            try {
                const response = await fetch(`${CSV_URL}&cb=${Date.now()}`);
                const text = await response.text();
                allData = text.split('\n').map(row => row.split(',')).slice(1);
                document.getElementById('loadingScreen').style.display = 'none';
            } catch(e) { console.error("Error loading"); }
        }

        function render(kw) {
            const list = document.getElementById('apartmentList');
            let filtered = allData.filter(r => (r[0]||"").trim() === window.curCity && (r[1]||"").includes(kw));
            let h = '';
            filtered.forEach(r => {
                let status = (r[11]||"").trim();
                if(status === "تحت المراجعة" || status === "لم تعرض بعد") return;
                
                let sold = status.includes("تم البيع");
                let img = r[12];
                const fmt = (v) => v ? parseFloat(v.toString().replace(/[^0-9.]/g, '')).toLocaleString() : '0';

                // الترتيب المطلوب: I (8), J (9), K (10)
                let pricePerMeter = r[8] || '0';  // I
                let installYears = (r[9]||"").toString().trim(); // J
                let installValue = r[10] || '0'; // K
                
                let displayYears = (installYears === '0' || installYears === '') ? 'تحدد لاحقاً' : installYears + ' سنوات';
                let paid = parseFloat(r[6]) || 0;
                let over = parseFloat(r[7]) || 0;

                h += `<div class="apt-card ${sold ? 'is-sold' : 'is-available'}">
                    ${img ? `<div class="img-container"><img src="${img}" loading="lazy"></div>` : ''}
                    <div class="apt-content">
                        <div class="apt-title">${r[1]} - عمارة ${r[2]} شقة ${r[3]}</div>
                        <div class="apt-specs">
                            <div class="spec-item"><span class="spec-label">سعر المتر</span><span class="spec-value">${fmt(pricePerMeter)} ج.م</span></div>
                            <div class="spec-item"><span class="spec-label">سنوات التقسيط</span><span class="spec-value">${displayYears}</span></div>
                            <div class="spec-item"><span class="spec-label">دفعة القسط</span><span class="spec-value">${fmt(installValue)} ج.م</span></div>
                            <div class="spec-item"><span class="spec-label">المساحة</span><span class="spec-value">${r[13]} م²</span></div>
                        </div>
                        <div class="price-box-container">
                            <div style="text-align:center;">
                                <span style="color:var(--secondary); font-size:12px; font-weight:700;">المطلوب كاش حالياً</span>
                                <div style="font-size:24px; font-weight:900; color:#fff;">${fmt(paid + over)} ج.م</div>
                            </div>
                        </div>
                        ${sold ? '<div style="text-align:center; color:var(--sold); font-weight:900;">تـم البيـع</div>' : `<a href="https://wa.me/201212229797" class="btn-preview-neon">طلب معاينة</a>`}
                    </div>
                </div>`;
            });
            list.innerHTML = h || '<div style="text-align:center; color:#666; padding:20px;">لا توجد وحدات متاحة</div>';
        }

        function goToStep2(c) { window.curCity = c; switchStep('step2'); let projects = c === 'المنصورة الجديدة' ? ['جنة', 'سكن مصر', 'زاهية', 'إسكان ساحلي'] : ['جنة', 'سكن مصر', 'دار مصر', 'أهالي']; let html = ''; projects.forEach(p => html += `<div class="card-project" onclick="showU('${p}')">${p}</div>`); document.getElementById('projectButtons').innerHTML = html; }
        function showU(kw) { switchStep('step3'); render(kw); }
        function switchStep(id) { document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); window.scrollTo(0,0); }
        function goBack(s) { switchStep('step' + s); }
        window.onload = fetchD;
    </script>
</body>
</html>

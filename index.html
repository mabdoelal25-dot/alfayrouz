<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-FAYROUZ | الفيروز للعقارات الفاخرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c5a059; /* ذهبي ملكي مطفي (Matte Gold) */
            --dark-bg: #0a0b0d; /* أسود عميق (Deep Black) */
            --card-bg: #141619; /* رمادي غامق جداً للكروت */
            --text-main: #e0e0e0;
            --text-muted: #888;
            --border: rgba(255, 255, 255, 0.05);
            --shadow-lux: 0 20px 40px rgba(0,0,0,0.5);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at top right, #1a1c20, #0a0b0d);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 50px;
            overflow-x: hidden;
        }

        /* هيدر سينمائي (Cinematic Header) */
        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), var(--dark-bg)), 
                        url('https://images.unsplash.com/photo-1582407947304-fd86f028f716?q=80&w=1600') no-repeat center/cover;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .logo {
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin: 0;
            background: linear-gradient(to bottom, #fff 40%, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(197, 160, 89, 0.3);
        }

        .sub-logo {
            color: var(--primary);
            letter-spacing: 4px;
            font-weight: 200;
            margin-top: 15px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        /* حاوية المحتوى التفاعلية */
        .container {
            max-width: 1300px;
            margin: -60px auto 50px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-title {
            font-weight: 700;
            font-size: 2.5rem;
            color: #fff;
            margin: 0;
        }

        .section-subtitle {
            color: var(--primary);
            font-weight: 300;
            letter-spacing: 1px;
            font-size: 1rem;
            margin-top: 5px;
        }

        /* شبكة الكروت الاحترافية (Professional Grid) */
        #data {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        /* كروت فخمة جداً (Ultra-Luxury Cards) */
        .card {
            background: var(--card-bg);
            border-radius: 4px; /* زوايا حادة بتدي هيبة للمكان */
            border: 1px solid var(--border);
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .card:hover {
            transform: translateY(-15px);
            border-color: rgba(197, 160, 89, 0.5);
            box-shadow: var(--shadow-lux);
        }

        /* تأثير البريق عند التحويم (Hover Shine Effect) */
        .card::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.03) 100%);
            transform: skewX(-25deg);
            transition: 0.75s;
        }
        .card:hover::after { left: 150%; }

        .card-body {
            padding: 40px 30px;
        }

        .card p.ref-no {
            font-size: 0.7rem;
            color: #444;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }

        .card h3 {
            margin: 0 0 25px 0;
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
        }

        /* صفوف البيانات المنظمة */
        .specs-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 35px;
        }

        .spec-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .spec-item span.icon { font-size: 1.2rem; color: var(--primary); }
        .spec-item span.value { color: #fff; font-weight: 600; }

        /* منطقة السعر والزر */
        .card-footer {
            padding: 0 30px 40px 30px;
            text-align: center;
        }

        .price-label {
            font-size: 0.8rem;
            color: var(--primary);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .price-value {
            font-size: 2rem;
            color: #fff;
            font-weight: 900;
            margin-bottom: 30px;
        }

        /* زر المعاينة الفخم (Luxury Button) */
        .btn- معاينة {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 15px 40px;
            font-family: 'Cairo';
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            font-size: 0.9rem;
        }

        .btn-معاينة:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 5px 15px rgba(197, 160, 89, 0.3);
        }

        /* لودنج احترافي (Professional Loader) */
        #loading {
            text-align: center;
            font-size: 1.2rem;
            margin-top: 100px;
            color: var(--primary);
            letter-spacing: 3px;
            font-weight: 200;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* التجاوب مع الموبايل (Mobile Responsiveness) */
        @media (max-width: 768px) {
            header { height: 50vh; }
            .logo { font-size: 2.5rem; letter-spacing: 4px; }
            .sub-logo { font-size: 0.9rem; letter-spacing: 2px; }
            .container { margin-top: -40px; }
            .section-title { font-size: 1.8rem; }
            .card-body { padding: 30px 20px; }
            .card-footer { padding: 0 20px 30px 20px; }
        }
    </style>
</head>
<body>

<header>
    <h1 class="logo">AL-FAYROUZ</h1>
    <div class="sub-logo">PREMIUM REAL ESTATE PROPERTIES</div>
</header>

<div class="container">
    <div class="section-header">
        <h2 class="section-title">المحفظة العقارية الحصرية</h2>
        <p class="section-subtitle">نخبة الوحدات المتاحة في أرقى المشاريع</p>
    </div>

    <div id="loading">⏳ يتم الآن تجهيز القائمة الملكية...</div>
    <div id="data"></div>
</div>

<script>
// رابط الـ API الخاص بك (تأكد إنه /exec)
const URL = "https://script.google.com/macros/s/AKfycbxiPcSexC05MJVeFohzNaNex4oDW0rVylIjAXSsV9BD1QP7v9Esg3xO8CtUh_yOOV6g/exec";

fetch(URL)
.then(res => res.json())
.then(data => {
    document.getElementById("loading").style.display = "none";
    let html = "";

    // حلقة تكرار ذكية (تبدأ من i=0 لو ممسحتش العناوين في جوجل شيت، وإلا خليها i=1)
    for(let i = 0; i < data.length; i++){
        let row = data[i];
        if(!row[1] || row[1] === "" || row[1] === "المشروع") continue; // تخطي الصفوف الفارغة أو صف العناوين

        html += `
        <div class="card">
            <div class="card-body">
                <p class="ref-no">REF: AF-00${i+100}</p>
                <h3>عمارة ${row[2]} | وحدة ${row[3]}</h3>
                
                <div class="specs-group">
                    <div class="spec-item"><span class="icon">🏙️</span> المدينة: <span class="value">${row[0]}</span></div>
                    <div class="spec-item"><span class="icon">📐</span> المساحة: <span class="value">${row[5] || '---'} م²</span></div>
                    <div class="spec-item"><span class="icon">🏢</span> الدور: <span class="value">${row[4] || '---'}</span></div>
                    <div class="spec-item"><span class="icon">🏛️</span> المشروع: <span class="value">${row[1]}</span></div>
                </div>
            </div>
            
            <div class="card-footer">
                <div class="price-label">السعر التقديري</div>
                <div class="price-value">${row[7] || 'اتصل للسعر'}</div>
                <button class="btn-معاينة" onclick="contact('${row[1]}','${row[7]}','${row[0]}')">طلب معاينة خاصة</button>
            </div>
        </div>`;
    }
    document.getElementById("data").innerHTML = html;
})
.catch(error => {
    document.getElementById("loading").innerText = "❌ عذراً، حدث خطأ في الاتصال بالخادم الملكي";
    console.error(error);
});

// دالة التواصل الاحترافية عبر الواتساب
function contact(name, price, city){
    let msg = "تحية طيبة، الفيروز للعقارات..\n\n";
    msg += "أرغب في الاستفسار عن الوحدة الحصرية التالية:\n";
    msg += "🏠 المشروع: " + name + "\n";
    msg += "📍 الموقع: " + city + "\n";
    msg += "💰 السعر المعلن: " + price + "\n\n";
    msg += "يرجى تزويدي بموعد مناسب للمعايـنة الخاصة.";

    let url = "https://wa.me/201212229797?text=" + encodeURIComponent(msg);
    window.open(url);
}
</script>
</body>
</html>

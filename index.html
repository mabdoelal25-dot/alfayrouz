<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Al-Fayrouz Real Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00838f; --secondary: #c5a012; --bg-dark: #0f1214; --card-bg: #1c2226; --sold: #ff1100; --available: #39FF14; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { overflow-x: hidden; width: 100%; height: 100%; margin: 0; padding: 0; touch-action: manipulation; }
        body { font-family: 'Cairo', sans-serif; color: #f0f0f0; background: var(--bg-dark); }

        #loadingScreen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-logo { font-family: 'Montserrat'; font-size: 32px; font-weight: 900; color: var(--secondary); animation: pulse-text 1.2s infinite ease-in-out; }
        @keyframes pulse-text { 0%, 100% { opacity: 0.4; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }

        .header-bar { padding: 40px 10px 20px; text-align: center; }
        .company-name { font-family: 'Montserrat', sans-serif; font-size: 38px; font-weight: 900; color: #fff; margin: 0; text-transform: uppercase; }
        .company-subtitle { font-size: 14px; color: var(--secondary); font-weight: 800; margin-top: 5px; }

        .container { width: 100%; max-width: 450px; margin: auto; padding: 15px; }
        .section-title { font-size: 22px; color: #fff; font-weight: 900; text-align: center; margin-bottom: 25px; }

        .card-city { background: linear-gradient(135deg, #1c2226 0%, #252d33 100%); border-radius: 20px; padding: 30px 20px; text-align: center; border: 2px solid rgba(197, 160, 18, 0.3); cursor: pointer; margin-bottom: 15px; }
        .card-city h3 { font-size: 28px; font-weight: 900; color: var(--secondary); margin: 0; }
        .card-city p { font-size: 13px; color: #888; margin-top: 8px; font-weight: 700; }

        .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card-project { background: var(--card-bg); border-radius: 15px; padding: 25px 10px; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; font-weight: 900; }

        .apt-card { background: #1c2226; border-radius: 22px; margin-bottom: 25px; overflow: hidden; position: relative; }
        .is-available { border-right: 8px solid var(--available); box-shadow: 0 10px 30px rgba(0,0,0,0.3); } 
        .is-sold { border-right: 15px solid var(--sold); opacity: 0.6; filter: grayscale(0.7); } 
        
        .img-container { width: 100%; height: 220px; background: #000; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .apt-content { padding: 20px; }
        .apt-title { font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 5px; }
        .apt-location { font-size: 14px; color: var(--secondary); font-weight: 800; margin-bottom: 15px; display: block; }
        
        .apt-specs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .spec-item { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .spec-label { display: block; font-size: 10px; color: #777; font-weight: 700; margin-bottom: 2px; }
        .spec-value { display: block; font-size: 12px; color: #eee; font-weight: 800; }

        .price-box-container { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(197, 160, 18, 0.1); }
        .price-line { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .price-line:last-child { margin-bottom: 0; }
        .pl-label { font-size: 12px; color: #aaa; font-weight: 700; }
        .pl-val { font-size: 14px; color: var(--secondary); font-weight: 900; }

        .btn-preview-neon { 
            background: var(--available); color: #000; text-align: center; padding: 16px; 
            border-radius: 15px; cursor: pointer; font-weight: 900; margin-top: 10px; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 5px 20px rgba(57, 255, 20, 0.4); border: none; width: 100%; font-size: 16px; text-decoration: none;
        }

        .btn-call-fixed {
            position: fixed; bottom: 25px; left: 25px;
            width: 55px; height: 55px; background: var(--secondary);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 9999;
            text-decoration: none; border: 2px solid #fff;
        }
        .btn-call-fixed svg { fill: #fff; width: 25px; height: 25px; }

        .hidden { display: none !important; }
        .units-counter { background: rgba(197, 160, 18, 0.1); color: var(--secondary); text-align: center; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 15px; font-weight: 900; border: 1px dashed var(--secondary); }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="loader-logo">AL-FAYROUZ</div>
    </div>

    <a href="tel:+201212229797" class="btn-call-fixed">
        <svg viewBox="0 0 24 24"><path d="M20 15.5c-1.2 0-2.4-.2-3.6-.6-.3-.1-.7 0-1 .2l-2.2 2.2c-2.8-1.4-5.1-3.8-6.6-6.6l2.2-2.2c.3-.3.4-.7.2-1-.3-1.1-.5-2.3-.5-3.5 0-.6-.4-1-1-1H4c-.6 0-1 .4-1 1 0 9.4 7.6 17 17 17 .6 0 1-.4 1-1v-3.5c0-.6-.4-1-1-1z"/></svg>
    </a>

    <div class="header-bar">
        <h1 class="company-name">Al-Fayrouz</h1>
        <div class="company-subtitle">الفيروز للعقارات - الفخامة والتفرد</div>
    </div>

    <div class="container">
        <div id="step1">
            <h2 class="section-title">اختر المدينة</h2>
            <div class="card-city" onclick="goToStep2('المنصورة الجديدة')">
                <h3>المنصورة الجديدة</h3>
                <p>مستقبل السكن الفاخر على الساحل مباشرة</p>
            </div>
            <div class="card-city" onclick="goToStep2('دمياط الجديدة')">
                <h3>دمياط الجديدة</h3>
                <p>الهدوء، الرقي، والاستثمار المضمون</p>
            </div>
        </div>

        <div id="step2" class="hidden">
            <div style="display:flex; align-items:center; margin-bottom:25px;">
                <button onclick="goBack(1)" style="background:#1c2226; border:1.5px solid #444; color:#fff; padding:10px 20px; border-radius:15px; font-weight:900;">رجوع</button>
            </div>
            <div id="projectButtons" class="project-grid"></div>
        </div>

        <div id="step3" class="hidden">
            <div style="display:flex; align-items:center; margin-bottom:25px;">
                <button onclick="goBack(2)" style="background:#1c2226; border:1.5px solid #444; color:#fff; padding:10px 20px; border-radius:15px; font-weight:900;">رجوع</button>
            </div>
            <div id="unitCounter" class="units-counter"></div>
            <div id="apartmentList"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxQsS6y6NgU_HdYXZOKsiV7xyzh7EBvYWLUeOacsqf7ERu93gnVyiOnNDUxqG6UUzcA/exec";
        let allData = [];

        async function fetchD() {
            try {
                const response = await fetch(API_URL + "?v=" + Math.random());
                const data = await response.json();
                allData = data.slice(1);
                document.getElementById('loadingScreen').style.display = 'none';
            } catch(e) { console.error(e); }
        }

        function getImg(url) {
            if (!url) return "";
            url = url.toString();
            if (url.includes('drive.google.com')) {
                let id = url.includes('id=') ? url.split('id=')[1].split('&')[0] : url.split('/d/')[1].split('/')[0];
                return `https://drive.google.com/thumbnail?sz=1000&id=${id}`;
            }
            return url;
        }

        function render(kw) {
            const list = document.getElementById('apartmentList');
            let filtered = allData.filter(r => (r[0]||"").toString().trim() === window.curCity && (r[1]||"").toString().includes(kw));
            document.getElementById('unitCounter').innerText = `متاح ${filtered.length} وحدة حالياً`;

            let h = '';
            filtered.forEach(r => {
                let sold = (r[11]||"").toString().includes("تم البيع");
                let img = getImg(r[12]);
                let msg = encodeURIComponent(`طلب معاينة: عمارة ${r[2]} شقة ${r[3]}`);

                h += `<div class="apt-card ${sold ? 'is-sold' : 'is-available'}">
                    ${img ? `<div class="img-container"><img src="${img}" loading="lazy"></div>` : ''}
                    <div class="apt-content">
                        <span class="apt-location">${r[1] || '---'}</span>
                        <div class="apt-title">عمارة ${r[2]} • شقة ${r[3]}</div>
                        
                        <div class="apt-specs">
                            <div class="spec-item"><span class="spec-label">الدور</span><span class="spec-value">${r[4]||'--'}</span></div>
                            <div class="spec-item"><span class="spec-label">الاتجاه</span><span class="spec-value">${r[5]||'--'}</span></div>
                            <div class="spec-item"><span class="spec-label">المساحة</span><span class="spec-value">${r[13]||'--'} م</span></div>
                            <div class="spec-item"><span class="spec-label">الحالة</span><span class="spec-value">${sold ? 'تم البيع' : 'جاهزة للمعاينة'}</span></div>
                        </div>

                        <div class="price-box-container">
                            <div class="price-line"><span class="pl-label">المدفوع:</span><span class="pl-val">${r[6]||'--'}</span></div>
                            <div class="price-line"><span class="pl-label">الأوفر:</span><span class="pl-val" style="color:#ef5350">${r[7]||'--'}</span></div>
                            <div class="price-line"><span class="pl-label">سعر المتر:</span><span class="pl-val">${r[8]||'--'}</span></div>
                            <div class="price-line"><span class="pl-label">سنوات التقسيط:</span><span class="pl-val">${r[9]||'--'}</span></div>
                            <div class="price-line"><span class="pl-label">دفعة التقسيط:</span><span class="pl-val">${r[10]||'--'}</span></div>
                            <div class="price-line"><span class="pl-label">متبقي من الأقساط:</span><span class="pl-val">${r[14]||'--'}</span></div>
                        </div>

                        ${sold ? '<div style="text-align:center; color:var(--sold); font-weight:900; font-size:20px;">تـم البيـع</div>' : 
                        `<a href="https://wa.me/201212229797?text=${msg}" class="btn-preview-neon">طلب معاينة الآن</a>`}
                    </div>
                </div>`;
            });
            list.innerHTML = h;
        }

        function goToStep2(c) { window.curCity = c; switchStep('step2'); let projects = (c === 'المنصورة الجديدة') ? ['جنة', 'سكن مصر', 'زاهية', 'إسكان ساحلي'] : ['جنة', 'سكن مصر', 'دار مصر']; let html = ''; projects.forEach(p => html += `<div class="card-project" onclick="showU('${p}')">${p}</div>`); document.getElementById('projectButtons').innerHTML = html; }
        function showU(kw) { switchStep('step3'); render(kw); }
        function switchStep(id) { ['step1','step2','step3'].forEach(s => document.getElementById(s).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); window.scrollTo(0,0); }
        function goBack(s) { switchStep('step' + s); }
        window.onload = fetchD;
    </script>
</body>
</html>

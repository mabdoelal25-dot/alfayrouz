<!DOCTYPE html>
<html dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2KF82HSX13"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-2KF82HSX13');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Al-Fayrouz Real Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Montserrat:wght@900&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00838f; --secondary: #c5a012; --bg-dark: #0f1214; --card-bg: #1c2226; --sold: #ff1100; --available: #39FF14; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Cairo', sans-serif; color: #f0f0f0; background: var(--bg-dark); margin: 0; padding: 0; }

        #loadingScreen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-logo { font-family: 'Montserrat'; font-size: 32px; font-weight: 900; color: var(--secondary); animation: pulse-text 1.2s infinite ease-in-out; }
        @keyframes pulse-text { 0%, 100% { opacity: 0.4; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }

        .sell-card-trigger { background: linear-gradient(135deg, #1c2226, #252d33); border: 2px dashed var(--secondary); border-radius: 15px; padding: 18px; text-align: center; cursor: pointer; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .sell-card-trigger span { color: var(--secondary); font-weight: 900; font-size: 16px; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 20000; padding: 15px; backdrop-filter: blur(8px); overflow-y: auto; }
        .modal-box { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid var(--secondary); max-width: 420px; margin: 10px auto; }
        .modal-box h2 { color: var(--secondary); text-align: center; margin-bottom: 20px; font-size: 20px; font-weight: 900; }
        .modal-box label { display: block; margin-top: 12px; font-size: 11px; color: #888; font-weight: 700; text-align: right; }
        .modal-box select, .modal-box input { width: 100%; padding: 12px; margin-top: 6px; border-radius: 10px; border: 1px solid #333; background: #0b0d0e; color: #fff; font-family: 'Cairo'; font-size: 14px; text-align: right; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-submit-wa { background: var(--available); color: #000; width: 100%; padding: 16px; border-radius: 12px; font-weight: 900; border: none; margin-top: 20px; cursor: pointer; font-size: 16px; }

        .header-bar { padding: 50px 10px 30px; text-align: center; }
        .company-name { font-family: 'Montserrat', sans-serif; font-size: 42px; font-weight: 900; color: #fff; margin: 0; letter-spacing: 2px; }
        .company-subtitle { font-family: 'Reem Kufi', sans-serif; font-size: 22px; color: var(--secondary); display: block; }
        .container { width: 100%; max-width: 450px; margin: auto; padding: 15px; }
        .card-city { background: #1c2226; border-radius: 20px; padding: 30px 20px; text-align: center; border: 2px solid rgba(197, 160, 18, 0.3); cursor: pointer; margin-bottom: 15px; transition: 0.3s; }
        .card-project { background: var(--card-bg); border-radius: 15px; padding: 25px 10px; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; font-weight: 900; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .apt-card { background: #1c2226; border-radius: 22px; margin-bottom: 25px; overflow: hidden; position: relative; border-right: 8px solid var(--available); }
        .img-container { width: 100%; height: 220px; background: #000; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .apt-content { padding: 20px; }
        .hidden { display: none !important; }
        .price-line { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .btn-preview-neon { background: var(--available); color: #000; text-align: center; padding: 16px; border-radius: 15px; display: block; font-weight: 900; text-decoration: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="loadingScreen"><div class="loader-logo">AL-FAYROUZ</div></div>

    <div id="sellModal" class="modal-overlay">
        <div class="modal-box">
            <h2>أضف وحدتك الخاصة 🏠</h2>
            <div class="grid-inputs">
                <select id="sCity" onchange="upModProj()"><option value="">اختر المدينة</option><option>المنصورة الجديدة</option><option>دمياط الجديدة</option></select>
                <select id="sProj"><option value="">المنطقة/المشروع</option></select>
            </div>
            <div class="grid-inputs">
                <input type="number" id="sBld" placeholder="العمارة">
                <input type="number" id="sUnt" placeholder="الشقة">
            </div>
            <div class="grid-inputs">
                <input type="text" id="sFloor" placeholder="الدور">
                <input type="number" id="sSize" placeholder="المساحة">
            </div>
            <select id="sStatus" onchange="toggleFields()"><option value="">نظام السداد</option><option value="خالصة">خالصة</option><option value="أقساط">أقساط</option></select>
            
            <div id="fP" class="hidden"><input type="number" id="sFullPrice" placeholder="السعر الكاش الإجمالي"></div>
            <div id="fI" class="hidden">
                <div class="grid-inputs"><input type="number" id="sPaid" placeholder="المدفوع"><input type="number" id="sOver" placeholder="الأوفر"></div>
                <div class="grid-inputs"><input type="number" id="sInstAmt" placeholder="القسط"><input type="number" id="sYears" placeholder="سنين القسط"></div>
                <input type="number" id="sRem" placeholder="المتبقي بالكامل">
            </div>
            
            <button class="btn-submit-wa" onclick="autoSend()">إرسال أوتوماتيك للشيت</button>
            <button onclick="closeM()" style="width:100%; background:none; border:none; color:#666; margin-top:10px; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <div class="header-bar">
        <h1 class="company-name">Al-Fayrouz</h1>
        <span class="company-subtitle">الفيروز للتسويق العقاري</span>
    </div>

    <div class="container">
        <div id="step1">
            <div class="sell-card-trigger" onclick="openM()"><span>🏠 اضغط هنا لإضافة وحدتك الخاصة فوراً</span></div>
            <div class="card-city" onclick="goToStep2('المنصورة الجديدة')"><h3>المنصورة الجديدة</h3></div>
            <div class="card-city" onclick="goToStep2('دمياط الجديدة')"><h3>دمياط الجديدة</h3></div>
        </div>
        <div id="step2" class="hidden">
            <button onclick="goBack(1)" style="color:#fff; background:#444; border:none; padding:10px; border-radius:10px; margin-bottom:10px;">رجوع</button>
            <div id="projectButtons" class="project-grid"></div>
        </div>
        <div id="step3" class="hidden">
            <button onclick="goBack(2)" style="color:#fff; background:#444; border:none; padding:10px; border-radius:10px; margin-bottom:10px;">رجوع</button>
            <div id="apartmentList"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxQsS6y6NgU_HdYXZOKsiV7xyzh7EBvYWLUeOacsqf7ERu93gnVyiOnNDUxqG6UUzcA/exec";
        let allData = [];

        function openM() { document.getElementById('sellModal').style.display = 'block'; }
        function closeM() { document.getElementById('sellModal').style.display = 'none'; }
        function toggleFields() {
            const s = document.getElementById('sStatus').value;
            document.getElementById('fP').className = (s==='خالصة'?'':'hidden');
            document.getElementById('fI').className = (s==='أقساط'?'':'hidden');
        }
        function upModProj() {
            const c = document.getElementById('sCity').value;
            const p = document.getElementById('sProj');
            let opts = '<option>المشروع</option>';
            const m = {'المنصورة الجديدة':['جنة','سكن مصر','زاهية'], 'دمياط الجديدة':['جنة','سكن مصر','دار مصر']};
            if(m[c]) m[c].forEach(x => opts+=`<option>${x}</option>`);
            p.innerHTML = opts;
        }

        async function autoSend() {
            const payload = {
                city: document.getElementById('sCity').value, region: document.getElementById('sProj').value,
                building: document.getElementById('sBld').value, unit: document.getElementById('sUnt').value,
                floor: document.getElementById('sFloor').value, status: document.getElementById('sStatus').value,
                size: document.getElementById('sSize').value, paid: document.getElementById('sPaid').value || "0",
                over: document.getElementById('sOver').value || "0", fullPrice: document.getElementById('sFullPrice').value || "0",
                remaining: document.getElementById('sRem').value || "0", installment: document.getElementById('sInstAmt').value || "0"
            };

            if(!payload.city || !payload.building || !payload.status) {
                return alert("من فضلك أكمل البيانات الأساسية");
            }

            const btn = document.querySelector('.btn-submit-wa');
            btn.innerText = "جاري الحفظ... ⏳";
            btn.disabled = true;

            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("✅ تم إرسال البيانات بنجاح وستظهر فور مراجعتها!");
                closeM();
            } catch(e) {
                alert("حدث خطأ، يرجى المحاولة مرة أخرى");
            } finally {
                btn.innerText = "إرسال أوتوماتيك للشيت";
                btn.disabled = false;
            }
        }

        async function fetchD() {
            const r = await fetch(API_URL + "?v=" + Math.random());
            const d = await r.json();
            allData = d.slice(1);
            document.getElementById('loadingScreen').style.display = 'none';
        }

        function render(kw) {
            const list = document.getElementById('apartmentList');
            let h = '';
            allData.filter(r => r[0] === window.curCity && r[1].includes(kw)).forEach(r => {
                h += `<div class="apt-card">
                    <div class="apt-content">
                        <div class="apt-title">عمارة ${r[2]} - وحدة ${r[3]}</div>
                        <div class="price-line"><span>المدفوع:</span><span>${r[6]} ج.م</span></div>
                        <div class="price-line"><span>الأوفر:</span><span>${r[7]} ج.م</span></div>
                        <a href="https://wa.me/201212229797" class="btn-preview-neon">معاينة الآن</a>
                    </div>
                </div>`;
            });
            list.innerHTML = h;
        }

        function goToStep2(c) { window.curCity = c; switchStep('step2'); let p = c === 'المنصورة الجديدة' ? ['جنة','سكن مصر','زاهية'] : ['جنة','سكن مصر','دار مصر']; let html = ''; p.forEach(x => html += `<div class="card-project" onclick="showU('${x}')">${x}</div>`); document.getElementById('projectButtons').innerHTML = html; }
        function showU(kw) { switchStep('step3'); render(kw); }
        function switchStep(id) { ['step1','step2','step3'].forEach(s => document.getElementById(s).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function goBack(s) { switchStep('step' + s); }
        window.onload = fetchD;
    </script>
</body>
</html>

<!DOCTYPE html>
<html dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2KF82HSX13"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-2KF82HSX13');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Al-Fayrouz Real Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00838f; --secondary: #c5a012; --bg-dark: #0f1214; --card-bg: #1c2226; --sold: #ff1100; --available: #39FF14; --input-focus: #c5a012; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Cairo', sans-serif; color: #f0f0f0; background: var(--bg-dark); margin: 0; padding: 0; }

        /* مظهر أرقى لنوافذ الإدخال */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 20000; padding: 15px; backdrop-filter: blur(10px); overflow-y: auto; }
        .modal-box { background: #161b1e; border-radius: 25px; padding: 30px; border: 1px solid rgba(197, 160, 18, 0.2); max-width: 420px; margin: 20px auto; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        
        .modal-box input, .modal-box select { 
            width: 100%; padding: 14px; margin-top: 12px; border-radius: 12px; 
            border: 1px solid #2d353a; background: #0b0d0e; color: #fff; 
            font-family: 'Cairo'; text-align: right; transition: 0.3s;
            font-size: 14px;
        }
        .modal-box input:focus, .modal-box select:focus { border-color: var(--secondary); box-shadow: 0 0 10px rgba(197, 160, 18, 0.1); }
        
        .btn-submit-auto { 
            background: linear-gradient(135deg, var(--secondary) 0%, #a38510 100%); 
            color: #000; width: 100%; padding: 16px; border-radius: 15px; 
            font-weight: 900; border: none; margin-top: 25px; cursor: pointer; 
            font-size: 16px; transition: 0.3s;
        }

        /* تنسيق الهيدر والمحتوى الرئيسي */
        .header-bar { padding: 50px 10px 30px; text-align: center; }
        .company-name { font-family: 'Montserrat'; font-size: 42px; font-weight: 900; color: #fff; margin: 0; letter-spacing: 2px; }
        .company-subtitle { font-size: 22px; color: var(--secondary); font-weight: 700; margin-top: 5px; display: block; }

        .container { width: 100%; max-width: 450px; margin: auto; padding: 15px; }
        .card-city { background: #1c2226; border-radius: 20px; padding: 30px; text-align: center; border: 1px solid rgba(197, 160, 18, 0.2); cursor: pointer; margin-bottom: 15px; transition: 0.3s; }
        .card-project { background: #1c2226; border-radius: 15px; padding: 25px; text-align: center; border: 1px solid #2d353a; cursor: pointer; font-weight: 900; }
        
        .apt-card { background: #1c2226; border-radius: 22px; margin-bottom: 25px; overflow: hidden; border-right: 6px solid var(--available); }
        .is-sold { opacity: 0.6; border-right-color: var(--sold); }
        .apt-content { padding: 20px; }
        .apt-title { font-size: 19px; font-weight: 900; color: #fff; }
        .price-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px solid rgba(197, 160, 18, 0.1); }
        
        .hidden { display: none !important; }
        #loadingScreen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 99999; display: flex; align-items: center; justify-content: center; color: var(--secondary); font-weight: 900; font-size: 24px; }
    </style>
</head>
<body>

    <div id="loadingScreen">AL-FAYROUZ...</div>

    <div id="sellModal" class="modal-overlay">
        <div class="modal-box">
            <h2 style="text-align:center; color:var(--secondary); font-weight:900; margin-bottom:10px;">إضافة عرض جديد</h2>
            <p style="text-align:center; font-size:12px; color:#888; margin-bottom:20px;">أدخل تفاصيل الوحدة بدقة ليتم عرضها</p>
            
            <select id="sCity" onchange="upModProj()">
                <option value="">اختر المدينة</option>
                <option>المنصورة الجديدة</option>
                <option>دمياط الجديدة</option>
            </select>
            
            <select id="sProj" onchange="toggleZahiaFields()">
                <option value="">المشروع</option>
            </select>

            <div id="normalFields" style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                <input type="number" id="sBld" placeholder="رقم العمارة">
                <input type="number" id="sUnt" placeholder="رقم الشقة">
            </div>

            <div id="zahiaFields" class="hidden">
                <input type="number" id="sVilla" placeholder="رقم الفيلا">
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                <input type="text" id="sFloor" placeholder="الدور">
                <input type="number" id="sSize" placeholder="المساحة">
            </div>

            <select id="sStatus" onchange="toggleCashLogic()">
                <option value="أقساط">نظام الأقساط</option>
                <option value="خالصة">كاش (خالصة)</option>
            </select>

            <div id="installmentGroup">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                    <input type="number" id="sPaid" placeholder="المدفوع">
                    <input type="number" id="sOver" placeholder="الأوفر">
                </div>
                <input type="number" id="sRem" placeholder="المتبقي">
            </div>

            <div id="cashGroup" class="hidden">
                <input type="number" id="sTotalPrice" placeholder="إجمالي السعر الكاش">
            </div>

            <button class="btn-submit-auto" onclick="autoSend()">تأكيد ونشر العرض</button>
            <button onclick="closeM()" style="width:100%; background:none; border:none; color:#666; margin-top:15px; cursor:pointer; font-weight:700;">إلغاء</button>
        </div>
    </div>

    <div class="header-bar">
        <h1 class="company-name">Al-Fayrouz</h1>
        <span class="company-subtitle">الفيروز للتسويق العقاري</span>
    </div>

    <div class="container">
        <div id="step1">
            <div onclick="openM()" style="background:rgba(197,160,18,0.1); border:1px dashed var(--secondary); border-radius:15px; padding:15px; text-align:center; color:var(--secondary); cursor:pointer; margin-bottom:20px; font-weight:900;">+ أضف وحدتك هنا</div>
            <div class="card-city" onclick="goToStep2('المنصورة الجديدة')"><h3>المنصورة الجديدة</h3></div>
            <div class="card-city" onclick="goToStep2('دمياط الجديدة')"><h3>دمياط الجديدة</h3></div>
        </div>
        <div id="step2" class="hidden">
            <button onclick="goBack(1)" style="margin-bottom:15px; background:none; border:1px solid #444; color:#fff; padding:8px 15px; border-radius:10px;">رجوع</button>
            <div id="projectButtons" style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;"></div>
        </div>
        <div id="step3" class="hidden">
            <button onclick="goBack(2)" style="margin-bottom:15px; background:none; border:1px solid #444; color:#fff; padding:8px 15px; border-radius:10px;">رجوع</button>
            <div id="apartmentList"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxQsS6y6NgU_HdYXZOKsiV7xyzh7EBvYWLUeOacsqf7ERu93gnVyiOnNDUxqG6UUzcA/exec";
        let allData = [];

        function openM() { document.getElementById('sellModal').style.display = 'block'; }
        function closeM() { document.getElementById('sellModal').style.display = 'none'; }

        function upModProj() {
            const c = document.getElementById('sCity').value;
            const p = document.getElementById('sProj');
            let opts = '<option value="">المشروع</option>';
            const m = {'المنصورة الجديدة':['جنة','سكن مصر','زاهية','إسكان ساحلي'], 'دمياط الجديدة':['جنة','سكن مصر','دار مصر','أهالي']};
            if(m[c]) m[c].forEach(x => opts+=`<option value="${x}">${x}</option>`);
            p.innerHTML = opts;
            toggleZahiaFields();
        }

        function toggleZahiaFields() {
            const proj = document.getElementById('sProj').value;
            const isZahia = proj === 'زاهية';
            document.getElementById('normalFields').classList.toggle('hidden', isZahia);
            document.getElementById('zahiaFields').classList.toggle('hidden', !isZahia);
        }

        function toggleCashLogic() {
            const status = document.getElementById('sStatus').value;
            document.getElementById('installmentGroup').classList.toggle('hidden', status === 'خالصة');
            document.getElementById('cashGroup').classList.toggle('hidden', status !== 'خالصة');
        }

        async function autoSend() {
            const proj = document.getElementById('sProj').value;
            const status = document.getElementById('sStatus').value;
            
            const payload = {
                city: document.getElementById('sCity').value,
                region: proj,
                building: proj === 'زاهية' ? "فيلا" : document.getElementById('sBld').value,
                unit: proj === 'زاهية' ? document.getElementById('sVilla').value : document.getElementById('sUnt').value,
                floor: document.getElementById('sFloor').value,
                status: status,
                size: document.getElementById('sSize').value,
                paid: status === 'خالصة' ? document.getElementById('sTotalPrice').value : document.getElementById('sPaid').value,
                over: status === 'خالصة' ? "0" : document.getElementById('sOver').value,
                remaining: status === 'خالصة' ? "0" : document.getElementById('sRem').value
            };

            const btn = document.querySelector('.btn-submit-auto');
            btn.innerText = "جاري الحفظ...";
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("تمت الإضافة بنجاح");
                closeM();
            } catch(e) { alert("خطأ في الإرسال"); }
            btn.innerText = "تأكيد ونشر العرض";
        }

        async function fetchD() {
            const res = await fetch(API_URL);
            const data = await res.json();
            allData = data.slice(1);
            document.getElementById('loadingScreen').style.display = 'none';
        }

        function render(kw) {
            const list = document.getElementById('apartmentList');
            let filtered = allData.filter(r => r[0] == window.curCity && r[1].includes(kw));
            let h = '';
            filtered.forEach(r => {
                const isCash = r[8] === 'خالصة';
                const isZahia = r[1] === 'زاهية';
                h += `
                <div class="apt-card ${r[11].includes('بيع') ? 'is-sold' : ''}">
                    <div class="apt-content">
                        <span style="color:var(--secondary); font-size:12px; font-weight:800;">${r[1]}</span>
                        <div class="apt-title">${isZahia ? 'فيلا رقم ' + r[3] : 'عمارة ' + r[2] + ' • شقة ' + r[3]}</div>
                        <div class="price-box">
                            ${isCash ? 
                                `<div style="text-align:center"><div style="color:#888; font-size:11px;">إجمالي الكاش</div><div style="color:var(--available); font-size:18px; font-weight:900;">${parseFloat(r[6]).toLocaleString()} ج.م</div></div>` :
                                `<div style="display:flex; justify-content:space-between; font-size:13px;"><span>كاش الاستلام:</span><span style="color:var(--available); font-weight:900;">${(parseFloat(r[6])+parseFloat(r[7])).toLocaleString()} ج.م</span></div>`
                            }
                        </div>
                    </div>
                </div>`;
            });
            list.innerHTML = h || '<p style="text-align:center">لا يوجد عروض حالياً</p>';
        }

        function goToStep2(c) { 
            window.curCity = c; 
            switchStep('step2'); 
            let projects = c === 'المنصورة الجديدة' ? ['جنة', 'سكن مصر', 'زاهية', 'إسكان ساحلي'] : ['جنة', 'سكن مصر', 'دار مصر', 'أهالي']; 
            let html = ''; 
            projects.forEach(p => html += `<div class="card-project" onclick="showU('${p}')">${p}</div>`); 
            document.getElementById('projectButtons').innerHTML = html; 
        }
        function showU(kw) { switchStep('step3'); render(kw); }
        function switchStep(id) { ['step1','step2','step3'].forEach(s => document.getElementById(s).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function goBack(s) { switchStep('step' + s); }
        window.onload = fetchD;
    </script>
</body>
</html>

<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-FAYROUZ ESTATE | الفيروز للعقارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #0a0a0a; --card: #161616; }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: 0.3s; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; line-height: 1.6; }

        nav { background: #000; padding: 15px; text-align: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .logo { font-weight: 900; font-size: 1.6rem; letter-spacing: 1px; }
        .logo span { color: var(--gold); }

        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .hero { text-align: center; margin: 40px 0; }
        .hero h1 { font-size: 2.2rem; color: var(--gold); margin-bottom: 10px; font-weight: 900; }
        .hero p { color: #888; font-size: 1.1rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 25px; }

        .card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #222; display: flex; flex-direction: column; height: 100%; position: relative; }
        .card:hover { transform: translateY(-10px); border-color: var(--gold); }

        .img-wrapper { width: 100%; height: 240px; background: #222; position: relative; overflow: hidden; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        .city-badge { position: absolute; top: 15px; right: 15px; background: var(--gold); color: #000; padding: 5px 15px; border-radius: 8px; font-weight: 700; font-size: 0.8rem; z-index: 2; }

        .card-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .price { font-size: 1.7rem; font-weight: 900; color: var(--gold); margin-bottom: 5px; }
        .title { font-size: 1.25rem; font-weight: 700; margin-bottom: 15px; color: #eee; min-height: 3.2em; }

        .specs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .spec-item { background: #222; padding: 10px; border-radius: 10px; font-size: 0.85rem; color: #bbb; border: 1px solid #333; text-align: center; }

        .btn { display: block; width: 100%; padding: 15px; background: var(--gold); color: #000; text-align: center; text-decoration: none; border-radius: 12px; font-weight: 900; font-size: 1.1rem; margin-top: auto; }
        .btn:hover { background: #fff; }

        #status-msg { text-align: center; padding: 80px; color: var(--gold); font-size: 1.2rem; font-weight: 700; }
    </style>
</head>
<body>

<nav><div class="logo">AL-FAYROUZ <span>ESTATE</span></div></nav>

<div class="container">
    <div class="hero">
        <h1>وحداتنا المختارة</h1>
        <p>عقارات حصرية تحت إدارة علي الحمايدان</p>
    </div>
    <div id="status-msg">✨ جارٍ تجهيز العروض الفخمة...</div>
    <div id="property-grid" class="grid"></div>
</div>

<script>
    // الرابط اللي آخره /exec
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxiPcSexC05MJVeFohzNaNex4oDW0rVylIjAXSsV9BD1QP7v9Esg3xO8CtUh_yOOV6g/exec";

    async function loadProperties() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            // تصفية العناوين وأي صف ملوش مشروع
            const cleanData = data.slice(1).filter(row => row[1]); 
            displayData(cleanData);
        } catch (error) {
            document.getElementById('status-msg').innerHTML = "⚠️ خطأ في الاتصال.. تأكد من نشر الشيت بصلاحية Anyone.";
        }
    }

    function displayData(list) {
        document.getElementById('status-msg').style.display = 'none';
        let html = "";
        list.forEach(row => {
            // حل مشكلة الـ NaN للسعر
            let priceVal = row[7];
            let finalPrice = (isNaN(priceVal) || priceVal === "") ? priceVal : Number(priceVal).toLocaleString() + " ج.م";
            
            // حل مشكلة الصورة
            let imageLink = row[8] || 'https://via.placeholder.com/400x250/111/D4AF37?text=AL-FAYROUZ';

            html += `
            <div class="card">
                <div class="img-wrapper">
                    <div class="city-badge">${row[0] || 'عقار'}</div>
                    <img src="${imageLink}" class="card-img" onerror="this.src='https://via.placeholder.com/400x250/111/D4AF37?text=صورة+قريباً'">
                </div>
                <div class="card-body">
                    <span class="price">${finalPrice}</span>
                    <h3 class="title">${row[1]} - عمارة ${row[2] || '--'}</h3>
                    <div class="specs">
                        <div class="spec-item">📏 ${row[5] || '0'} م²</div>
                        <div class="spec-item">🧭 ${row[6] || 'بحري'}</div>
                        <div class="spec-item">🏢 الدور ${row[4] || '--'}</div>
                        <div class="spec-item">💎 ${row[3] || 'مميز'}</div>
                    </div>
                    <a href="https://wa.me/201212229797?text=استفسار عن وحدة: ${row[1]}" class="btn">تواصل عبر واتساب</a>
                </div>
            </div>`;
        });
        document.getElementById('property-grid').innerHTML = html;
    }

    loadProperties();
</script>
</body>
</html>

<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Fayrouz Real Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        /* رجعت لك التنسيقات الأصلية اللي كنت حاببها */
        :root { --primary: #00838f; --secondary: #c5a012; --bg-dark: #0f1214; --card-bg: #1c2226; --available: #39FF14; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg-dark); color: #fff; margin: 0; }
        .container { max-width: 450px; margin: auto; padding: 15px; }
        
        .sell-card-trigger { border: 2px dashed var(--secondary); padding: 15px; text-align: center; border-radius: 15px; cursor: pointer; margin-bottom: 20px; }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; padding: 20px; overflow-y: auto; }
        .modal-box { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--secondary); }
        .modal-box input, .modal-box select { width: 100%; padding: 10px; margin: 5px 0; background: #000; color: #fff; border: 1px solid #333; border-radius: 8px; }
        
        .btn-submit { background: var(--available); color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: 900; margin-top: 10px; cursor: pointer; }
        .hidden { display: none; }
        
        /* تنسيق الكروت الأصلي */
        .card-city { background: var(--card-bg); padding: 20px; margin: 10px 0; border-radius: 15px; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="text-align:center; font-family:'Montserrat';">AL-FAYROUZ</h1>
        
        <div id="step1">
            <div class="sell-card-trigger" onclick="openM()"><span>🏠 أضف وحدتك الآن</span></div>
            <div class="card-city" onclick="goToStep2('المنصورة الجديدة')">المنصورة الجديدة</div>
            <div class="card-city" onclick="goToStep2('دمياط الجديدة')">دمياط الجديدة</div>
        </div>

        </div>

    <div id="sellModal" class="modal-overlay">
        <div class="modal-box">
            <h2 style="text-align:center; color:var(--secondary);">إضافة وحدة جديدة</h2>
            <select id="sCity"><option value="">المدينة</option><option>المنصورة الجديدة</option><option>دمياط الجديدة</option></select>
            <input type="text" id="sProj" placeholder="المشروع (جنة، سكن مصر...)">
            <input type="number" id="sBld" placeholder="رقم العمارة">
            <input type="number" id="sUnt" placeholder="رقم الشقة">
            <input type="text" id="sFloor" placeholder="الدور">
            <input type="number" id="sSize" placeholder="المساحة">
            <select id="sStatus"><option value="خالصة">خالصة</option><option value="أقساط">أقساط</option></select>
            <input type="number" id="sPaid" placeholder="المدفوع">
            <input type="number" id="sOver" placeholder="الأوفر">
            <button class="btn-submit" onclick="autoSend()">إرسال للشيت فوراً</button>
            <button onclick="closeM()" style="width:100%; background:none; border:none; color:#888; margin-top:10px;">إلغاء</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxQsS6y6NgU_HdYXZOKsiV7xyzh7EBvYWLUeOacsqf7ERu93gnVyiOnNDUxqG6UUzcA/exec";

        function openM() { document.getElementById('sellModal').style.display = 'block'; }
        function closeM() { document.getElementById('sellModal').style.display = 'none'; }

        async function autoSend() {
            const payload = {
                city: document.getElementById('sCity').value,
                region: document.getElementById('sProj').value,
                building: document.getElementById('sBld').value,
                unit: document.getElementById('sUnt').value,
                floor: document.getElementById('sFloor').value,
                status: document.getElementById('sStatus').value,
                size: document.getElementById('sSize').value,
                paid: document.getElementById('sPaid').value || "0",
                over: document.getElementById('sOver').value || "0"
            };

            const btn = document.querySelector('.btn-submit');
            btn.innerText = "جاري الحفظ... ⏳";
            
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("✅ تمام يا بطل، البيانات نزلت في الشيت!");
                closeM();
            } catch(e) {
                alert("في مشكلة حصلت، جرب تاني");
            } finally {
                btn.innerText = "إرسال للشيت فوراً";
            }
        }
        
        // هنا بتكمل باقي دوال العرض (fetchD, render, goToStep2) زي ما كانت في كودك الأصلي بالظبط
    </script>
</body>
</html>

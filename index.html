<!DOCTYPE html>
<html dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2KF82HSX13"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-2KF82HSX13');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Al-Fayrouz Real Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Montserrat:wght@900&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00838f; --secondary: #c5a012; --bg-dark: #0f1214; --card-bg: #1c2226; --sold: #ff1100; --available: #39FF14; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { overflow-x: hidden; width: 100%; height: 100%; margin: 0; padding: 0; touch-action: manipulation; }
        body { font-family: 'Cairo', sans-serif; color: #f0f0f0; background: var(--bg-dark); }

        #loadingScreen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-logo { font-family: 'Montserrat'; font-size: 32px; font-weight: 900; color: var(--secondary); animation: pulse-text 1.2s infinite ease-in-out; }
        @keyframes pulse-text { 0%, 100% { opacity: 0.4; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }

        /* المودال */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 50000; padding: 15px; backdrop-filter: blur(10px); align-items: center; justify-content: center; }
        .modal-box { background: var(--card-bg); border-radius: 25px; padding: 20px; border: 1px solid var(--secondary); max-width: 420px; width: 100%; max-height: 90vh; overflow-y: auto; }
        .modal-box h3 { color: var(--secondary); text-align: center; margin-bottom: 20px; font-weight: 900; }
        .m-input, .m-select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; font-family: 'Cairo'; font-size: 14px; text-align: right; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-send-data { background: var(--secondary); color: #000; width: 100%; padding: 15px; border-radius: 12px; font-weight: 900; border: none; cursor: pointer; font-size: 16px; margin-top: 10px; }
        
        .header-bar { padding: 50px 10px 30px; text-align: center; background: linear-gradient(to bottom, rgba(197, 160, 18, 0.05), transparent); }
        .company-name { font-family: 'Montserrat', sans-serif; font-size: 42px; font-weight: 900; color: #fff; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .company-subtitle { font-family: 'Reem Kufi', sans-serif; font-size: 22px; color: var(--secondary); margin-top: 10px; display: block; }

        .container { width: 100%; max-width: 450px; margin: auto; padding: 15px; }
        .section-title { font-size: 22px; color: #fff; font-weight: 900; text-align: center; margin-bottom: 25px; }

        .card-city { background: linear-gradient(135deg, #1c2226 0%, #252d33 100%); border-radius: 20px; padding: 30px 20px; text-align: center; border: 2px solid rgba(197, 160, 18, 0.3); cursor: pointer; margin-bottom: 15px; }
        .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card-project { background: var(--card-bg); border-radius: 15px; padding: 25px 10px; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; font-weight: 900; min-height: 80px; display: flex; align-items: center; justify-content: center; }

        /* كارت الوحدة */
        .apt-card { background: #1c2226; border-radius: 22px; margin-bottom: 25px; overflow: hidden; position: relative; border-right: 8px solid var(--available); }
        .is-sold { border-right: 15px solid var(--sold) !important; opacity: 0.7; } 
        
        .apt-content { padding: 20px; }
        .apt-title { font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 5px; }
        .apt-location { font-size: 14px; color: var(--secondary); font-weight: 800; margin-bottom: 15px; display: block; }
        
        .apt-specs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .spec-item { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .spec-label { display: block; font-size: 9px; color: #777; margin-bottom: 2px; }
        .spec-value { display: block; font-size: 11px; color: #eee; font-weight: 800; }

        .price-box-container { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(197, 160, 18, 0.1); }
        .price-line { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .pl-label { font-size: 12px; color: #aaa; }
        .pl-val { font-size: 14px; color: var(--secondary); font-weight: 900; }

        .btn-preview-neon { 
            background: var(--available); color: #000; text-align: center; padding: 16px; 
            border-radius: 15px; cursor: pointer; font-weight: 900; display: block;
            box-shadow: 0 5px 20px rgba(57, 255, 20, 0.4); text-decoration: none;
        }

        .hidden { display: none !important; }
        .add-unit-btn { background: linear-gradient(135deg, rgba(197, 160, 18, 0.2), rgba(255,255,255,0.05)); border: 2px solid var(--secondary); border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; margin-bottom: 20px; font-weight: 900; color: var(--secondary); }
    </style>
</head>
<body>

    <div id="loadingScreen"><div class="loader-logo">AL-FAYROUZ</div></div>

    <div id="addUnitModal" class="modal-overlay">
        <div class="modal-box">
            <h3>أضف وحدتك العقارية مجاناً ✨</h3>
            <select id="mCity" class="m-select" onchange="updateMProjects()"><option value="" disabled selected>اختر المدينة</option><option value="المنصورة الجديدة">المنصورة الجديدة</option><option value="دمياط الجديدة">دمياط الجديدة</option></select>
            <select id="mProject" class="m-select"><option value="" disabled selected>اختر المشروع</option></select>
            <div class="grid-inputs"><input type="text" id="mBld" class="m-input" placeholder="رقم العمارة"><input type="text" id="mApt" class="m-input" placeholder="رقم الشقة"></div>
            <div class="grid-inputs"><input type="text" id="mFloor" class="m-input" placeholder="الدور (مثال: الخامس)"><select id="mView" class="m-select"><option value="" disabled selected>الإطلالة</option><option>بحري</option><option>قبلي</option><option>ناصية</option></select></div>
            <div class="grid-inputs"><input type="number" id="mSize" class="m-input" placeholder="المساحة م²"><input type="number" id="mPriceM" class="m-input" placeholder="سعر المتر"></div>
            <select id="mPayType" class="m-select" onchange="togglePayFields()"><option value="" disabled selected>نظام السداد</option><option value="كاش">كاش</option><option value="أقساط">أقساط</option></select>
            <div id="mCashSec" class="hidden"><input type="number" id="mTotal" class="m-input" placeholder="السعر الكلي النهائي"></div>
            <div id="mInstallSec" class="hidden"><div class="grid-inputs"><input type="number" id="mPaid" class="m-input" placeholder="المدفوع"><input type="number" id="mOver" class="m-input" placeholder="الأوفر"></div><input type="number" id="mYears" class="m-input" placeholder="سنوات التقسيط"></div>
            <input type="tel" id="mPhone" class="m-input" placeholder="رقم الهاتف للتواصل">
            <button class="btn-send-data" onclick="submitMUnit()">إرسال للمراجعة</button>
            <div onclick="closeM()" style="color:#666; text-align:center; margin-top:15px; cursor:pointer;">إلغاء</div>
        </div>
    </div>

    <div class="header-bar">
        <h1 class="company-name">Al-Fayrouz</h1>
        <span class="company-subtitle">الفيروز للتسويق العقاري</span>
    </div>

    <div class="container">
        <div id="step1">
            <div class="add-unit-btn" onclick="openM()">🏡 أضف وحدتك العقارية معنا مجاناً</div>
            <h2 class="section-title">اختر المدينة</h2>
            <div class="card-city" onclick="goToStep2('المنصورة الجديدة')"><h3>المنصورة الجديدة</h3><p>مستقبل الدلتا الواعد</p></div>
            <div class="card-city" onclick="goToStep2('دمياط الجديدة')"><h3>دمياط الجديدة</h3><p>الرقي والاستثمار المضمون</p></div>
        </div>
        <div id="step2" class="hidden"><button onclick="goBack(1)" style="color:#fff; background:none; border:1px solid #444; padding:8px 15px; border-radius:10px; margin-bottom:15px;">رجوع</button><div id="projectButtons" class="project-grid"></div></div>
        <div id="step3" class="hidden"><button onclick="goBack(2)" style="color:#fff; background:none; border:1px solid #444; padding:8px 15px; border-radius:10px; margin-bottom:15px;">رجوع</button><div id="apartmentList"></div></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxQsS6y6NgU_HdYXZOKsiV7xyzh7EBvYWLUeOacsqf7ERu93gnVyiOnNDUxqG6UUzcA/exec";
        let allData = [];

        function openM() { document.getElementById('addUnitModal').style.display = 'flex'; }
        function closeM() { document.getElementById('addUnitModal').style.display = 'none'; }
        
        function updateMProjects() {
            const city = document.getElementById('mCity').value;
            const proj = document.getElementById('mProject');
            proj.innerHTML = '';
            let list = city === 'المنصورة الجديدة' ? ['جنة', 'سكن مصر', 'زاهية'] : ['جنة', 'سكن مصر', 'دار مصر'];
            list.forEach(p => proj.innerHTML += `<option>${p}</option>`);
        }

        function togglePayFields() {
            const type = document.getElementById('mPayType').value;
            document.getElementById('mCashSec').className = type === 'كاش' ? '' : 'hidden';
            document.getElementById('mInstallSec').className = type === 'أقساط' ? '' : 'hidden';
        }

        async function submitMUnit() {
            const type = document.getElementById('mPayType').value;
            const totalVal = document.getElementById('mTotal').value;
            
            const data = {
                action: "addUnit",
                city: document.getElementById('mCity').value, // A
                project: document.getElementById('mProject').value, // B
                bld: document.getElementById('mBld').value, // C
                apt: document.getElementById('mApt').value, // D
                floor: document.getElementById('mFloor').value, // E
                view: document.getElementById('mView').value, // F
                // ذكاء الكاش: إذا اختار كاش، نضع السعر في G (المدفوع) وفي P (السعر الكلي)
                paid: type === 'كاش' ? totalVal : document.getElementById('mPaid').value, // G
                over: type === 'كاش' ? 0 : document.getElementById('mOver').value, // H
                payType: type, // J
                size: document.getElementById('mSize').value, // N
                status: "تحت المراجعة", // R (ستوضع هنا ومعها رقم التليفون)
                phone: document.getElementById('mPhone').value, // سيتم دمجه في R
                fullPrice: totalVal || 0 // P
            };

            if (!data.phone) { alert("رقم الهاتف مطلوب"); return; }
            alert("✅ تم الإرسال للمراجعة بنجاح");
            closeM();
            // هنا تضع كود الـ Fetch لإرسال البيانات للـ Sheet
        }

        async function fetchD() {
            try {
                const response = await fetch(API_URL + "?v=" + Math.random());
                const data = await response.json();
                allData = data.slice(1);
                document.getElementById('loadingScreen').style.display = 'none';
            } catch(e) { console.error(e); }
        }

        function render(kw) {
            const list = document.getElementById('apartmentList');
            // فلترة: لا يظهر إذا كان R فيه "تحت المراجعة"
            let filtered = allData.filter(r => r[0] === window.curCity && r[1].includes(kw) && !String(r[17]).includes("تحت المراجعة"));
            
            let h = '';
            filtered.forEach(r => {
                let isSold = String(r[11]).includes("تم البيع"); // خانة L
                const fmt = (v) => isNaN(parseFloat(v)) ? '0' : parseFloat(v).toLocaleString();
                let paid = parseFloat(r[6]) || 0;
                let over = parseFloat(r[7]) || 0;
                let total = parseFloat(r[15]) || 0;

                h += `<div class="apt-card ${isSold ? 'is-sold' : ''}">
                    <div class="apt-content">
                        <span class="apt-location">${r[1]}</span>
                        <div class="apt-title">عمارة ${r[2]} • شقة ${r[3]}</div>
                        <div class="apt-specs">
                            <div class="spec-item"><span class="spec-label">الدور</span><span class="spec-value">${r[4]}</span></div>
                            <div class="spec-item"><span class="spec-label">الإطلالة</span><span class="spec-value">${r[5]}</span></div>
                            <div class="spec-item"><span class="spec-label">المساحة</span><span class="spec-value">${r[13]} م²</span></div>
                        </div>
                        <div class="price-box-container">
                            <div class="price-line"><span class="pl-label">المدفوع:</span><span class="pl-val">${fmt(paid)} ج.م</span></div>
                            <div class="price-line"><span class="pl-label">الأوفر:</span><span class="pl-val">+ ${fmt(over)} ج.م</span></div>
                            <div style="background:var(--available); color:#000; padding:10px; border-radius:8px; text-align:center; margin-top:10px;">
                                <div style="font-size:10px; font-weight:bold;">إجمالي الكاش المطلوب للاستلام</div>
                                <div style="font-size:20px; font-weight:900;">${fmt(paid + over)} ج.م</div>
                            </div>
                        </div>
                        ${isSold ? '<div style="color:red; text-align:center; font-weight:900; font-size:20px;">تـم البيـع ❌</div>' : 
                        `<a href="https://wa.me/201212229797?text=استفسار عن عمارة ${r[2]}" class="btn-preview-neon">طلب معاينة الآن</a>`}
                    </div>
                </div>`;
            });
            list.innerHTML = h || '<p style="text-align:center;">لا توجد وحدات متاحة حالياً في هذا القسم</p>';
        }

        function goToStep2(c) { window.curCity = c; switchStep('step2'); let projects = c === 'المنصورة الجديدة' ? ['جنة', 'سكن مصر', 'زاهية', 'إسكان ساحلي'] : ['جنة', 'سكن مصر', 'دار مصر', 'أهالي']; let html = ''; projects.forEach(p => html += `<div class="card-project" onclick="showU('${p}')">${p}</div>`); document.getElementById('projectButtons').innerHTML = html; }
        function showU(kw) { switchStep('step3'); render(kw); }
        function switchStep(id) { ['step1','step2','step3'].forEach(s => document.getElementById(s).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function goBack(s) { switchStep('step' + s); }
        window.onload = fetchD;
    </script>
</body>
</html>

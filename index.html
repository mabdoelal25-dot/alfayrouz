<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Al-Fayrouz Real Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00838f; --secondary: #c5a012; --bg-dark: #0f1214; --card-bg: #1c2226; --sold: #ef5350; --available: #2ecc71; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { overflow-x: hidden; width: 100%; height: 100%; margin: 0; padding: 0; touch-action: manipulation; }
        body { font-family: 'Cairo', sans-serif; color: #f0f0f0; background: var(--bg-dark); }

        /* شاشة التحميل */
        #loadingScreen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg-dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-ball { width: 50px; height: 50px; background: var(--primary); border-radius: 50%; animation: pulse-glow 0.8s infinite alternate; box-shadow: 0 0 20px var(--primary); }
        @keyframes pulse-glow { from { transform: scale(0.8); opacity: 0.6; } to { transform: scale(1.2); opacity: 1; box-shadow: 0 0 40px var(--primary); } }
        .loader-text { margin-top: 20px; font-family: 'Montserrat'; font-weight: 900; color: var(--secondary); letter-spacing: 2px; }

        .header-bar { padding: 40px 10px 20px; text-align: center; }
        .company-name { font-family: 'Montserrat', sans-serif; font-size: 36px; font-weight: 900; color: #fff; margin: 0; text-transform: uppercase; }
        .company-subtitle { font-size: 14px; color: var(--secondary); font-weight: 800; margin-top: 5px; }

        .container { width: 100%; max-width: 450px; margin: auto; padding: 15px; }
        .section-title { font-size: 22px; color: #fff; font-weight: 900; text-align: center; margin-bottom: 25px; }

        .card-city { background: linear-gradient(135deg, #1c2226 0%, #252d33 100%); border-radius: 20px; padding: 40px 20px; text-align: center; border: 2px solid rgba(197, 160, 18, 0.3); cursor: pointer; margin-bottom: 15px; }
        .card-city h3 { font-size: 30px; font-weight: 900; color: var(--secondary); margin: 0 0 8px 0; }
        .card-city p { font-size: 15px; color: #888; margin: 0; font-weight: 700; }

        .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card-project { background: var(--card-bg); border-radius: 15px; padding: 25px 10px; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }

        /* الكارت الأساسي */
        .apt-card { background: #1c2226; border-radius: 18px; margin-bottom: 20px; overflow: hidden; position: relative; transition: 0.3s; }
        .is-available { border-right: 6px solid var(--available); } /* الشريط الأخضر للمتاح */
        .is-sold { border-right: 6px solid var(--sold); opacity: 0.6; pointer-events: none; } /* الشريط الأحمر للمباع */
        
        .img-container { width: 100%; height: 200px; background: #000; position: relative; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .apt-content { padding: 15px; }
        .apt-title { font-size: 19px; font-weight: 900; color: #fff; margin-bottom: 5px; }
        .units-counter { background: rgba(197, 160, 18, 0.1); color: var(--secondary); text-align: center; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 14px; font-weight: 900; border: 1px dashed var(--secondary); }

        .price-box { display: flex; justify-content: space-between; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .price-val { font-size: 16px; font-weight: 900; color: var(--secondary); }

        /* أزرار التواصل الجديدة */
        .btn-preview { 
            background: var(--available); color: #fff; text-align: center; padding: 14px; 
            border-radius: 12px; cursor: pointer; font-weight: 900; margin-top: 15px; 
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        /* نافذة خيارات التواصل */
        .contact-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content {
            background: #1c2226; width: 100%; max-width: 320px; 
            border-radius: 20px; padding: 25px; border: 1px solid var(--secondary); text-align: center;
        }
        .modal-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 15px; border-radius: 12px; text-decoration: none; font-weight: 900; margin-bottom: 12px; color: #fff;
        }
        .btn-call { background: var(--primary); }
        .btn-whatsapp { background: #25d366; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="loader-ball"></div>
        <div class="loader-text">AL-FAYROUZ</div>
    </div>

    <div class="header-bar">
        <h1 class="company-name">Al-Fayrouz</h1>
        <div class="company-subtitle">الفيروز للعقارات</div>
    </div>

    <div id="contactModal" class="contact-modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin-top:0; color:var(--secondary);">تواصل مع المعاين</h3>
            <p style="font-size:13px; color:#aaa; margin-bottom:20px;">اختر وسيلة التواصل المناسبة لك</p>
            <a id="modalCall" href="#" class="modal-btn btn-call">📞 اتصال هاتفي</a>
            <a id="modalWA" href="#" class="modal-btn btn-whatsapp">💬 واتساب</a>
            <button onclick="closeModal()" style="background:none; border:none; color:#777; font-weight:bold; cursor:pointer; margin-top:10px;">إلغاء</button>
        </div>
    </div>

    <div class="container">
        <div id="step1">
            <h2 class="section-title">اخ

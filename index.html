<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفيروز للتسويق العقاري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <style>
        :root { --gold: #b59410; --dark: #121212; --card-bg: rgba(255,255,255,0.05); }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: white; margin: 0; overflow-x: hidden; }
        
        /* الهيدر واللوجو */
        header { padding: 40px 20px; text-align: center; background: linear-gradient(to bottom, #1a1a1a, var(--dark)); }
        .logo { font-size: 32px; font-weight: bold; color: white; letter-spacing: 1px; }
        .highlight { color: var(--gold); }

        /* الأزرار العلوية */
        .top-nav { display: flex; justify-content: center; gap: 15px; padding: 10px; position: sticky; top: 0; z-index: 1000; background: rgba(18,18,18,0.8); backdrop-filter: blur(10px); }
        .btn-main { background: var(--gold); border: none; padding: 10px 20px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .btn-add { background: #e6683c; }

        /* الكروت */
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .card.featured { border: 2px solid var(--gold); box-shadow: 0 0 15px rgba(181,148,16,0.3); }
        .badge { position: absolute; top: 10px; left: 10px; background: var(--gold); padding: 2px 10px; border-radius: 5px; font-size: 12px; }

        /* المودال */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; z-index:2000; overflow-y:auto; }
        .modal-content { max-width:500px; margin:50px auto; background:#1a1a1a; padding:30px; border-radius:20px; position:relative; }
        input { width:100%; padding:12px; margin:10px 0; border-radius:8px; border:none; }
        
        .hidden { display: none; }
        .ltr { direction: ltr; }
    </style>
</head>
<body>

<header>
    <div class="logo">AL-FAYROUZ <span class="highlight">REAL ESTATE</span></div>
    <p>الفيروز للتسويق العقاري - المنصورة ودمياط الجديدة</p>
</header>

<div class="top-nav">
    <button class="btn-main btn-add" onclick="openAuth()">🏠 عرض عقاراتي</button>
    <button id="backBtn" class="btn-main hidden" onclick="goBack()">⬅ عودة</button>
</div>

<div class="container">
    <div id="step1">
        <center><h2>اختر المدينة</h2></center>
        <div class="grid">
            <div class="card" onclick="selectCity('المنصورة الجديدة')"><h3>المنصورة الجديدة</h3></div>
            <div class="card" onclick="selectCity('دمياط الجديدة')"><h3>دمياط الجديدة</h3></div>
        </div>
    </div>

    <div id="step2" class="hidden">
        <center><h2 id="cityHeader"></h2></center>
        <div id="projectGrid" class="grid"></div>
    </div>

    <div id="step3" class="hidden">
        <center><h2 id="projectHeader"></h2></center>
        <div id="unitsGrid" class="grid"></div>
    </div>
</div>

<div id="authModal" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--gold)">تسجيل دخول</h2>
        <input type="text" id="uName" placeholder="الاسم بالكامل">
        <div class="ltr"><input type="tel" id="uPhone"></div>
        <button class="btn-main" style="width:100%; margin-top:20px;" onclick="handleAuth()">دخول وإضافة عقار</button>
        <button onclick="document.getElementById('authModal').style.display='none'" style="background:none; color:grey; border:none; margin-top:10px; width:100%;">إلغاء</button>
    </div>
</div>

<div id="detailsModal" class="modal">
    <div class="modal-content" id="detailsBox"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
<script>
    // --- الإعدادات ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxiPcSexC05MJVeFohzNaNex4oDW0rVylIjAXSsV9BD1QP7v9Esg3xO8CtUh_yOOV6g/exec";
    const FORM_URL = "https://script.google.com/macros/s/AKfycbxiPcSexC05MJVeFohzNaNex4oDW0rVylIjAXSsV9BD1QP7v9Esg3xO8CtUh_yOOV6g/exec";
    let allData = [];
    let currentCity = "", currentStep = 1;

    // تهيئة قائمة الدول
    let phoneInput = window.intlTelInput(document.querySelector("#uPhone"), {
        onlyCountries: ["eg", "sa", "ae", "kw", "qa", "jo"],
        initialCountry: "eg",
        utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js"
    });

    window.onload = () => {
        fetch(SCRIPT_URL).then(r => r.json()).then(d => { allData = d; });
    };

    function selectCity(city) {
        currentCity = city; currentStep = 2;
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        document.getElementById('backBtn').classList.remove('hidden');
        document.getElementById('cityHeader').innerText = city;

        let projects = (city.includes('المنصورة')) ? 
            ['جنة', 'سكن مصر', 'إسكان ساحلي'] : ['جنة', 'سكن مصر'];
        
        let html = '';
        projects.forEach(p => {
            html += `<div class="card" onclick="selectProject('${p}')"><h3>${p}</h3></div>`;
        });
        document.getElementById('projectGrid').innerHTML = html;
    }

    function selectProject(proj) {
        currentStep = 3;
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
        document.getElementById('projectHeader').innerText = proj;
        
        let filtered = allData.filter(r => r[0] == currentCity && r[1].includes(proj));
        let html = '';
        filtered.forEach((r, idx) => {
            let isFeatured = r[10] === "نعم" ? 'featured' : '';
            html += `
                <div class="card ${isFeatured}">
                    ${isFeatured ? '<div class="badge">مميز ⭐</div>' : ''}
                    <h3>عمارة ${r[2]} - شقة ${r[3]}</h3>
                    <p>المساحة: ${r[5]} م</p>
                    <p style="color:var(--gold)">السعر: ${r[7]}</p>
                    <button class="btn-main" onclick="openDetails('${allData.indexOf(r)}')">التفاصيل</button>
                </div>`;
        });
        document.getElementById('unitsGrid').innerHTML = html;
    }

    function openDetails(idx) {
        let r = allData[idx];
        document.getElementById('detailsBox').innerHTML = `
            <h2 style="color:var(--gold)">عمارة ${r[2]} - شقة ${r[3]}</h2>
            <div style="line-height:1.8">
                <p>📍 المدينة: ${r[0]}</p>
                <p>🏢 المشروع: ${r[1]}</p>
                <p>📐 المساحة: ${r[5]} متر</p>
                <p>💰 الإجمالي: ${r[7]}</p>
                <p>⚠️ الأوفر: ${r[8]}</p>
                <p>📝 وصف: ${r[9]}</p>
            </div>
            <button class="btn-main" style="width:100%; background:#25d366; margin-top:20px;" 
                    onclick="window.open('https://wa.me/201212229797?text=استفسار عن كود ${idx}')">تواصل واتساب</button>
            <button class="btn-main" style="width:100%; background:#333; margin-top:10px;" onclick="closeDetails()">إغلاق</button>
        `;
        document.getElementById('detailsModal').style.display = 'block';
    }

    function handleAuth() {
        let name = document.getElementById('uName').value;
        if(name.length < 3 || !phoneInput.isValidNumber()) {
            alert("برجاء إدخال بيانات صحيحة"); return;
        }
        localStorage.setItem('fayrouz_user', name);
        window.open(FORM_URL, "_blank");
        document.getElementById('authModal').style.display = 'none';
    }

    function openAuth() { document.getElementById('authModal').style.display = 'block'; }
    function closeDetails() { document.getElementById('detailsModal').style.display = 'none'; }
    function goBack() { location.reload(); }
</script>
</body>
</html>

<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-FAYROUZ | الفخامة العقارية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-gradient: linear-gradient(135deg, #D4AF37 0%, #FBE106 100%);
            --dark-pure: #050505;
            --dark-card: #121212;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(212, 175, 55, 0.2);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { box-sizing: border-box; outline: none; }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--dark-pure);
            background-image: radial-gradient(circle at 50% 0%, #1a1508 0%, #050505 100%);
            color: #e0e0e0;
            margin: 0;
            overflow-x: hidden;
        }

        /* Header Premium */
        header {
            padding: 100px 20px 60px;
            text-align: center;
            position: relative;
        }

        .logo {
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 900;
            letter-spacing: 15px;
            margin: 0;
            background: linear-gradient(to bottom, #fff 20%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
        }

        .sub-logo {
            color: var(--gold);
            letter-spacing: 6px;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-top: 10px;
            opacity: 0.8;
            font-weight: 200;
        }

        .cta-header {
            margin-top: 30px;
        }

        .add-property-btn {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 12px 35px;
            border-radius: 2px;
            cursor: pointer;
            font-family: 'Cairo';
            font-weight: 700;
            font-size: 0.9rem;
            transition: var(--transition);
            letter-spacing: 1px;
        }

        .add-property-btn:hover {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        /* Container */
        .container { max-width: 1200px; margin: auto; padding: 20px; }

        /* Modern City Selector */
        .city-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .selector-item {
            padding: 15px 40px;
            background: var(--glass);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(10px);
            position: relative;
        }

        .selector-item span { font-size: 1rem; letter-spacing: 1px; }

        .selector-item.active {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.05);
        }

        .selector-item.active::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 0; width: 100%; height: 2px;
            background: var(--gold-gradient);
        }

        /* Filter Chips */
        .project-filter {
            display: none;
            justify-content: center;
            gap: 12px;
            margin-bottom: 50px;
            animation: fadeIn 0.8s ease;
        }

        .project-chip {
            padding: 8px 25px;
            font-size: 0.8rem;
            background: transparent;
            color: #888;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: var(--transition);
            border-radius: 20px;
        }

        .project-chip.active, .project-chip:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        /* Property Grid & Cards */
        .property-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 40px;
        }

        .prop-card {
            background: var(--dark-card);
            border: 1px solid var(--border);
            position: relative;
            transition: var(--transition);
            overflow: hidden;
        }

        .prop-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, rgba(212, 175, 55, 0.03));
            pointer-events: none;
        }

        .prop-card:hover {
            transform: translateY(-15px);
            border-color: var(--gold);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .card-inner { padding: 40px; }

        .ref-badge {
            font-size: 9px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: block;
        }

        .prop-card h3 {
            margin: 0 0 25px;
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.4;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
        }

        .info-row span { color: #666; }
        .info-row b { color: #bbb; font-weight: 400; }

        .price-section {
            margin-top: 35px;
            text-align: center;
        }

        .price-val {
            font-size: 2rem;
            font-weight: 900;
            color: var(--gold);
            display: block;
            margin-bottom: 25px;
            font-family: sans-serif; /* للأرقام */
        }

        .contact-btn {
            background: var(--gold-gradient);
            color: #000;
            border: none;
            padding: 15px;
            width: 100%;
            font-family: 'Cairo';
            font-weight: 900;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .contact-btn:hover {
            letter-spacing: 3px;
            filter: brightness(1.1);
        }

        /* Modal styling */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #111; padding: 40px; width: 90%; max-width: 500px;
            border: 1px solid var(--gold); position: relative;
        }
        .close-modal { position: absolute; top: 15px; left: 20px; font-size: 30px; cursor: pointer; color: var(--gold); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.8rem; color: var(--gold); }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: #fff; font-family: 'Cairo';
        }

        #loading { text-align: center; padding: 100px; color: var(--gold); letter-spacing: 10px; font-size: 0.8rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .logo { font-size: 3rem; letter-spacing: 8px; }
            .city-selector { gap: 10px; }
            .selector-item { padding: 12px 20px; flex: 1; text-align: center; }
        }
    </style>
</head>
<body>

<header>
    <h1 class="logo">AL-FAYROUZ</h1>
    <div class="sub-logo">Real Estate Luxury Division</div>
    <div class="cta-header">
        <button class="add-property-btn" onclick="toggleModal(true)">+ إدراج وحدة جديدة</button>
    </div>
</header>

<div class="container">
    <div class="city-selector">
        <div class="selector-item active" onclick="mainFilter('الكل', this)"><span>الكل</span></div>
        <div class="selector-item" onclick="mainFilter('المنصورة الجديدة', this)"><span>المنصورة الجديدة</span></div>
        <div class="selector-item" onclick="mainFilter('دمياط الجديدة', this)"><span>دمياط الجديدة</span></div>
    </div>

    <div id="filterMansoura" class="project-filter">
        <button class="project-chip" onclick="subFilter('جنة', this)">جنة</button>
        <button class="project-chip" onclick="subFilter('سكن مصر', this)">سكن مصر</button>
        <button class="project-chip" onclick="subFilter('إسكان ساحلي', this)">إسكان ساحلي</button>
    </div>

    <div id="filterDamietta" class="project-filter">
        <button class="project-chip" onclick="subFilter('جنة', this)">جنة</button>
        <button class="project-chip" onclick="subFilter('سكن مصر', this)">سكن مصر</button>
        <button class="project-chip" onclick="subFilter('دار مصر', this)">دار مصر</button>
    </div>

    <div id="loading">EXPLORING LUXURY PROPERTIES...</div>
    <div id="data" class="property-grid"></div>
</div>

<div id="propertyModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="toggleModal(false)">&times;</span>
        <h2 style="margin-bottom: 30px; font-weight: 200; color: #fff;">تفاصيل الوحدة</h2>
        <form onsubmit="sendToWhatsApp(event)">
            <div class="form-group">
                <label>المدينة</label>
                <select id="uCity"><option>المنصورة الجديدة</option><option>دمياط الجديدة</option></select>
            </div>
            <div class="form-group"><label>المشروع</label><input type="text" id="uProj" placeholder="مثال: جنة" required></div>
            <div class="form-group"><label>العمارة / الوحدة</label><input type="text" id="uUnit" required></div>
            <div class="form-group"><label>المساحة</label><input type="text" id="uSize" required></div>
            <div class="form-group"><label>السعر المطلوب</label><input type="text" id="uPrice" required></div>
            <button type="submit" class="contact-btn">إرسال البيانات</button>
        </form>
    </div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxiPcSexC05MJVeFohzNaNex4oDW0rVylIjAXSsV9BD1QP7v9Esg3xO8CtUh_yOOV6g/exec";
let allData = [];
let currentCity = "الكل";

fetch(URL).then(r => r.json()).then(d => {
    allData = d.filter(row => row[1] && row[1] !== "المشروع");
    document.getElementById("loading").style.display = "none";
    render(allData);
});

function render(list) {
    let html = "";
    list.forEach((row, i) => {
        html += `
        <div class="prop-card">
            <div class="card-inner">
                <span class="ref-badge">Property Ref: AF-${i+101}</span>
                <h3>عمارة ${row[2]} <br> وحدة ${row[3]}</h3>
                <div class="info-row"><span>الموقع</span><b>${row[0]}</b></div>
                <div class="info-row"><span>المشروع</span><b>${row[1]}</b></div>
                <div class="info-row"><span>المساحة</span><b>${row[5]} م²</b></div>
                <div class="info-row"><span>الطابق</span><b>${row[4]}</b></div>
                <div class="price-section">
                    <span class="price-val">${row[7] || 'P.O.R'}</span>
                    <button class="contact-btn" onclick="contact('${row[1]}','${row[7]}','${row[2]}','${row[3]}')">تواصل مع المستشار العقاري</button>
                </div>
            </div>
        </div>`;
    });
    document.getElementById("data").innerHTML = html;
}

function mainFilter(city, el) {
    currentCity = city;
    document.querySelectorAll('.selector-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    document.querySelectorAll('.project-filter').forEach(f => f.style.display = 'none');
    if(city === 'الكل') render(allData);
    else {
        const fid = city === 'المنصورة الجديدة' ? 'filterMansoura' : 'filterDamietta';
        document.getElementById(fid).style.display = 'flex';
        render(allData.filter(r => r[0].includes(city)));
    }
}

function subFilter(p, b) {
    document.querySelectorAll('.project-chip').forEach(c => c.classList.remove('active'));
    b.classList.add('active');
    render(allData.filter(r => r[0].includes(currentCity) && r[1].includes(p)));
}

function toggleModal(s) { document.getElementById('propertyModal').style.display = s ? 'flex' : 'none'; }

function contact(p, s, b, u){
    let msg = `استفسار من موقع الفيروز:\nالمشروع: ${p}\nعمارة: ${b} | وحدة: ${u}\nالسعر: ${s}`;
    window.open("https://wa.me/201212229797?text=" + encodeURIComponent(msg));
}

function sendToWhatsApp(e) {
    e.preventDefault();
    const msg = `عرض وحدة جديدة:\nالمدينة: ${document.getElementById('uCity').value}\nالمشروع: ${document.getElementById('uProj').value}\nالوحدة: ${document.getElementById('uUnit').value}\nالمساحة: ${document.getElementById('uSize').value}\nالسعر: ${document.getElementById('uPrice').value}`;
    window.open("https://wa.me/201212229797?text=" + encodeURIComponent(msg));
    toggleModal(false);
}
</script>
</body>
</html>

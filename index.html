<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-FAYROUZ ESTATE | الفيروز للعقارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #0a0a0a; --card-bg: #161616; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; padding-bottom: 50px; }

        nav { background: #000; padding: 20px; text-align: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 900; font-size: 1.5rem; letter-spacing: 1px; }
        .logo span { color: var(--gold); }

        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .header-box { text-align: center; margin: 40px 0; }
        .header-box h1 { font-size: 2.2rem; color: var(--gold); margin-bottom: 10px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }

        .card { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid #222; transition: 0.3s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-10px); border-color: var(--gold); }

        .img-box { width: 100%; height: 240px; background: #222; position: relative; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        .city-tag { position: absolute; top: 10px; right: 10px; background: var(--gold); color: #000; padding: 5px 12px; border-radius: 5px; font-weight: 700; font-size: 0.8rem; }

        .card-body { padding: 20px; flex-grow: 1; }
        .price { font-size: 1.8rem; font-weight: 900; color: var(--gold); margin-bottom: 10px; display: block; }
        .title { font-size: 1.2rem; font-weight: 700; margin-bottom: 15px; height: 3.4em; overflow: hidden; }

        .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .spec { background: #222; padding: 8px; border-radius: 8px; font-size: 0.85rem; text-align: center; color: #ccc; border: 1px solid #333; }

        .btn { display: block; width: 100%; padding: 15px; background: var(--gold); color: #000; text-align: center; text-decoration: none; border-radius: 10px; font-weight: 900; font-size: 1.1rem; }
        .btn:hover { background: #fff; }

        #msg { text-align: center; padding: 100px; color: var(--gold); font-size: 1.2rem; }
    </style>
</head>
<body>

<nav><div class="logo">AL-FAYROUZ <span>ESTATE</span></div></nav>

<div class="container">
    <div class="header-box">
        <h1>نخبة العقارات</h1>
        <p>عروض حصرية مختارة بعناية</p>
    </div>
    <div id="msg">✨ جاري تحميل أجمل العروض...</div>
    <div id="data-grid" class="grid"></div>
</div>

<script>
    // حط رابط الـ Script بتاعك هنا
    const URL = "https://script.google.com/macros/s/AKfycbxiPcSexC05MJVeFohzNaNex4oDW0rVylIjAXSsV9BD1QP7v9Esg3xO8CtUh_yOOV6g/exec";

    async function getUnits() {
        try {
            const res = await fetch(URL);
            const raw = await res.json();
            // تصفية الصفوف (بنشيل العنوان وأي صف فاضي)
            const units = raw.slice(1).filter(r => r[1]); 
            showUnits(units);
        } catch (e) {
            document.getElementById('msg').innerHTML = "⚠️ عذراً، تأكد من إعدادات الشيت (Anyone).";
        }
    }

    function showUnits(items) {
        document.getElementById('msg').style.display = 'none';
        let html = "";
        items.forEach(row => {
            // معالجة السعر عشان ميبقاش NaN
            let p = row[7];
            let displayPrice = (isNaN(p) || p === "") ? p : Number(p).toLocaleString() + " ج.م";
            
            // لو مفيش صورة حط صورة مؤقتة شيك
            let img = row[8] || 'https://via.placeholder.com/400x250/111/D4AF37?text=AL-FAYROUZ';

            html += `
            <div class="card">
                <div class="img-box">
                    <div class="city-tag">${row[0] || 'الموقع'}</div>
                    <img src="${img}" class="card-img" onerror="this.src='https://via.placeholder.com/400x250/111/D4AF37?text=صورة+العقار'">
                </div>
                <div class="card-body">
                    <span class="price">${displayPrice}</span>
                    <h3 class="title">${row[1]} - عمارة ${row[2] || '--'}</h3>
                    <div class="specs-grid">
                        <div class="spec">📐 ${row[5] || '0'} م²</div>
                        <div class="spec">🧭 ${row[6] || 'غير محدد'}</div>
                        <div class="spec">🏢 الدور ${row[4] || '--'}</div>
                        <div class="spec">💎 ${row[3] || 'مميز'}</div>
                    </div>
                    <a href="https://wa.me/201212229797?text=استفسار عن: ${row[1]}" class="btn">تواصـل معنا</a>
                </div>
            </div>`;
        });
        document.getElementById('data-grid').innerHTML = html;
    }

    getUnits();
</script>
</body>
</html>

<!DOCTYPE html>
<html dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2KF82HSX13"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-2KF82HSX13');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>الفيروز للتسويق العقاري</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/v4m8fXv7/image.png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00838f; --secondary: #c5a012; --bg-dark: #0f1214; --card-bg: #1c2226; --sold: #ff1100; --available: #39FF14; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; color: #f0f0f0; background: var(--bg-dark); margin: 0; padding: 0; }
        #loadingScreen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 99999; display: flex; justify-content: center; align-items: center; }
        .loader-logo { font-family: 'Montserrat'; font-size: 30px; color: var(--secondary); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        .container { width: 100%; max-width: 450px; margin: auto; padding: 15px; }
        .header-bar { padding: 40px 10px 20px; text-align: center; }
        .company-name { font-family: 'Montserrat'; font-size: 35px; font-weight: 900; margin: 0; color: #fff; }
        .card-city, .card-project { background: var(--card-bg); border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 15px; border: 1px solid rgba(197,160,18,0.2); cursor: pointer; }
        .apt-card { background: #1c2226; border-radius: 20px; margin-bottom: 20px; overflow: hidden; border-right: 5px solid var(--available); }
        .is-sold { border-right-color: var(--sold); opacity: 0.7; }
        .img-container { width: 100%; height: 200px; background: #000; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .apt-content { padding: 15px; }
        .apt-specs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .spec-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; text-align: center; }
        .spec-label { display: block; font-size: 11px; color: #888; }
        .spec-value { font-size: 13px; font-weight: 800; }
        .price-box { background: rgba(57,255,20,0.05); border: 1px solid var(--available); border-radius: 12px; padding: 15px; margin-top: 15px; text-align: center; }
        .btn-preview { background: var(--available); color: #000; display: block; text-align: center; padding: 15px; border-radius: 12px; font-weight: 900; text-decoration: none; margin-top: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="loadingScreen"><div class="loader-logo">AL-FAYROUZ</div></div>

    <div class="header-bar">
        <h1 class="company-name">Al-Fayrouz</h1>
        <div style="color:var(--secondary); font-weight:bold;">الفيروز للتسويق العقاري</div>
    </div>

    <div class="container">
        <div id="step1">
            <div class="card-city" onclick="goToStep2('المنصورة الجديدة')"><h3>المنصورة الجديدة</h3></div>
            <div class="card-city" onclick="goToStep2('دمياط الجديدة')"><h3>دمياط الجديدة</h3></div>
        </div>
        <div id="step2" class="hidden"><div id="projectButtons"></div></div>
        <div id="step3" class="hidden"><div id="apartmentList"></div></div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWKx4v-nn6JEM3O4En9ELAAKvDxF-NyAnNLPS1c3dLk3Hqvx9MLK9mEfGRP0XTT33P9QC6SOLUt9jM/pub?output=csv";
        let allData = [];

        async function fetchD() {
            try {
                const r = await fetch(`${CSV_URL}&cb=${Date.now()}`);
                const t = await r.text();
                allData = t.split('\n').map(row => row.split(',')).slice(1);
                document.getElementById('loadingScreen').style.display = 'none';
            } catch(e) { console.error("Error"); }
        }

        function render(kw) {
            const list = document.getElementById('apartmentList');
            let filtered = allData.filter(r => (r[0]||"").trim() === window.curCity && (r[1]||"").includes(kw));
            let h = '';
            filtered.forEach(r => {
                let status = (r[11]||"").trim();
                if(status === "تحت المراجعة") return;
                let sold = status.includes("تم البيع");
                
                const fmt = (v) => v ? parseFloat(v.toString().replace(/[^0-9.]/g, '')).toLocaleString() : '0';

                // الربط بالأعمدة الصحيحة بناءً على صورة الإكسيل:
                let pricePerMeter = r[8] || '0';  // العمود I
                let installYears = r[9] || '0';   // العمود J
                let installValue = r[10] || '0';  // العمود K
                let paid = parseFloat(r[6]) || 0; // المدفوع
                let over = parseFloat(r[7]) || 0; // الأوفر

                h += `<div class="apt-card ${sold ? 'is-sold' : ''}">
                    <div class="apt-content">
                        <div style="font-weight:900; font-size:18px;">عمارة ${r[2]} - شقة ${r[3]}</div>
                        <div style="color:var(--secondary); font-size:13px;">${r[1]} - ${r[4]}</div>
                        <div class="apt-specs">
                            <div class="spec-item"><span class="spec-label">المساحة</span><span class="spec-value">${r[13]} م²</span></div>
                            <div class="spec-item"><span class="spec-label">سعر المتر</span><span class="spec-value">${fmt(pricePerMeter)} ج.م</span></div>
                            <div class="spec-item"><span class="spec-label">سنوات التقسيط</span><span class="spec-value">${installYears}</span></div>
                            <div class="spec-item"><span class="spec-label">دفعة القسط</span><span class="spec-value">${fmt(installValue)} ج.م</span></div>
                        </div>
                        <div style="margin-top:10px; font-size:12px; color:#aaa;">المدفوع: ${fmt(paid)} | الأوفر: ${fmt(over)}</div>
                        <div class="price-box">
                            <div style="color:var(--available); font-size:12px; font-weight:bold;">المطلوب كاش حالياً</div>
                            <div style="font-size:22px; font-weight:900;">${fmt(paid + over)} ج.م</div>
                        </div>
                        ${sold ? '<div style="text-align:center; color:var(--sold); font-weight:bold; margin-top:10px;">تم التعاقد</div>' : '<a href="https://wa.me/201212229797" class="btn-preview">طلب معاينة</a>'}
                    </div>
                </div>`;
            });
            list.innerHTML = h || 'لا توجد وحدات';
        }

        function goToStep2(c) { 
            window.curCity = c; 
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            let projs = c === 'المنصورة الجديدة' ? ['جنة', 'سكن مصر'] : ['جنة', 'سكن مصر'];
            let html = '<button onclick="location.reload()" style="margin-bottom:10px;">رجوع</button>';
            projs.forEach(p => html += `<div class="card-project" onclick="showU('${p}')"><h3>${p}</h3></div>`);
            document.getElementById('projectButtons').innerHTML = html;
        }

        function showU(kw) { 
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.remove('hidden');
            render(kw); 
        }

        window.onload = fetchD;
    </script>
</body>
</html>

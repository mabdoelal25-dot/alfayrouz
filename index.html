<!DOCTYPE html>
<html dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2KF82HSX13"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-2KF82HSX13');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Fayrouz Real Estate</title>

    <style>
        :root { --secondary:#c5a012; --bg-dark:#0f1214; --card-bg:#1c2226; }

        body {background:var(--bg-dark);color:#fff;font-family:Cairo;margin:0}
        .hidden{display:none}

        /* زر الإضافة /
        .add-btn-glass{
            background:rgba(197,160,18,0.2);
            border:1px solid var(--secondary);
            color:var(--secondary);
            padding:15px 25px;
            border-radius:20px;
            font-weight:900;
            cursor:pointer;
            backdrop-filter: blur(10px);
        }

        / Modal /
        .modal{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.7);
            display:flex;
            justify-content:center;
            align-items:center;
            z-index:99999;
        }
        .modal-content{
            background:var(--card-bg);
            padding:20px;
            border-radius:15px;
            width:90%;
            max-width:350px;
            text-align:center;
        }
        .modal-content input{
            width:100%;
            margin:8px 0;
            padding:12px;
            background:#111;
            border:1px solid #333;
            color:#fff;
            border-radius:10px;
        }

        / نجاح /
        .success{
            position:fixed;
            inset:0;
            background:var(--bg-dark);
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            z-index:99999;
        }
    </style>
</head>

<body>

<div id="step1">
    <h2>اختر المدينة</h2>

    <button onclick="goToStep2()">المنصورة الجديدة</button>
    <button onclick="goToStep2()">دمياط الجديدة</button>

    <br><br>

    <!-- ✅ زر الإضافة -->
    <button onclick="openAddModal()" class="add-btn-glass">
        ✨ أضف وحدتك العقارية
    </button>
</div>

<div id="step2" class="hidden">
    <h2>المشاريع</h2>
    <button onclick="goToStep3()">عرض الوحدات</button>
    <button onclick="goBack(1)">رجوع</button>
</div>

<div id="step3" class="hidden">
    <h2>الوحدات</h2>
    <button onclick="goBack(2)">رجوع</button>
</div>

<!-- ✅ Modal -->
<div id="addModal" class="modal hidden">
    <div class="modal-content">
        <h3>إضافة وحدة</h3>
        <input placeholder="رقم العمارة">
        <input placeholder="المساحة">
        <input placeholder="السعر">
        <input placeholder="رقم الهاتف">

        <button onclick="submitUnit()">إرسال</button>
        <button onclick="closeAddModal()">إلغاء</button>
    </div>
</div>

<!-- ✅ Success -->
<div id="successScreen" class="success hidden">
    <h1 style="color:var(--secondary)">تم استلام بياناتك بنجاح</h1>
    <button onclick="backHome()">العودة للرئيسية</button>
</div>

<script>
function goToStep2(){
    document.getElementById("step1").classList.add("hidden");
    document.getElementById("step2").classList.remove("hidden");
}
function goToStep3(){
    document.getElementById("step2").classList.add("hidden");
    document.getElementById("step3").classList.remove("hidden");
}
function goBack(n){
    document.getElementById("step"+n).classList.remove("hidden");
    document.getElementById("step"+(n+1)).classList.add("hidden");
}

/ ✅ الإضافة الجديدة */
function openAddModal(){
    document.getElementById("addModal").classList.remove("hidden");
}
function closeAddModal(){
    document.getElementById("addModal").classList.add("hidden");
}
function submitUnit(){
    closeAddModal();
    document.getElementById("successScreen").classList.remove("hidden");
}
function backHome(){
    document.getElementById("successScreen").classList.add("hidden");
    document.getElementById("step1").classList.remove("hidden");
    document.getElementById("step2").classList.add("hidden");
    document.getElementById("step3").classList.add("hidden");
}
</script>

</body>
</html>

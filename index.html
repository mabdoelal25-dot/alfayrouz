<!DOCTYPE html>
<html dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2KF82HSX13"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-2KF82HSX13');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Al-Fayrouz Real Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Montserrat:wght@900&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00838f; --secondary: #c5a012; --bg-dark: #0f1214; --card-bg: #1c2226; --sold: #ff1100; --available: #39FF14; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Cairo', sans-serif; color: #f0f0f0; background: var(--bg-dark); margin: 0; padding: 0; overflow-x: hidden; }
        
        /* شاشة التحميل */
        #loadingScreen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .loader-logo { font-family: 'Montserrat'; font-size: 32px; font-weight: 900; color: var(--secondary); animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }

        /* زرار اعرض شقتك الجديد */
        .sell-btn { position: fixed; top: 20px; left: 20px; background: var(--secondary); color: #000; padding: 10px 15px; border-radius: 12px; font-weight: 900; font-size: 14px; z-index: 1000; cursor: pointer; border: 2px solid #fff; box-shadow: 0 4px 15px rgba(197, 160, 18, 0.4); }

        .header-bar { padding: 50px 10px 30px; text-align: center; background: linear-gradient(to bottom, rgba(197, 160, 18, 0.05), transparent); }
        .company-name { font-family: 'Montserrat'; font-size: 42px; font-weight: 900; color: #fff; margin: 0; text-transform: uppercase; }
        .company-subtitle { font-family: 'Reem Kufi'; font-size: 22px; color: var(--secondary); margin-top: 10px; display: block; }
        
        .container { width: 100%; max-width: 450px; margin: auto; padding: 15px; }
        .section-title { font-size: 22px; color: #fff; font-weight: 900; text-align: center; margin-bottom: 25px; }
        .card-city { background: linear-gradient(135deg, #1c2226 0%, #252d33 100%); border-radius: 20px; padding: 30px 20px; text-align: center; border: 2px solid rgba(197, 160, 18, 0.3); cursor: pointer; margin-bottom: 15px; transition: 0.3s; }
        .card-city h3 { font-size: 28px; font-weight: 900; color: var(--secondary); margin: 0; }
        
        /* Modal Style */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000; padding: 20px; overflow-y: auto; }
        .modal-content { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid var(--secondary); max-width: 400px; margin: 50px auto; }
        select, input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #0f1214; color: #fff; font-family: 'Cairo'; }
        .submit-sell { background: var(--available); color: #000; width: 100%; padding: 15px; border-radius: 12px; font-weight: 900; border: none; margin-top: 20px; cursor: pointer; }

        .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card-project { background: var(--card-bg); border-radius: 15px; padding: 25px 10px; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; font-weight: 900; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        .apt-card { background: #1c2226; border-radius: 22px; margin-bottom: 25px; overflow: hidden; border-right: 8px solid var(--available); }
        .apt-content { padding: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loadingScreen"><div class="loader-logo">AL-FAYROUZ</div></div>

    <div class="sell-btn" onclick="openSellModal()">اعرض شقتك</div>

    <div id="sellModal" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; color:var(--secondary);">بيانات عرض الوحدة</h2>
            <label>اختر المدينة:</label>
            <select id="sellCity" onchange="updateSellProjects()">
                <option value="">-- اختر --</option>
                <option value="المنصورة الجديدة">المنصورة الجديدة</option>
                <option value="دمياط الجديدة">دمياط الجديدة</option>
            </select>
            
            <label>اختر المشروع:</label>
            <select id="sellProject">
                <option value="">اختر المدينة أولاً</option>
            </select>

            <input type="text" id="sellApt" placeholder="رقم العمارة والوحدة">
            <input type="number" id="sellPrice" placeholder="السعر المطلوب (كاش)">
            
            <button class="submit-sell" onclick="sendSellOrder()">إرسال العرض للمراجعة</button>
            <button onclick="closeSellModal()" style="width:100%; background:none; border:none; color:#888; margin-top:15px; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <div class="header-bar">
        <h1 class="company-name">Al-Fayrouz</h1>
        <span class="company-subtitle">الفيروز للتسويق العقاري</span>
    </div>

    <div class="container">
        <div id="step1">
            <h2 class="section-title">اختر المدينة للشراء</h2>
            <div class="card-city" onclick="goToStep2('المنصورة الجديدة')"><h3>المنصورة الجديدة</h3></div>
            <div class="card-city" onclick="goToStep2('دمياط الجديدة')"><h3>دمياط الجديدة</h3></div>
        </div>
        <div id="step2" class="hidden">
            <button onclick="goBack(1)" style="background:#1c2226; border:1.5px solid #444; color:#fff; padding:10px 20px; border-radius:15px; margin-bottom:20px;">رجوع</button>
            <div id="projectButtons" class="project-grid"></div>
        </div>
        <div id="step3" class="hidden">
            <button onclick="goBack(2)" style="background:#1c2226; border:1.5px solid #444; color:#fff; padding:10px 20px; border-radius:15px; margin-bottom:20px;">رجوع</button>
            <div id="apartmentList"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxQsS6y6NgU_HdYXZOKsiV7xyzh7EBvYWLUeOacsqf7ERu93gnVyiOnNDUxqG6UUzcA/exec";
        let allData = [];

        // التحميل
        window.onload = async () => {
            try {
                const r = await fetch(API_URL + "?v=" + Date.now());
                allData = (await r.json()).slice(1);
                document.getElementById('loadingScreen').style.display = 'none';
            } catch(e) { console.error(e); }
        };

        // وظائف "اعرض شقتك"
        function openSellModal() { document.getElementById('sellModal').style.display = 'block'; }
        function closeSellModal() { document.getElementById('sellModal').style.display = 'none'; }

        function updateSellProjects() {
            const city = document.getElementById('sellCity').value;
            const projectSelect = document.getElementById('sellProject');
            let options = '<option value="">-- اختر المشروع --</option>';
            
            const projects = {
                'المنصورة الجديدة': ['جنة', 'سكن مصر', 'زاهية', 'إسكان ساحلي', 'تجارية وإدارية'],
                'دمياط الجديدة': ['جنة', 'سكن مصر', 'دار مصر', 'أهالي', 'تجارية وإدارية']
            };

            if(city) {
                projects[city].forEach(p => options += `<option value="${p}">${p}</option>`);
            }
            projectSelect.innerHTML = options;
        }

        function sendSellOrder() {
            const city = document.getElementById('sellCity').value;
            const project = document.getElementById('sellProject').value;
            const apt = document.getElementById('sellApt').value;
            const price = document.getElementById('sellPrice').value;

            if(!city || !project || !apt) return alert("كمل البيانات يا بطل");

            const msg = `طلب عرض وحدة جديدة:\nالمدينة: ${city}\nالمشروع: ${project}\nالتفاصيل: ${apt}\nالسعر المطلوب: ${price} ج.م`;
            window.open(`https://wa.me/201212229797?text=${encodeURIComponent(msg)}`);
            closeSellModal();
        }

        // باقي وظائف العرض القديمة (بدون لمس)
        function goToStep2(c) { window.curCity = c; switchStep('step2'); let p = c === 'المنصورة الجديدة' ? ['جنة', 'سكن مصر', 'زاهية', 'إسكان ساحلي'] : ['جنة', 'سكن مصر', 'دار مصر', 'أهالي']; let h = ''; p.forEach(x => h += `<div class="card-project" onclick="showU('${x}')">${x}</div>`); document.getElementById('projectButtons').innerHTML = h; }
        function showU(kw) { switchStep('step3'); render(kw); }
        function render(kw) {
            const list = document.getElementById('apartmentList');
            let filtered = allData.filter(r => (r[0]||"").trim() === window.curCity && (r[1]||"").includes(kw));
            list.innerHTML = filtered.map(r => `<div class="apt-card"><div class="apt-content"><div class="apt-title">عمارة ${r[2]} • وحدة ${r[3]}</div><div style="color:var(--secondary)">${r[1]}</div></div></div>`).join('');
        }
        function switchStep(id) { ['step1','step2','step3'].forEach(s => document.getElementById(s).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function goBack(s) { switchStep('step' + s); }
    </script>
</body>
</html>

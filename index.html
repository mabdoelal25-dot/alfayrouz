<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-FAYROUZ | الاستثمار العقاري الفاخر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --slate: #0f172a;
            --gold-dark: #a3895d;
            --gray-100: #f8fafc;
            --gray-200: #e2e8f0;
            --text-dark: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #fff;
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }

        /* Top Bar & Nav */
        nav {
            border-bottom: 1px solid var(--gray-200);
            padding: 25px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: 4px;
            color: var(--slate);
            text-transform: uppercase;
        }

        .btn-main {
            background: var(--slate);
            color: white;
            padding: 12px 30px;
            border: none;
            font-weight: 600;
            font-family: 'Cairo';
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .btn-main:hover { background: var(--gold-dark); }

        /* Hero Section */
        header {
            padding: 100px 8% 60px;
            background: var(--gray-100);
            border-bottom: 1px solid var(--gray-200);
        }

        .hero-title {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.2;
            max-width: 800px;
            margin-bottom: 20px;
            color: var(--slate);
        }

        .hero-sub {
            font-size: 1.1rem;
            color: #64748b;
            max-width: 600px;
        }

        .container { padding: 60px 8%; }

        /* Filter System */
        .filters-wrapper {
            margin-bottom: 50px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .main-tabs {
            display: flex;
            gap: 40px;
            border-bottom: 2px solid var(--gray-200);
        }

        .tab-link {
            padding-bottom: 15px;
            cursor: pointer;
            font-weight: 600;
            color: #94a3b8;
            transition: 0.3s;
            position: relative;
        }

        .tab-link.active {
            color: var(--slate);
        }

        .tab-link.active::after {
            content: '';
            position: absolute;
            bottom: -2px; right: 0; width: 100%; height: 2px;
            background: var(--slate);
        }

        .chips-container {
            display: none;
            gap: 10px;
            animation: fadeIn 0.4s ease;
        }

        .chip {
            padding: 6px 18px;
            border: 1px solid var(--gray-200);
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .chip.active { background: var(--slate); color: white; border-color: var(--slate); }

        /* Grid - Professional Layout */
        .property-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 40px;
        }

        .property-card {
            border: 1px solid var(--gray-200);
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            background: #fff;
        }

        .property-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.08);
        }

        .card-header {
            padding: 30px;
            border-bottom: 1px solid var(--gray-100);
        }

        .location-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold-dark);
            font-weight: 800;
            margin-bottom: 10px;
            display: block;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--slate);
        }

        .card-body { padding: 30px; }

        .spec-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .spec-label { font-size: 0.8rem; color: #94a3b8; margin-bottom: 4px; display: block; }
        .spec-value { font-size: 0.95rem; font-weight: 600; color: var(--text-dark); }

        .card-footer {
            padding: 0 30px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-text { font-size: 1.5rem; font-weight: 800; color: var(--slate); }

        .contact-btn-small {
            padding: 10px 20px;
            border: 1px solid var(--slate);
            background: transparent;
            font-family: 'Cairo';
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .contact-btn-small:hover { background: var(--slate); color: white; }

        /* Form Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9); z-index: 2000; justify-content: center; align-items: center;
        }
        .modal-inner { background: #fff; padding: 50px; width: 95%; max-width: 500px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; }
        .input-group input, .input-group select {
            width: 100%; padding: 12px; border: 1px solid var(--gray-200); font-family: 'Cairo';
        }

        #loading { padding: 100px; text-align: center; font-weight: 200; letter-spacing: 5px; color: #94a3b8; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .hero-title { font-size: 2rem; }
            .main-tabs { gap: 20px; }
            .property-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav>
    <div class="brand">AL-FAYROUZ</div>
    <button class="btn-main" onclick="toggleModal(true)">إدراج عقار</button>
</nav>

<header>
    <h1 class="hero-title">نخبة العقارات في المنصورة ودمياط الجديدة</h1>
    <p class="hero-sub">بوابة العقارات الأكثر موثوقية للوحدات السكنية والاستثمارية الفاخرة.</p>
</header>

<div class="container">
    <div class="filters-wrapper">
        <div class="main-tabs">
            <div class="tab-link active" onclick="mainFilter('الكل', this)">الكل</div>
            <div class="tab-link" onclick="mainFilter('المنصورة الجديدة', this)">المنصورة الجديدة</div>
            <div class="tab-link" onclick="mainFilter('دمياط الجديدة', this)">دمياط الجديدة</div>
        </div>

        <div id="filterMansoura" class="chips-container">
            <div class="chip" onclick="subFilter('جنة', this)">مشروع جنة</div>
            <div class="chip" onclick="subFilter('سكن مصر', this)">سكن مصر</div>
            <div class="chip" onclick="subFilter('إسكان ساحلي', this)">إسكان ساحلي</div>
        </div>

        <div id="filterDamietta" class="chips-container">
            <div class="chip" onclick="subFilter('جنة', this)">مشروع جنة</div>
            <div class="chip" onclick="subFilter('سكن مصر', this)">سكن مصر</div>
            <div class="chip" onclick="subFilter('دار مصر', this)">دار مصر</div>
        </div>
    </div>

    <div id="loading">جاري مراجعة قاعدة البيانات...</div>
    <div id="data" class="property-grid"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-inner">
        <h2 style="margin-bottom: 30px;">طلب إدراج وحدة</h2>
        <form onsubmit="sendListing(event)">
            <div class="input-group">
                <label>المدينة المختارة</label>
                <select id="mCity"><option>المنصورة الجديدة</option><option>دمياط الجديدة</option></select>
            </div>
            <div class="input-group">
                <label>تفاصيل الموقع والمشروع</label>
                <input type="text" id="mDetails" placeholder="مثال: جنة، عمارة 15" required>
            </div>
            <div class="input-group">
                <label>المساحة والسعر المطلوب</label>
                <input type="text" id="mPrice" placeholder="مثال: 130م - 1,800,000 ج.م" required>
            </div>
            <button type="submit" class="btn-main" style="width: 100%;">إرسال المراجعة</button>
            <button type="button" onclick="toggleModal(false)" style="width:100%; margin-top:10px; background:none; border:none; color:#64748b; cursor:pointer; font-family:'Cairo'">إلغاء</button>
        </form>
    </div>
</div>

<script>
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbxiPcSexC05MJVeFohzNaNex4oDW0rVylIjAXSsV9BD1QP7v9Esg3xO8CtUh_yOOV6g/exec";
    let properties = [];
    let currentCity = "الكل";

    fetch(SHEET_URL).then(r => r.json()).then(data => {
        properties = data.filter(row => row[1] && row[1] !== "المشروع");
        document.getElementById('loading').style.display = 'none';
        render(properties);
    });

    function render(list) {
        let html = "";
        list.forEach(row => {
            html += `
            <div class="property-card">
                <div class="card-header">
                    <span class="location-tag">${row[0]}</span>
                    <div class="card-title">${row[1]} - عمارة ${row[2]}</div>
                </div>
                <div class="card-body">
                    <div class="spec-grid">
                        <div><span class="spec-label">رقم الوحدة</span><div class="spec-value">${row[3]}</div></div>
                        <div><span class="spec-label">الطابق</span><div class="spec-value">${row[4]}</div></div>
                        <div><span class="spec-label">المساحة</span><div class="spec-value">${row[5]} م²</div></div>
                        <div><span class="spec-label">الحالة</span><div class="spec-value">متاح</div></div>
                    </div>
                </div>
                <div class="card-footer">
                    <div class="price-text">${row[7] || 'عند الطلب'}</div>
                    <button class="contact-btn-small" onclick="contact('${row[1]}','${row[7]}','${row[2]}','${row[3]}')">تفاصيل</button>
                </div>
            </div>`;
        });
        document.getElementById('data').innerHTML = html;
    }

    function mainFilter(city, el) {
        currentCity = city;
        document.querySelectorAll('.tab-link').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.chips-container').forEach(c => c.style.display = 'none');
        
        if(city === 'الكل') render(properties);
        else {
            const id = city === 'المنصورة الجديدة' ? 'filterMansoura' : 'filterDamietta';
            document.getElementById(id).style.display = 'flex';
            render(properties.filter(p => p[0].includes(city)));
        }
    }

    function subFilter(proj, el) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        render(properties.filter(p => p[0].includes(currentCity) && p[1].includes(proj)));
    }

    function contact(p, s, b, u){
        let msg = `استفسار رسمي:\nالمشروع: ${p}\nعمارة: ${b} | وحدة: ${u}\nالسعر المذكور: ${s}`;
        window.open("https://wa.me/201212229797?text=" + encodeURIComponent(msg));
    }

    function toggleModal(s) { document.getElementById('modal').style.display = s ? 'flex' : 'none'; }
    
    function sendListing(e) {
        e.preventDefault();
        const msg = `طلب إدراج وحدة جديدة:\nالمدينة: ${document.getElementById('mCity').value}\nالتفاصيل: ${document.getElementById('mDetails').value}\nالمساحة/السعر: ${document.getElementById('mPrice').value}`;
        window.open("https://wa.me/201212229797?text=" + encodeURIComponent(msg));
        toggleModal(false);
    }
</script>

</body>
</html>

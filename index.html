<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-FAYROUZ | الفيروز للعقارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #008080; /* اللون الفيروزي */
            --accent: #d4af37;  /* ذهبي خفيف للرقي */
            --bg: #f8f9fa;      /* خلفية رمادية فاتحة جداً */
            --text-main: #2d3436;
            --text-light: #636e72;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* Navbar */
        nav {
            background: var(--white);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 2px;
        }

        .nav-btn {
            background: var(--primary);
            color: white;
            padding: 10px 25px;
            border-radius: 8px;
            border: none;
            font-family: 'Cairo';
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .nav-btn:hover { background: var(--text-main); transform: translateY(-2px); }

        /* Hero Section */
        header {
            text-align: center;
            padding: 80px 20px 40px;
        }

        header h1 { font-size: 2.5rem; color: var(--text-main); margin-bottom: 10px; }
        header p { color: var(--text-light); font-weight: 300; }

        .container { max-width: 1200px; margin: auto; padding: 20px; }

        /* Modern Filter Tab */
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .filter-tab {
            background: var(--white);
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-light);
            border: 1px solid transparent;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .filter-tab.active {
            background: var(--primary);
            color: white;
        }

        /* Project Chips */
        .sub-filters {
            display: none;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            animation: fadeIn 0.5s ease;
        }

        .chip {
            padding: 6px 20px;
            background: transparent;
            border: 1px solid #dfe6e9;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-light);
            transition: var(--transition);
        }

        .chip.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* Property Cards */
        .property-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .property-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            border: 1px solid #f1f1f1;
            position: relative;
        }

        .property-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

        .card-content { padding: 25px; }

        .tag-city {
            background: #e8f4f4;
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 15px;
        }

        .property-card h3 { font-size: 1.4rem; margin-bottom: 20px; color: var(--text-main); }

        .spec-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .spec-item i { margin-left: 10px; color: var(--primary); font-style: normal; }

        .price-wrapper {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #f1f1f1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price { font-size: 1.5rem; font-weight: 800; color: var(--primary); }

        .contact-icon-btn {
            background: #25d366;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: var(--transition);
        }

        .contact-icon-btn:hover { transform: rotate(15deg) scale(1.1); }

        /* Form Modal */
        .modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.4); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(8px);
        }
        .modal-body {
            background: white; padding: 40px; border-radius: 25px; width: 90%; max-width: 450px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }
        .form-input {
            width: 100%; padding: 12px; margin: 10px 0 20px;
            border: 1px solid #ddd; border-radius: 10px; font-family: 'Cairo';
        }
        .close-btn { float: left; cursor: pointer; font-size: 1.5rem; color: #ccc; }

        #loading { text-align: center; padding: 100px; color: var(--primary); font-weight: 700; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav>
    <div class="logo-text">AL-FAYROUZ</div>
    <button class="nav-btn" onclick="toggleModal(true)">إضافة عقار</button>
</nav>

<header>
    <h1>اعثر على منزل أحلامك</h1>
    <p>وحدات سكنية فاخرة في أجمل مدن مصر الساحلية</p>
</header>

<div class="container">
    <div class="filter-container">
        <div class="filter-tab active" onclick="mainFilter('الكل', this)">الكل</div>
        <div class="filter-tab" onclick="mainFilter('المنصورة الجديدة', this)">المنصورة الجديدة</div>
        <div class="filter-tab" onclick="mainFilter('دمياط الجديدة', this)">دمياط الجديدة</div>
    </div>

    <div id="filterMansoura" class="sub-filters">
        <button class="chip" onclick="subFilter('جنة', this)">جنة</button>
        <button class="chip" onclick="subFilter('سكن مصر', this)">سكن مصر</button>
        <button class="chip" onclick="subFilter('إسكان ساحلي', this)">إسكان ساحلي</button>
    </div>

    <div id="filterDamietta" class="sub-filters">
        <button class="chip" onclick="subFilter('جنة', this)">جنة</button>
        <button class="chip" onclick="subFilter('سكن مصر', this)">سكن مصر</button>
        <button class="chip" onclick="subFilter('دار مصر', this)">دار مصر</button>
    </div>

    <div id="loading">جاري جلب أفضل العروض...</div>
    <div id="data" class="property-grid"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-body">
        <span class="close-btn" onclick="toggleModal(false)">&times;</span>
        <h2 style="margin-bottom: 20px;">اعرض عقارك</h2>
        <form onsubmit="sendListing(event)">
            <label>المدينة</label>
            <select id="fCity" class="form-input">
                <option>المنصورة الجديدة</option>
                <option>دمياط الجديدة</option>
            </select>
            <label>تفاصيل الوحدة</label>
            <input type="text" id="fDetails" class="form-input" placeholder="مثال: عمارة 5 وحدة 20" required>
            <label>المساحة والسعر</label>
            <input type="text" id="fPrice" class="form-input" placeholder="مثال: 120م - 1.5 مليون" required>
            <button type="submit" class="nav-btn" style="width: 100%;">إرسال البيانات</button>
        </form>
    </div>
</div>

<script>
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbxiPcSexC05MJVeFohzNaNex4oDW0rVylIjAXSsV9BD1QP7v9Esg3xO8CtUh_yOOV6g/exec";
    let properties = [];
    let currentCity = "الكل";

    fetch(SHEET_URL).then(r => r.json()).then(data => {
        properties = data.filter(row => row[1] && row[1] !== "المشروع");
        document.getElementById('loading').style.display = 'none';
        render(properties);
    });

    function render(list) {
        let html = "";
        list.forEach(row => {
            html += `
            <div class="property-card">
                <div class="card-content">
                    <span class="tag-city">${row[0]}</span>
                    <h3>${row[1]} - عمارة ${row[2]}</h3>
                    <div class="spec-item"><i>🏠</i> الوحدة: ${row[3]}</div>
                    <div class="spec-item"><i>📏</i> المساحة: ${row[5]} متر مربع</div>
                    <div class="spec-item"><i>🏢</i> الطابق: ${row[4]}</div>
                    <div class="price-wrapper">
                        <div class="price">${row[7] || 'اتصل للسعر'}</div>
                        <a href="https://wa.me/201212229797?text=استفسار عن ${row[1]} وحدة ${row[3]}" class="contact-icon-btn">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.438 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.438-9.89 9.886-.001 2.225.618 3.684 1.574 5.239l-1.041 3.805 3.957-1.045zm11.733-4.725c-.32-.16-1.89-.932-2.185-1.041-.295-.108-.51-.16-.726.16-.215.321-.835 1.041-1.022 1.256-.188.215-.375.241-.695.08-.32-.16-1.352-.499-2.577-1.592-.951-.849-1.592-1.899-1.78-2.22-.188-.32-.02-.494.14-.654.144-.144.32-.375.48-.562.16-.188.214-.321.321-.536.107-.214.053-.401-.027-.561-.08-.16-.726-1.751-1-2.408-.266-.649-.538-.562-.726-.571l-.619-.01c-.215 0-.565.081-.861.401s-1.129 1.103-1.129 2.69c0 1.587 1.155 3.12 1.316 3.335.16.215 2.274 3.472 5.508 4.87.769.332 1.369.531 1.838.68.772.245 1.476.21 2.031.127.62-.093 1.89-.773 2.159-1.526.27-.753.27-1.399.189-1.527z"/></svg>
                        </a>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById('data').innerHTML = html;
    }

    function mainFilter(city, el) {
        currentCity = city;
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.sub-filters').forEach(f => f.style.display = 'none');
        
        if(city === 'الكل') render(properties);
        else {
            const id = city === 'المنصورة الجديدة' ? 'filterMansoura' : 'filterDamietta';
            document.getElementById(id).style.display = 'flex';
            render(properties.filter(p => p[0].includes(city)));
        }
    }

    function subFilter(proj, el) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        render(properties.filter(p => p[0].includes(currentCity) && p[1].includes(proj)));
    }

    function toggleModal(s) { document.getElementById('modal').style.display = s ? 'flex' : 'none'; }

    function sendListing(e) {
        e.preventDefault();
        const text = `طلب إضافة عقار جديد:\nالمدينة: ${document.getElementById('fCity').value}\nالتفاصيل: ${document.getElementById('fDetails').value}\nالسعر: ${document.getElementById('fPrice').value}`;
        window.open(`https://wa.me/201212229797?text=${encodeURIComponent(text)}`);
        toggleModal(false);
    }
</script>
</body>
</html>

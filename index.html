<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-FAYROUZ Real Estate | الفيروز للعقارات</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="overlay"></div>
        <div class="logo-area">
            <h1 class="logo-en">AL-FAYROUZ</h1>
            <h2 class="logo-en-sub">REAL ESTATE</h2>
            <div class="hr-line"></div>
            <p class="logo-ar">الفيروز للتسويق العقاري</p>
        </div>
        <div class="scroll-down">↓</div>
    </header>

    <section class="filters-container">
        <div class="filter-group cities">
            <h3>اختر المدينة:</h3>
            <label class="custom-check"><input type="checkbox" value="mansoura"><span>المنصورة الجديدة</span></label>
            <label class="custom-check"><input type="checkbox" value="domiat"><span>دمياط الجديدة</span></label>
        </div>
        <div class="filter-group types" id="types-filter">
            <h3>اختر النوع:</h3>
            <label class="custom-check"><input type="checkbox" value="janna"><span>جنة</span></label>
            <label class="custom-check"><input type="checkbox" value="sakan"><span>سكن</span></label>
            <label class="custom-check"><input type="checkbox" value="zahia"><span>زاهية</span></label>
            </div>
    </section>

    <section class="gallery-container">
        <div class="masonry-grid" id="apartments-gallery">
            </div>
    </section>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-FAYROUZ | الفيروز للعقارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a73e8; --dark: #0f1113; --gold: #c5a059; --card-bg: #1c1e21; }
        body { font-family: 'Cairo', sans-serif; background: #000; color: #fff; margin: 0; }
        
        /* الهيدر الفخم */
        nav { background: var(--dark); padding: 15px 5%; display: flex; justify-content: space-between; border-bottom: 2px solid var(--gold); sticky: top; z-index: 100; }
        .logo { font-weight: 900; font-size: 1.8rem; color: #fff; }
        .logo span { color: var(--gold); }
        .add-btn { background: var(--gold); color: #000; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 700; cursor: pointer; }

        /* شبكة العرض */
        .container { padding: 40px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        .card { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid #333; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); border-color: var(--gold); }
        .card-img { width: 100%; height: 220px; object-fit: cover; background: #222; }
        .card-body { padding: 20px; }
        .price { font-size: 1.6rem; font-weight: 900; color: var(--gold); }

        /* فورم الرفع (المودال) */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto; padding: 20px; }
        .modal-content { background: var(--dark); max-width: 500px; margin: auto; padding: 30px; border-radius: 20px; border: 1px solid var(--gold); }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; font-family: 'Cairo'; }
        
        #loading { text-align: center; padding: 50px; font-size: 1.5rem; color: var(--gold); }
    </style>
</head>
<body>

<nav>
    <div class="logo">AL-FAYROUZ <span>ESTATE</span></div>
    <button class="add-btn" onclick="document.getElementById('addModal').style.display='block'">+ اعرض شقتك</button>
</nav>

<div class="container">
    <div id="loading">جارٍ تحميل العقارات...</div>
    <div id="data" class="grid"></div>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--gold)">إضافة وحدة جديدة</h2>
        <form id="uploadForm" onsubmit="handleUpload(event)">
            <input type="file" id="photo" accept="image/*" required>
            <input type="text" id="name" placeholder="الاسم" required>
            <input type="tel" id="phone" placeholder="رقم الموبايل" required>
            <select id="city"><option>المنصورة الجديدة</option><option>دمياط الجديدة</option></select>
            <input type="text" id="proj" placeholder="المشروع (جنة / سكن مصر)" required>
            <div style="display:flex; gap:10px">
                <input type="text" id="bld" placeholder="عمارة">
                <input type="text" id="unt" placeholder="وحدة">
            </div>
            <select id="dir"><option>بحري</option><option>قبلي</option><option>شرقي</option><option>غربي</option></select>
            <input type="number" id="price" placeholder="إجمالي السعر (المدفوع + الأوفر)" required>
            
            <button type="submit" id="subBtn" class="add-btn" style="width:100%; margin-top:15px">إرسال للشيت فوراً</button>
            <button type="button" onclick="document.getElementById('addModal').style.display='none'" style="width:100%; background:none; color:#888; border:none; margin-top:10px; cursor:pointer">إلغاء</button>
        </form>
    </div>
</div>

<script>
    const SHEET_URL = "رابط_الـ_Web_App_بتاع_الـ_Apps_Script_اللي_عملته_فوق";
    const IMGBB_KEY = "06760888915b4f65c589600e1654054a"; // ده مفتاح تجريبي

    // جلب البيانات للعرض
    fetch("https://script.google.com/macros/s/AKfycbxiPcSexC05MJVeFohzNaNex4oDW0rVylIjAXSsV9BD1QP7v9Esg3xO8CtUh_yOOV6g/exec")
    .then(r => r.json()).then(data => {
        document.getElementById('loading').style.display = 'none';
        let html = "";
        data.filter(row => row[1] && row[1] !== "المشروع").forEach(row => {
            let img = row[8] || 'https://via.placeholder.com/400x250/111/gold?text=AL-FAYROUZ';
            html += `
            <div class="card">
                <img src="${img}" class="card-img">
                <div class="card-body">
                    <div class="price">${row[7]} ج.م</div>
                    <h3 style="margin:10px 0">${row[1]} - ${row[0]}</h3>
                    <p style="color:#888">📐 ${row[5]} متر | 🧭 ${row[6] || 'بحري'}</p>
                    <button class="add-btn" style="width:100%; background:none; color:var(--gold); border:1px solid var(--gold)" onclick="window.open('https://wa.me/201212229797')">استفسار</button>
                </div>
            </div>`;
        });
        document.getElementById('data').innerHTML = html;
    });

    // وظيفة الرفع للشيت
    async function handleUpload(e) {
        e.preventDefault();
        const btn = document.getElementById('subBtn');
        btn.innerText = "جاري الرفع...";
        btn.disabled = true;

        try {
            // 1. رفع الصورة لـ ImgBB
            let formData = new FormData();
            formData.append("image", document.getElementById('photo').files[0]);
            let imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: formData });
            let imgData = await imgRes.json();
            let finalImageUrl = imgData.data.url;

            // 2. إرسال البيانات للشيت
            let payload = {
                city: document.getElementById('city').value,
                project: document.getElementById('proj').value,
                building: document.getElementById('bld').value,
                unit: document.getElementById('unt').value,
                floor: "متكرر",
                space: 100,
                direction: document.getElementById('dir').value,
                price: document.getElementById('price').value,
                imageUrl: finalImageUrl,
                ownerPhone: document.getElementById('phone').value
            };

            await fetch(SHEET_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(payload)
            });

            alert("تم الرفع بنجاح! ستظهر الوحدة بعد المراجعة.");
            location.reload();
        } catch (err) {
            alert("حدث خطأ، تأكد من إعدادات الشيت.");
            btn.disabled = false;
            btn.innerText = "إرسال للشيت فوراً";
        }
    }
</script>
</body>
</html>
